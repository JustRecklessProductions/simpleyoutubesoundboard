<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Simple Soundboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b; --panel-bg: #111; --text: #ffffff;
            --neon-1: #fc0e12; --neon-2: #00fff7; --neon-3: #ff00fc; --neon-4: #fff500;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        button:focus, button:focus-visible, input:focus, input:focus-visible { outline: none !important; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; display: flex; height: 100dvh; width: 100vw;
        }

        .main-wrapper { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* --- Header Collapse Logic --- */
        .header-container { 
            padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; 
            position: relative; flex-shrink: 0; transition: height 0.3s, padding 0.3s;
            overflow: hidden;
        }
        
        .header-container.collapsed { height: 68px; padding: 0 20px; }
        
        .header-content-inner { transition: opacity 0.2s, transform 0.3s; opacity: 1; transform: translateY(0); }
        .header-container.collapsed .header-content-inner { opacity: 0; transform: translateY(-10px); pointer-events: none; }

        /* --- Top Left / Top Right Controls --- */
        .top-right-controls { 
            position: absolute; right: 15px; top: 15px; 
            display: flex; align-items: center; gap: 10px; z-index: 100;
            transition: top 0.3s, transform 0.3s;
        }

        .top-left-controls { 
            position: absolute; left: 15px; top: 15px; 
            display: flex; align-items: center; gap: 5px; z-index: 100;
            transition: top 0.3s, transform 0.3s;
        }
        
        .header-container.collapsed .top-right-controls,
        .header-container.collapsed .top-left-controls { top: 50%; transform: translateY(-50%); }

        h1 { margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; padding: 0 70px; position: relative; z-index: 60; }

        .input-stack { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 600px; margin: 0 auto; position: relative; z-index: 60; }
        .input-stack input[type="text"] { width: 100%; padding: 16px; background: #222; font-family: 'Nunito', sans-serif; border: 1px solid #444; color: white; border-radius: 8px; outline: none; font-size: 16px; text-align: center; }
        .input-stack input[type="text"]:focus { border-color: var(--neon-2); }
        
        .input-buttons { display: flex; gap: 10px; justify-content: center; width: 100%; }
        button.btn-primary, button.btn-secondary { flex: 1; padding: 14px 20px; background: transparent; color: white; font-size: 14px; border: 1px solid var(--neon-2); border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif; text-transform: uppercase; font-weight: bold; transition: all 0.3s; }
        button.btn-secondary { border-color: var(--neon-4); color: var(--neon-4); }
        button.btn-primary:hover { background: var(--neon-2); color: black; box-shadow: 0 0 15px var(--neon-2); }
        button.btn-secondary:hover { background: var(--neon-4); color: black; box-shadow: 0 0 15px var(--neon-4); }

        /* Unified Buttons */
        .btn-edit-mode {
            width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; 
            background: transparent; border: none; color: #ffffff; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s; margin: 0; padding: 0; z-index: 100;
        }
        .btn-edit-mode:hover { background: rgba(255,255,255,0.1); text-shadow: 0 0 10px white; }
        .btn-edit-mode.is-active { filter: drop-shadow(0 0 8px white); }

        /* Mega Flash Animation */
        @keyframes megaFlash {
            0% { background: transparent; box-shadow: 0 0 0 transparent; transform: scale(1); filter: brightness(1); }
            15% { background: #fff; color: #000; box-shadow: 0 0 50px #fff, 0 0 100px #fff, inset 0 0 40px #fff; transform: scale(1.3); filter: brightness(2); }
            100% { background: transparent; color: #fff; box-shadow: 0 0 0 transparent; transform: scale(1); filter: brightness(1); }
        }
        .mega-flash {
            animation: megaFlash 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Fullscreen Toggle Button */
        .fs-btn {
            background: transparent; border: none; color: #ffffff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 50%; padding: 0; margin: 0;
            transition: color 0.3s, background 0.3s, text-shadow 0.3s; z-index: 10;
        }
        .fs-btn:hover { background: rgba(255,255,255,0.1); text-shadow: 0 0 10px white; }
        .fs-icon-enter { font-size: 28px; line-height: 1; }
        .fs-btn svg { width: 24px; height: 24px; }

        /* Full Width Main Footer (Queue Trigger) */
        .main-footer { background: #000; display: flex; flex-shrink: 0; width: 100%; border-top: 1px solid #222; }
        .main-footer button { width: 100%; padding: 24px; background: transparent; border: none; color: #ffffff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.3s, text-shadow 0.3s; }
        .main-footer button:hover { background: rgba(255,255,255,0.05); }

        /* --- Grid & Boxes --- */
        .grid-container { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: grid; gap: 20px; max-width: 1400px; margin: 0 auto; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); align-content: start; width: 100%; }
        .track-box { background: transparent; border-radius: 16px; position: relative; aspect-ratio: 1 / 1; width: 100%; touch-action: manipulation; transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s; }
        .track-box-content { background: black; border-radius: 16px; position: absolute; top:0; left:0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--neon-color); cursor: pointer; z-index: 1; transition: border-width 0.2s, border-color 0.2s; }
        @media (hover: hover) and (pointer: fine) {
            .track-box:not(.is-editing):hover { transform: scale(1.02); z-index: 5; }
        }
        .track-box.is-playing-glow .track-box-content { border-width: 6px; box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1); }

        /* Universal Grid arrow buttons */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 4px white; border-color: rgba(255,255,255,0.5); }
            50% { box-shadow: 0 0 15px white; border-color: rgba(255,255,255,1); }
            100% { box-shadow: 0 0 4px white; border-color: rgba(255,255,255,0.5); }
        }
        .grid-arrow-btn { position: absolute; width: 28px; height: 28px; background: rgba(0,0,0,0.82); border: 2px solid white; border-radius: 50%; color: white; font-size: 10px; cursor: pointer; z-index: 25; display: none; align-items: center; justify-content: center; transition: background 0.15s; font-family: 'Nunito', sans-serif; padding: 0; animation: pulseGlow 1.5s infinite; }
        .grid-arrow-btn:hover { background: rgba(255,255,255,0.3); }
        body.is-editing .grid-arrow-btn { display: flex; }
        .arrow-up    { top: 6px;    left: 50%; transform: translateX(-50%); }
        .arrow-down  { bottom: 6px; left: 50%; transform: translateX(-50%); }
        .arrow-left  { left: 6px;   top: 50%;  transform: translateY(-50%); }
        .arrow-right { right: 6px;  top: 50%;  transform: translateY(-50%); }

        /* Universal Delete box btn */
        .delete-box-btn { position: absolute; top: -12px; right: -12px; width: 36px; height: 36px; font-family: 'Nunito', sans-serif; background: #ff4444; border: 3px solid var(--bg); border-radius: 50%; color: white; font-weight: bold; font-size: 16px; display: none; align-items: center; justify-content: center; z-index: 30; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        body.is-editing .delete-box-btn { display: flex; }

        .track-symbol { font-size: 4rem; text-shadow: 0 0 15px var(--neon-color); filter: drop-shadow(0 0 12px var(--neon-color)); z-index: 1; pointer-events: none; transform: translateZ(0); }
        .track-box img { width: 100%; height: 100%; display: block; object-fit: cover; z-index: 0; opacity: 0.8; transition: opacity 0.3s; pointer-events: none; }
        @media (hover: hover) and (pointer: fine) { .track-box:hover img { opacity: 0.4; } }
        .track-box .hover-text { display: none !important; }

        /* --- Dashboards --- */
        .dashboard { display: flex; flex-direction: column; background: var(--panel-bg); z-index: 1000; width: 100%; flex-shrink: 0; position: fixed; top: 0; right: 0; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); height: 100dvh; }
        .dashboard.open { transform: translateX(0); }
        
        .albums-dashboard { background: rgba(11, 11, 11, 0.85); backdrop-filter: blur(20px); transform: translateY(100%); z-index: 1500; left: 0; right: auto; width: 100vw; height: 100dvh; }
        .albums-dashboard.open { transform: translateY(0); }

        .dashboard-header, .dashboard-footer { background: #000; display: flex; flex-shrink: 0; width: 100%; padding: 0; position: relative; }
        .dashboard-header { border-bottom: 1px solid #222; align-items: center; justify-content: center; height: 68px; }
        .dashboard-footer { border-top: 1px solid #222; }
        
        .dashboard-header #masterToggleBtn, .dashboard-footer button { width: 100%; padding: 24px; font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: transparent; border: none; cursor: pointer; margin: 0; transition: background 0.3s, color 0.3s, text-shadow 0.3s; text-align: center; }
        .dashboard-header #masterToggleBtn:hover, .dashboard-footer button:hover { background: rgba(255,255,255,0.05); }
        
        .master-pause { color: var(--neon-1); text-shadow: 0 0 10px var(--neon-1); }
        .master-play { color: #39ff14; text-shadow: 0 0 10px #39ff14; }
        
        .close-dashboard-btn { color: #ffffff; display: flex; align-items: center; justify-content: center; }

        .queue-container { flex-grow: 1; overflow-y: auto; padding: 20px; overflow-x: hidden; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        .queue-item-wrapper { position: relative; margin-bottom: 16px; background: transparent; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .queue-item { position: relative; width: 100%; display: flex; align-items: stretch; background: #0b0b0b; border: 2px solid var(--neon-color); border-radius: 16px; z-index: 2; transition: transform 0.2s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.4); overflow: hidden; }
        .queue-item.is-playing { box-shadow: 0 0 20px var(--neon-color), inset 0 0 5px rgba(255,255,255,0.05); }

        .queue-left-actions { width: 48px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #222; border-radius: 16px 0 0 16px; overflow: hidden; }
        .options-btn { flex-grow: 1; background: transparent; border: none; color: var(--neon-color); font-size: 24px; font-weight: bold; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; min-height: 44px; }
        .options-btn:hover { background: rgba(255,255,255,0.05); }

        .play-pause-btn { width: 65px; flex-shrink: 0; background: transparent; border: none; border-left: 1px solid #222; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; transition: background 0.2s, color 0.2s, filter 0.2s; }
        .play-pause-btn.active { color: var(--neon-color); filter: drop-shadow(0 0 5px var(--neon-color)); }
        .queue-item-center { flex-grow: 1; padding: 16px; display: flex; flex-direction: column; justify-content: center; touch-action: pan-y; min-width: 0; overflow: hidden; }
        .q-name-container { display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 12px; }
        .q-name { display: inline-block; font-size: 1.1rem; font-weight: 700; color: var(--neon-color); animation: scroll-left-right 8s linear infinite alternate; }
        @keyframes scroll-left-right { 0%, 10% { transform: translateX(15%); } 90%, 100% { transform: translateX(-15%); } }
        .time-text { font-size: 1rem; color: #fff; cursor: pointer; display: block; width: fit-content; margin: 0 auto 16px auto; background: rgba(255,255,255,0.15); padding: 10px 24px; border-radius: 24px; font-weight: 700; transition: background 0.2s; text-align: center; letter-spacing: 1px; }
        .sliders-container { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        input[type="range"] { -webkit-appearance: none; background: rgba(255,255,255,0.15); height: 6px; border-radius: 3px; outline: none; flex-grow: 1; cursor: pointer; width: 100%; transition: background 0.3s, box-shadow 0.3s; min-width: 0; }
        input[type="range"].progress-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--neon-color) !important; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.8); transition: box-shadow 0.3s, background 0.3s; }
        input[type="range"].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: white !important; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.8); }
        .volume-control { display: flex; align-items: center; gap: 10px; width: 100%; }
        .volume-control span { font-size: 14px; flex-shrink: 0; }
        .volume-control input[type="range"] { width: auto; flex-shrink: 1; }
        .queue-item.is-looping input[type="range"].progress-slider { background: var(--neon-color); box-shadow: 0 0 10px var(--neon-color); }
        .queue-item.is-looping input[type="range"].progress-slider::-webkit-slider-thumb { background: var(--neon-color) !important; box-shadow: 0 0 15px var(--neon-color), 0 0 5px white; }

        /* --- Albums Aesthetic --- */
        .album-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 12px; 
            position: relative; width: 100%; 
            min-width: 0; /* The magic CSS Grid overflow fix */
        }
        .album-box-container { position: relative; width: 100%; aspect-ratio: 1/1; }
        .album-glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-color); filter: blur(20px); opacity: 0.5; transition: all 0.3s; z-index: 0; }
        .album-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 1; cursor: pointer; transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; }
        .album-box img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; transition: opacity 0.3s; }
        
        .album-name-container { 
            display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; white-space: nowrap; 
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
        }
        .album-name { display: inline-block; font-size: 1.1rem; font-weight: 700; color: white; padding: 0 5px; }
        .album-name.needs-scroll { animation: scroll-left-right 8s linear infinite alternate; }
        
        @media (hover: hover) and (pointer: fine) {
            .album-wrapper:not(.is-editing):hover .album-box { transform: scale(1.04); }
            .album-wrapper:not(.is-editing):hover .album-glow { opacity: 0.9; transform: scale(1.04); }
            .album-wrapper:not(.is-editing):hover img { opacity: 1; }
        }

        .view-album-modal { background: rgba(25,25,25,0.85); backdrop-filter: blur(25px); width: 90%; max-width: 800px; max-height: 80dvh; overflow-y: auto; padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .view-album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; }
        .view-track-box { aspect-ratio: 1/1; background: #000; border: 2px solid var(--neon-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .view-track-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .view-track-box .track-symbol { font-size: 2.5rem; text-shadow: 0 0 10px var(--neon-color); filter: drop-shadow(0 0 8px var(--neon-color)); }

        /* --- Modals and Sheets --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal { background: #111; padding: 30px; border-radius: 16px; border: 1px solid var(--neon-4); text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 30px var(--neon-4); }
        .modal h2 { margin-bottom: 20px; color: var(--text); font-weight: 600; }
        .modal p { font-weight: 400; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; flex-direction: column; }
        .modal-buttons button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; font-family: 'Nunito', sans-serif; }

        button.btn-auto { background: var(--neon-2); color: black; font-weight: 700; font-size: 15px; padding: 16px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 0 18px rgba(0, 255, 247, 0.45); transition: box-shadow 0.25s, transform 0.1s; }
        button.btn-auto:hover { box-shadow: 0 0 32px var(--neon-2); transform: scale(1.02); }
        button.btn-auto:active { transform: scale(0.98); }
        .btn-keep { background: transparent; border: 1px solid white !important; color: white; padding: 14px 20px !important; border-radius: 8px; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn-keep:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: #ff4444; color: white; }
        .btn-cancel { margin-top:20px; background:none; border:none; color:#777; cursor:pointer; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 600; }
        .color-options { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .color-swatch { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: transform 0.2s; }
        input[type="color"] { width: 48px; height: 48px; border: none; border-radius: 50%; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }
        #colorPreview { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 15px auto; border: 3px solid white; }
        #timeInput { width: 100%; padding: 15px; font-size: 28px; font-family: 'Nunito', sans-serif; font-weight: 700; text-align: center; background: #222; border: 1px solid var(--neon-2); color: white; border-radius: 12px; outline: none; margin-bottom: 20px; letter-spacing: 2px; }

        .symbol-modal { max-width: 520px !important; }
        .symbol-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 4px; }
        .sym-item { font-size: 1.4rem; text-align: center; cursor: pointer; padding: 8px 4px; border-radius: 8px; transition: background 0.15s; }
        .sym-item:hover { background: rgba(255,255,255,0.12); }

        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
        .bottom-sheet { background: rgba(25,25,25,0.85); backdrop-filter: blur(25px); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1); border-top: 1px solid rgba(255,255,255,0.1); max-height: 85dvh; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
        .bottom-sheet.open { transform: translateY(0); }
        .sheet-group { background: rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
        .sheet-btn { width: 100%; padding: 18px; font-family: 'Nunito', sans-serif; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: white; font-size: 1.1rem; text-align: center; cursor: pointer; font-weight: 600; }
        .sheet-cancel { font-weight: 700; color: #ff4444 !important; }
        .sheet-delete { background: #ff4444 !important; color: white !important; font-weight: 700; }

        @media (min-width: 769px) {
            .queue-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; align-content: start; }
            .queue-item-wrapper { margin-bottom: 0; }
        }

        /* --- Mobile Tweaks (3 columns & Top Bar) --- */
        @media (max-width: 768px) {
            /* 3 Columns strictly on mobile for main grid */
            #gridContainer { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
            
            /* Keep Albums Dashboard at 2 columns */
            #albumsGridContainer { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }

            .input-stack input[type="text"]::placeholder { font-size: 11px; }

            /* Black top bar to prevent button overlap over title */
            .header-container:not(.collapsed)::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 68px; /* Matching dashboard headers */
                background: #000;
                border-bottom: 1px solid #222;
                z-index: 50;
            }
            .header-container:not(.collapsed) {
                padding-top: 90px; /* Push content cleanly beneath the new top bar */
            }
            .header-container:not(.collapsed) .top-left-controls,
            .header-container:not(.collapsed) .top-right-controls {
                top: 12px; /* Center inside the 68px bar */
                z-index: 100;
            }
            h1 {
                font-size: 1.6rem;
                margin-bottom: 20px;
                padding: 0 10px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .grid-container { grid-template-columns: repeat(7, 1fr); gap: 15px; padding: 15px; }
        }

        #hidden-players { display: none; }
    </style>
</head>
<body>
    <div class="main-wrapper" id="mainWrapper">
        <div class="header-container" id="mainHeader">
            
            <div class="top-left-controls" id="topLeftControls">

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const playSvg = `<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>`;
        const pauseSvg = `<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="2"/><rect x="14" y="4" width="4" height="16" rx="2"/></svg>`;

        const neonColors = ['#fc0e12','#00fff7','#ff00fc','#fff500'];
        const randomSymbols = ['🔥','🌊','🍃','🌲','🌋','🌌','🌙','☀️','🌈','🪐','☄️','🫧','★','☆','⚔️','🛡️','🏹','🔪','🪓','💥','💣','🧨','⚡','🚀','🛸','🏆','🆙','🆒','💯','💢','🐺','🐦','🦉','🦄','💡','🧪','👻','👽','✨','🌟','⛺','💎','👑','🌸','🍀','🎸','🎬','☕','🍕','🍎','🎁','🎈','😀','😂','😍'];
        function getRandomSymbol() { return randomSymbols[Math.floor(Math.random() * randomSymbols.length)]; }
        const defaultMusicSymbols = ['♫','𝄞','♪','𝄢','𝄽','♬','♮','𝄡'];
        const allSymbolsList = ['🔥','🌊','🌧','⛈','🌬','🍃','🌲','🌋','🏔','🌌','🌙','🌑','☀️','☁️','🌫','❄️','💨','🌦','🌈','🪐','☄️','🏜','🏝','🫧','♨','☀','☁','★','☆','☂','🗡️','⚔️','🛡️','🏹','🔪','🪓','💥','💣','🧨','⚡','🚀','🛸','🚂','🚗','✈️','🏆','⚽','🎯','🆙','🆒','💯','💢','⚓','🐺','🐦','🦉','🐍','🦂','🦄','🐼','🚨','🆘','⚠️','‼️','❕','🛑','🚫','⛔','📛','🚩','☢️','☣️','🩹','🩺','🚑','🚒','🔔','📢','📣','☠','☢','☣','🚷','💡','🔋','⚙️','🧪','💻','📱','📷','📶','⏻','🔍','📍','📅','✉️','🛒','⚙','⚗','⚛','⚖','⏼','⏽','⏾','☏','☎','💀','☠️','👻','👹','👺','🧛','🧟','🧌','🦇','🕷️','🕸️','🩸','⚰️','🪦','🏚️','🥀','⛓️','👽','🤡','😈','👿','😱','😨','😰','👁️','🧠','🌚','✨','🌟','🕯','⛺','🏙','🏠','📖','📚','🔑','🔒','💎','👑','🌸','☘','🍀','🎸','🎨','🎬','☕','🍕','🍎','🎁','🎈','🧘','🛌','🛁','😀','😂','😍','🤔','🤫','✔️','❌','✖️',...defaultMusicSymbols];

        const albumCovers = ['https://i.imgur.com/YVyRoP7.png','https://i.imgur.com/8bT97KW.png','https://i.imgur.com/0miV3Hi.png','https://i.imgur.com/5J4S56c.png','https://i.imgur.com/IMiAxsC.png','https://i.imgur.com/qx73gKq.png','https://i.imgur.com/p20iFfV.png','https://i.imgur.com/5pJhvaf.png','https://i.imgur.com/pJ0hjjx.png','https://i.imgur.com/QmdTT0W.png','https://i.imgur.com/88zAZ8X.png','https://i.imgur.com/jaJsU3D.png','https://i.imgur.com/tKdrqtg.png','https://i.imgur.com/ektS4qN.png','https://i.imgur.com/8DefwaJ.png','https://i.imgur.com/EJU91xr.png','https://i.imgur.com/6xTJKyG.png','https://i.imgur.com/mbtPi6J.png','https://i.imgur.com/S30g8fP.png','https://i.imgur.com/JheX72g.png','https://i.imgur.com/3KFJuR1.png','https://i.imgur.com/VGnL8IA.png','https://i.imgur.com/Cm3sdIZ.png','https://i.imgur.com/ALYTxVz.png','https://i.imgur.com/N3Rbl2I.png','https://i.imgur.com/RD4CTUA.png'];
        function getRandomCover() { return albumCovers[Math.floor(Math.random() * albumCovers.length)]; }

        let tracks = []; let queue = []; let colorIndex = 0; 
        let isDashboardOpen = false; let isAlbumsDashboardOpen = false; 
        let isEditing = false; let isAlbumsEditing = false;
        
        let activeTargetTrackId = null; 
        let activeTargetAlbumId = null;
        let activeTargetType = 'track'; 
        let currentActionQueueId = null; let activeTimeQueueId = null; let tempSelectedColor = '#ffffff';
        
        let savedAlbums = [];

        const DB_NAME = 'SuperSimpleDB'; let db;
        function initDB() { return new Promise((resolve) => { const req = indexedDB.open(DB_NAME, 5); req.onupgradeneeded = (e) => { db = e.target.result; if (!db.objectStoreNames.contains('tracks')) db.createObjectStore('tracks', { keyPath: 'id' }); }; req.onsuccess = (e) => { db = e.target.result; resolve(db); }; }); }
        function saveTrackToDB(track) { db.transaction('tracks','readwrite').objectStore('tracks').put(track); }
        function deleteTrackFromDB(id) { db.transaction('tracks','readwrite').objectStore('tracks').delete(id); }
        function saveAllTracksToDB() { tracks.forEach(t => saveTrackToDB(t)); }
        function saveTrackOrder() { localStorage.setItem('SuperSimpleTrackOrder', JSON.stringify(tracks.map(t => t.id))); }

        function getAllTracksRawFromDB() {
            return new Promise((resolve) => {
                const req = db.transaction('tracks','readonly').objectStore('tracks').getAll();
                req.onsuccess = () => resolve(req.result || []);
            });
        }

        function loadTracksFromDB() {
            return new Promise((resolve) => {
                const req = db.transaction('tracks','readonly').objectStore('tracks').getAll();
                req.onsuccess = () => {
                    let loaded = req.result || [];
                    const validLoaded = [];
                    loaded.forEach(t => {
                        if (t.platform === 'youtube' || t.platform === 'local') validLoaded.push(t);
                        else deleteTrackFromDB(t.id);
                    });
                    loaded = validLoaded;

                    const orderStr = localStorage.getItem('SuperSimpleTrackOrder');
                    if (orderStr) {
                        try { const order = JSON.parse(orderStr); loaded.sort((a, b) => { const ai = order.indexOf(a.id), bi = order.indexOf(b.id); if (ai === -1) return 1; if (bi === -1) return -1; return ai - bi; }); } catch(e) {}
                    }
                    resolve(loaded);
                };
            });
        }

        function loadAlbums() {
            const f = localStorage.getItem('SuperSimpleFolders'); 
            let parsed = f ? JSON.parse(f) : [];
            savedAlbums = parsed.map(album => {
                if (album.tracksSnapshot) {
                    album.tracksSnapshot = album.tracksSnapshot.filter(t => t.platform === 'youtube' || t.platform === 'local');
                }
                if (!album.coverUrl && !album.customImage) album.coverUrl = getRandomCover();
                if (!album.color) album.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                if (!album.symbol) album.symbol = getRandomSymbol();
                if (!album.name) album.name = album.symbol;
                return album;
            });
            renderAlbums();
        }

        function saveAlbumsState() {
            localStorage.setItem('SuperSimpleFolders', JSON.stringify(savedAlbums));
        }

        function createAlbum() {
            if (tracks.length === 0) return alert("Add some tracks to the grid first to save an album!");
            const snapshot = tracks.map(t => {
                const copy = { ...t };
                if (copy.type === 'mp3') delete copy.localAudio; 
                return copy;
            });
            const sym = getRandomSymbol();
            const album = {
                id: 'album_' + Date.now(),
                name: sym,
                symbol: sym,
                color: neonColors[colorIndex],
                coverUrl: getRandomCover(),
                tracksSnapshot: snapshot
            };
            colorIndex = (colorIndex + 1) % neonColors.length;
            savedAlbums.push(album);

        async function loadAlbumTracks(id) {

                const fullDbTracks = await getAllTracksRawFromDB();
                tracks.forEach(t => deleteTrackFromDB(t.id));
                tracks = album.tracksSnapshot.map(snapTrack => {
                    if (snapTrack.type === 'mp3' && !snapTrack.localAudio) {
                        const dbMatch = fullDbTracks.find(dbt => dbt.id === snapTrack.id);
                        if (dbMatch) snapTrack.localAudio = dbMatch.localAudio;

        function updateArrowVisibility() {
            if (!isEditing) return;
            const boxes = [...document.querySelectorAll('#gridContainer .track-box')]; 
            const cols = getGridColumnCount('gridContainer'); 
            const total = boxes.length;
            boxes.forEach((box, idx) => {
                const col = idx % cols; 
                const up = box.querySelector('.arrow-up'); 
                const down = box.querySelector('.arrow-down'); 
                const left = box.querySelector('.arrow-left'); 
                const right = box.querySelector('.arrow-right');
                if (up) up.style.visibility = idx < cols ? 'hidden' : 'visible';
                if (down) down.style.visibility = idx + cols >= total ? 'hidden' : 'visible';
                if (left) left.style.visibility = col === 0 ? 'hidden' : 'visible';
                if (right) right.style.visibility = (col === cols - 1 || idx + 1 >= total) ? 'hidden' : 'visible';
            });

            const qBoxes = [...document.querySelectorAll('#queueContainer .queue-item')]; 
            const qCols = getGridColumnCount('queueContainer'); 
            const qTotal = qBoxes.length;
            qBoxes.forEach((box, idx) => {
                const col = idx % qCols; 
                const up = box.querySelector('.arrow-up'); 
                const down = box.querySelector('.arrow-down'); 
                const left = box.querySelector('.arrow-left'); 
                const right = box.querySelector('.arrow-right');
                if (up) up.style.visibility = idx < qCols ? 'hidden' : 'visible';
                if (down) down.style.visibility = idx + qCols >= qTotal ? 'hidden' : 'visible';
                if (left) left.style.visibility = col === 0 ? 'hidden' : 'visible';
                if (right) right.style.visibility = (col === qCols - 1 || idx + 1 >= qTotal) ? 'hidden' : 'visible';
            });
        }

        function moveTrack(trackId, direction) {
            const idx = tracks.findIndex(t => t.id === trackId); if (idx === -1) return;
            const cols = getGridColumnCount('gridContainer'); let targetIdx;
            if (direction === 'up') targetIdx = idx - cols; else if (direction === 'down') targetIdx = idx + cols; else if (direction === 'left') targetIdx = idx - 1; else if (direction === 'right') targetIdx = idx + 1;
            if (targetIdx == null || targetIdx < 0 || targetIdx >= tracks.length) return;
            [tracks[idx], tracks[targetIdx]] = [tracks[targetIdx], tracks[idx]]; saveTrackOrder(); renderGrid();
        }

        function moveQueueItem(queueId, direction) {

        function parseMediaUrl(url) { 
            let yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/); 
            if(yt) return {platform:'youtube',id:yt[1]}; 
            return null; 
        }

        function handleAddMediaLink() { 
            const url=document.getElementById('mediaLink').value.trim(); 
            if(!url) return; 
            const parsed=parseMediaUrl(url); 
            if(!parsed) return alert("Sorry, that link's a no go. Only YouTube links are supported!"); 
            const sym = getRandomSymbol(); 
            const track={id:'track_'+Date.now(),type:'embed',platform:parsed.platform,mediaId:parsed.id,baseName:sym,color:neonColors[colorIndex],symbol:sym}; 
            colorIndex=(colorIndex+1)%neonColors.length; 
            tracks.push(track); 
            saveTrackToDB(track); 
            saveTrackOrder(); 
            renderGrid(); 
            document.getElementById('mediaLink').value=''; 
        }
        
        function handleAddMP3(e) { const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=(ev) => { const sym = getRandomSymbol(); const track={id:'track_'+Date.now(),type:'mp3',platform:'local',baseName:file.name.replace(/\.[^/.]+$/,''),color:neonColors[colorIndex],symbol:sym,localAudio:ev.target.result}; colorIndex=(colorIndex+1)%neonColors.length; tracks.push(track); saveTrackToDB(track); saveTrackOrder(); renderGrid(); }; reader.readAsDataURL(file); e.target.value=''; }

        function fadeIn(qItem) { if(!qItem.playerAPI) return; let tv = qItem.volume; qItem.volume = 0; qItem.playerAPI.setVolume(0); qItem.state = 'PLAYING'; qItem.preventGhostPlay = false; qItem.playerAPI.play(); let step = Math.max(1, tv / 25); setTimeout(() => { const iv = setInterval(() => { qItem.volume = Math.min(tv, parseFloat(qItem.volume) + step); qItem.playerAPI.setVolume(qItem.volume); updateQueueUI(); if(qItem.volume >= tv) clearInterval(iv); }, 80); }, 400); }
        function fadeOut(qItem) { if(!qItem.playerAPI||qItem.state!=='PLAYING') return; const iv=setInterval(()=>{ qItem.volume=Math.max(0,qItem.volume-1); qItem.playerAPI.setVolume(qItem.volume); updateQueueUI(); if(qItem.volume<=0){clearInterval(iv); qItem.playerAPI.pause(); qItem.state='PAUSED'; updateQueueUI();} },80); }

        function renderGrid() {
            const container=document.getElementById('gridContainer'); container.innerHTML='';
            tracks.forEach(track => {
                const box=document.createElement('div'); box.className=`track-box ${queue.some(q=>q.trackId===track.id)?'in-queue':''}`; box.dataset.trackId=track.id; box.setAttribute('title', track.baseName);
                const content=document.createElement('div'); content.className='track-box-content'; content.style.setProperty('--neon-color',track.color);
                if(track.customImage){const img=document.createElement('img'); img.src=track.customImage; content.appendChild(img);} else{const sym=document.createElement('div'); sym.className='track-symbol'; sym.textContent=track.symbol; content.appendChild(sym);}
                const hover=document.createElement('div'); hover.className='hover-text'; hover.textContent=track.baseName; content.appendChild(hover); box.appendChild(content);
                [['up','▲'],['down','▼'],['left','◀'],['right','▶']].forEach(([dir, glyph]) => { const btn=document.createElement('button'); btn.className=`grid-arrow-btn arrow-${dir}`; btn.textContent=glyph; btn.onclick=(e)=>{ e.stopPropagation(); moveTrack(track.id, dir); }; box.appendChild(btn); });
                const del=document.createElement('div'); del.className='delete-box-btn'; del.textContent='X'; del.onclick=(e)=>{ e.stopPropagation(); deleteTrackFromDB(track.id); tracks=tracks.filter(t=>t.id!==track.id); saveTrackOrder(); queue.filter(q=>q.trackId===track.id).forEach(q=>removeQueueItem(q.queueId)); renderGrid(); }; box.appendChild(del);
                let startX = 0, startY = 0, isDragging = false;
                box.onpointerdown = (e) => { if (isEditing) return; startX = e.clientX; startY = e.clientY; isDragging = false; };
                box.onpointermove = (e) => { if (isEditing) return; if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) isDragging = true; };
                box.onpointerup = (e) => { if (isEditing || isDragging) return; if (queue.some(q => q.trackId === track.id)) { const q = queue.find(q => q.trackId === track.id); if (q.state === 'PLAYING') q.playerAPI.pause(); else { q.preventGhostPlay = false; q.playerAPI.play(); } } else { addToQueue(track, 0, true); } };
                container.appendChild(box);
            });
            updateGridGlow(); if(isEditing) requestAnimationFrame(updateArrowVisibility);
        }

        function renderQueue() {
            const container=document.getElementById('queueContainer'); container.innerHTML='';
            queue.forEach((qItem, qIdx) => {
                const wrapper=document.createElement('div'); wrapper.className='queue-item-wrapper'; wrapper.dataset.queueId=qItem.queueId;
                const el=document.createElement('div'); el.className=`queue-item ${qItem.state==='PLAYING'?'is-playing':''} ${qItem.isLooping?'is-looping':''}`; el.style.setProperty('--neon-color',qItem.color);
                
                el.innerHTML=`
                    <div class="queue-left-actions">
                        <button class="options-btn" onclick="openBottomSheet('${qItem.queueId}','${qItem.type}',${qItem.isLooping})">⋮</button>
                    </div>
                    <div class="queue-item-center swipe-zone">
                        <div class="q-name-container"><span class="q-name">${qItem.name}</span></div>
                        <div class="time-text" onclick="openTimeModal('${qItem.queueId}')">${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}</div>
                        <div class="sliders-container">
                            <input type="range" class="progress-slider" id="scrub_${qItem.queueId}" min="0" max="${qItem.duration}" value="${qItem.currentTime}">
                            <div class="volume-control"><span>🔈</span><input type="range" class="vol-slider" min="0" max="100" value="${qItem.volume}"><span>🔊</span></div>
                        </div>
                    </div>
                    <button class="play-pause-btn ${qItem.state==='PLAYING'?'active':''}" onclick="const q=queue.find(it=>it.queueId==='${qItem.queueId}'); q.preventGhostPlay=false; if(q.state==='PLAYING') q.playerAPI.pause(); else q.playerAPI.play();">
                        ${qItem.state === 'PLAYING' ? pauseSvg : playSvg}
                    </button>`;
                
                [['up','▲'],['down','▼'],['left','◀'],['right','▶']].forEach(([dir, glyph]) => { 
                    const btn=document.createElement('button'); btn.className=`grid-arrow-btn arrow-${dir}`; btn.textContent=glyph; 
                    btn.onclick=(e)=>{ e.stopPropagation(); moveQueueItem(qItem.queueId, dir); }; 
                    el.appendChild(btn); 
                });
                const del=document.createElement('div'); del.className='delete-box-btn'; del.textContent='X'; 
                del.onclick=(e)=>{ e.stopPropagation(); removeQueueItem(qItem.queueId); }; 
                el.appendChild(del);

                wrapper.appendChild(el);
                el.querySelector('.vol-slider').oninput=(e)=>{ qItem.volume=e.target.value; if(qItem.playerAPI) qItem.playerAPI.setVolume(qItem.volume); };
                const scrub=el.querySelector('.progress-slider'); scrub.onmousedown=scrub.ontouchstart=()=>qItem.isScrubbing=true; scrub.oninput=(e)=>{ qItem.currentTime=e.target.value; el.querySelector('.time-text').textContent=formatTime(qItem.currentTime)+' / '+formatTime(qItem.duration); }; scrub.onchange=(e)=>{ qItem.isScrubbing=false; if(qItem.playerAPI){qItem.preventGhostPlay=false; qItem.playerAPI.seekTo(parseFloat(e.target.value));} };
                container.appendChild(wrapper);
            });
            updateMasterButton(); updateGridGlow(); if(isEditing) requestAnimationFrame(updateArrowVisibility);
        }

        function updateQueueUI() {
            queue.forEach(q => {
                const wrapper=document.querySelector(`.queue-item-wrapper[data-queue-id="${q.queueId}"]`); if(!wrapper) return;
                const el=wrapper.querySelector('.queue-item'); if(!el) return;
                el.style.setProperty('--neon-color', q.color); el.classList.toggle('is-playing', q.state==='PLAYING'); el.classList.toggle('is-looping', q.isLooping);
                
                const ppBtn=el.querySelector('.play-pause-btn'); 
                if(ppBtn){ 
                    ppBtn.innerHTML = q.state==='PLAYING' ? pauseSvg : playSvg; 
                    ppBtn.classList.toggle('active',q.state==='PLAYING'); 
                }
                
                const nameEl = el.querySelector('.q-name'); if (nameEl) nameEl.textContent = q.name;
                const timeEl=el.querySelector('.time-text'); if(timeEl) timeEl.textContent=formatTime(q.currentTime)+' / '+formatTime(q.duration);
                const scrub=el.querySelector('.progress-slider'); if(scrub){scrub.max=q.duration; if(!q.isScrubbing) scrub.value=q.currentTime;}
                const vol=el.querySelector('.vol-slider'); if(vol&&!q.isScrubbing) vol.value=q.volume;
            });
            updateMasterButton(); updateGridGlow();
        }

        function restoreQueueItem(s) { 
            const base=tracks.find(t=>t.id===s.trackId); 
            if(!base) return; 
            const q={...s, state:'PAUSED', color:base.color, playerAPI:null, isScrubbing:false, preventGhostPlay:true}; 
            queue.push(q); 
            initializePlayer(q, base, true); 
        }

        function addToQueue(t, startAt=0, autoPlay=false) { const q={queueId:'q_'+Date.now()+Math.floor(Math.random()*1000),trackId:t.id,type:t.type,platform:t.platform,mediaId:t.mediaId,name:t.baseName,color:t.color,playerAPI:null,state:autoPlay?'PLAYING':'PAUSED',duration:0,isLooping:false,volume:50,currentTime:startAt,isScrubbing:false,preventGhostPlay:!autoPlay}; queue.push(q); renderQueue(); initializePlayer(q,t); }
        function removeQueueItem(id) { const i=queue.findIndex(q=>q.queueId===id); if(i>-1){if(queue[i].playerAPI) queue[i].playerAPI.destroy(); const div=document.getElementById(`player_${id}`); if(div) div.remove(); queue.splice(i,1); renderQueue(); renderGrid();} }
        function formatTime(s) { if(!s) return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function updateGridGlow() { document.querySelectorAll('.track-box').forEach(box=>{ const qs=queue.filter(q=>q.trackId===box.dataset.trackId); box.classList.toggle('in-queue', qs.length>0); box.classList.toggle('is-playing-glow', qs.some(it=>it.state==='PLAYING')); }); }
        
        function updateMasterButton() { 
            const btn = document.getElementById('masterToggleBtn'); 
            const isP = queue.some(q => q.state === 'PLAYING'); 
            btn.textContent = isP ? 'Pause All' : 'Play All'; 
            btn.className = isP ? 'master-pause' : 'master-play'; 
        }

        function initializePlayer(q, base, isRestore=false) {
            const h=document.getElementById('hidden-players');
            try {
                if(q.type==='mp3') {
                    const a=new Audio(base.localAudio); q.playerAPI={play:()=>a.play(),pause:()=>a.pause(),stop:()=>{a.pause();a.currentTime=0;},seekTo:(s)=>a.currentTime=s,setVolume:(v)=>a.volume=v/100,getDuration:()=>a.duration,getCurrentTime:()=>a.currentTime,destroy:()=>{a.pause();a.src='';}};
                    a.onloadedmetadata=()=>{q.duration=a.duration; a.volume=q.volume/100; if(q.currentTime>0) a.currentTime=q.currentTime; updateQueueUI();}; a.ontimeupdate=()=>{if(!q.isScrubbing) q.currentTime=a.currentTime;};
                    a.onended=()=>{if(q.isLooping) a.play(); else{q.state='PAUSED'; updateQueueUI(); saveQueueState();}}; a.onplay=()=>{q.state='PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();}; a.onpause=()=>{if(!q.isScrubbing){q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();}};
                    if(!isRestore&&q.state==='PLAYING') a.play();
                } else if(q.platform==='youtube') {
                    if(typeof YT==='undefined'||!YT.Player){setTimeout(()=>initializePlayer(q,base,isRestore),500);return;} const div=document.createElement('div'); div.id=`player_${q.queueId}`; h.appendChild(div);
                    const yt=new YT.Player(div.id,{height:'0',width:'0',videoId:q.mediaId,playerVars:{autoplay:0,controls:0},events:{
                        onReady:()=>{q.playerAPI={play:()=>yt.playVideo(),pause:()=>yt.pauseVideo(),stop:()=>{yt.stopVideo();yt.seekTo(0);},seekTo:(s)=>yt.seekTo(s,true),setVolume:(v)=>yt.setVolume(v),getDuration:()=>yt.getDuration(),getCurrentTime:()=>yt.getCurrentTime(),destroy:()=>yt.destroy()}; q.duration=yt.getDuration()||q.duration; yt.setVolume(q.volume); if(q.currentTime>0) yt.seekTo(q.currentTime,true); if(q.state==='PAUSED') setTimeout(()=>yt.pauseVideo(),50); else if(!isRestore) setTimeout(()=>yt.playVideo(),200); updateQueueUI();},
                        onStateChange:(e)=>{if(e.data===YT.PlayerState.PLAYING){if(q.preventGhostPlay&&q.state==='PAUSED'){yt.pauseVideo();q.preventGhostPlay=false;return;} q.preventGhostPlay=false;q.state='PLAYING';updateQueueUI();saveQueueState();updateGridGlow();} else if(e.data===YT.PlayerState.PAUSED&&!q.isScrubbing){q.state='PAUSED';updateQueueUI();saveQueueState();updateGridGlow();} else if(e.data===YT.PlayerState.ENDED){if(q.isLooping) yt.playVideo(); else{q.state='PAUSED';updateQueueUI();saveQueueState();updateGridGlow();}}}
                    }});
                }
            } catch(e) { console.error('Player init error',e); }
        }

        function updateData(targetId, type, updatesObj) {
            try {
                if (type === 'track') {
                    const i=tracks.findIndex(t=>t.id===targetId); 
                    if(i===-1) return; 
                    const oldSym=tracks[i].symbol; 
                    tracks[i]={...tracks[i],...updatesObj}; 
                    saveTrackToDB(tracks[i]); 
                    queue.forEach(q=>{if(q.trackId===targetId){if(updatesObj.color) q.color=updatesObj.color; if(updatesObj.baseName) q.name=updatesObj.baseName; if(updatesObj.symbol&&q.name===oldSym) q.name=updatesObj.symbol;}}); 
                    renderGrid(); renderQueue(); saveQueueState();
                } else if (type === 'album') {
                    const i = savedAlbums.findIndex(a => a.id === targetId);
                    if (i !== -1) {
                        savedAlbums[i] = { ...savedAlbums[i], ...updatesObj };
                        if (updatesObj.symbol && !updatesObj.name) {
                            savedAlbums[i].name = updatesObj.symbol;
                        }
                        saveAlbumsState();
                        renderAlbums();
                    }
                }
            } catch(e) { console.error('updateData error',e); }
        }

        function populateSymbolGrid() { 
            const grid=document.getElementById('symbolGrid'); 
            allSymbolsList.forEach(sym=>{ 
                const div=document.createElement('div'); div.className='sym-item'; div.textContent=sym; 
                div.onclick=()=>{ 
                    if (activeTargetType === 'track' && activeTargetTrackId) {
                        updateData(activeTargetTrackId, 'track', {symbol:sym, customImage:null}); 
                    } else if (activeTargetType === 'album' && activeTargetAlbumId) {
                        updateData(activeTargetAlbumId, 'album', {symbol:sym, name:sym}); 
                    }
                    hideModal('symbolModal');
                }; 
                grid.appendChild(div); 
            }); 
        }

        function populateVinylsGrid() {
            const grid = document.getElementById('vinylsGrid');
            albumCovers.forEach(url => {
                const div = document.createElement('div');
                div.style.aspectRatio = '1/1';
                div.style.cursor = 'pointer';
                div.style.borderRadius = '50%';
                div.style.overflow = 'hidden';
                div.style.border = '2px solid transparent';
                div.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
                div.onclick = () => {
                    if (activeTargetType === 'album' && activeTargetAlbumId) {
                        updateData(activeTargetAlbumId, 'album', {customImage: url});
                    }
                    hideModal('vinylsModal');
                };
                grid.appendChild(div);
            });
        }

        function startUITracker() { setInterval(()=>{ queue.forEach(q=>{ try { if(q.state==='PLAYING'&&q.playerAPI&&!q.isScrubbing){ if(q.platform==='youtube'){const ct=q.playerAPI.getCurrentTime(); if(ct!=null) q.currentTime=ct;} const tEl=document.querySelector(`.queue-item-wrapper[data-queue-id="${q.queueId}"] .time-text`); const sEl=document.getElementById(`scrub_${q.queueId}`); if(tEl) tEl.textContent=formatTime(q.currentTime)+' / '+formatTime(q.duration); if(sEl) sEl.value=q.currentTime; } } catch(e){} }); },500); }
    </script>
</body>
</html>
