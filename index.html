<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Simple Soundboard</title>
    <style>
        :root {
            --bg: #0b0b0b; --panel-bg: #111; --text: #ffffff;
            --neon-1: #fc0e12; --neon-2: #00fff7; --neon-3: #ff00fc; --neon-4: #fff500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; display: flex; height: 100vh;
        }

        .main-wrapper {
            flex-grow: 1; overflow-y: auto; transition: padding-right 0.4s ease;
            position: relative;
        }

        /* --- Input Section --- */
        .header-container { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        h1 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; }

        .input-group {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            max-width: 900px; margin: 0 auto; flex-wrap: wrap;
        }
        input[type="text"] {
            flex-grow: 1; padding: 12px; background: #222; min-width: 200px;
            border: 1px solid #444; color: white; border-radius: 8px; outline: none; font-size: 16px;
        }
        input[type="text"]:focus { border-color: var(--neon-2); }

        button.btn-primary, button.btn-secondary {
            padding: 12px 20px; background: transparent; color: white; font-size: 14px;
            border: 1px solid var(--neon-2); border-radius: 8px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        button.btn-secondary { border-color: var(--neon-4); color: var(--neon-4); }
        button.btn-primary:hover { background: var(--neon-2); color: black; box-shadow: 0 0 15px var(--neon-2); }
        button.btn-secondary:hover { background: var(--neon-4); color: black; box-shadow: 0 0 15px var(--neon-4); }

        .header-controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .action-btn {
            padding: 10px 20px; background: transparent; color: var(--neon-3); font-size: 14px;
            border: 1px solid var(--neon-3); border-radius: 8px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        .action-btn:hover { background: var(--neon-3); color: black; box-shadow: 0 0 15px var(--neon-3); }
        @media (max-width: 768px) { .desktop-only { display: none; } }

        /* --- Fluid Grid Masonry --- */
        .grid-container {
            padding: 20px; display: grid; gap: 20px; max-width: 1400px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }
        @media (max-width: 768px) { 
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(40%, 1fr)); gap: 15px; padding: 15px; }
        }

        .track-box {
            background: black; border-radius: 16px; display: flex; aspect-ratio: 1 / 1;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; position: relative;
            border: 2px solid; color: var(--neon-color); overflow: hidden;
            width: 100%; height: 100%; touch-action: manipulation;
        }
        .track-box:not(.is-editing):hover { transform: scale(1.02); }

        /* Native Drag "Lift" Physics */
        .dragging { 
            transform: scale(1.05) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important; 
            opacity: 1 !important; z-index: 50 !important; 
            transition: transform 0.15s ease, box-shadow 0.15s ease !important; 
        }
        .dragging * { pointer-events: none !important; }

        /* Edit Mode Styles */
        body.is-editing .track-box { cursor: grab; }
        body.is-editing .queue-item-wrapper { cursor: grab; }

        /* Desktop Edit Mode Delete Button */
        @media (min-width: 769px) {
            .delete-box-btn {
                position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
                background: #ff4444; border: 2px solid white; border-radius: 50%;
                color: white; font-weight: bold; font-size: 16px;
                display: none; align-items: center; justify-content: center;
                z-index: 20; cursor: pointer; box-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
            }
            body.is-editing .delete-box-btn { display: flex; }
        }

        /* Mobile Edit Mode Animations & Stretched Delete */
        @media (max-width: 768px) {
            body.is-editing .track-box { animation: jiggle 0.3s infinite; }
            body.is-editing .queue-item-wrapper { animation: jiggle 0.3s infinite; }
            @keyframes jiggle { 0% {transform: rotate(-1deg);} 50% {transform: rotate(1deg);} 100% {transform: rotate(-1deg);} }
            
            .delete-box-btn {
                position: absolute; top: 0; right: 0; width: 100%; height: 35px;
                background: rgba(255, 68, 68, 0.95); border: none; border-bottom: 2px solid white;
                border-radius: 14px 14px 0 0; color: transparent;
                display: none; align-items: center; justify-content: center; z-index: 20; cursor: pointer;
            }
            .delete-box-btn::after {
                content: "DELETE"; color: white; position: absolute; font-size: 14px; letter-spacing: 2px; font-weight: bold;
            }
            body.is-editing .delete-box-btn { display: flex; }
        }

        .flash-active { animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim { 0% { box-shadow: 0 0 40px inset var(--neon-color), 0 0 30px var(--neon-color); } 100% { box-shadow: none; } }

        .track-symbol { 
            font-size: 4rem; 
            text-shadow: 0 0 15px var(--neon-color); 
            filter: drop-shadow(0 0 15px var(--neon-color)); /* Ensures emojis glow on mobile */
            z-index: 1; pointer-events: none; 
        }
        .track-box img { width: 100%; height: 100%; display: block; object-fit: cover; z-index: 0; opacity: 0.8; transition: opacity 0.3s; pointer-events: none; }
        .track-box:hover img { opacity: 0.4; }
        
        .track-box .hover-text {
            position: absolute; top: 25px; z-index: 2; font-weight: bold;
            font-size: 0.95rem; text-transform: uppercase; opacity: 0;
            transition: opacity 0.3s; text-shadow: 2px 2px 4px black;
            pointer-events: none; width: 100%; text-align: center; padding: 0 10px;
        }
        .track-box:not(.is-editing):hover .hover-text { opacity: 1; }
        .track-box.in-queue .hover-text { display: none !important; }
        .track-box.is-playing-glow {
            box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1); border-color: var(--neon-color);
        }

        /* --- Unified Dashboard Panel --- */
        .dashboard {
            position: fixed; top: 0; right: 0; width: 450px; height: 100vh;
            background: var(--panel-bg); border-left: 1px solid #333;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        .dashboard.open { transform: translateX(0); }
        @media (max-width: 768px) { .dashboard { width: 100%; border-left: none; } }

        /* Premium Nav Bar */
        .dashboard-header {
            padding: 16px 20px; border-bottom: 1px solid #222; display: flex;
            justify-content: center; align-items: center; background: #000;
        }
        .dashboard-header button {
            font-size: 1.1rem; font-weight: 600; color: white; text-transform: uppercase;
            letter-spacing: 1px; background: transparent; border: none; cursor: pointer;
            margin: 0; padding: 0;
        }
        .dashboard-header .master-pause { color: var(--neon-1); }

        .queue-container { flex-grow: 1; overflow-y: auto; padding: 20px; overflow-x: hidden; }

        /* --- Premium Queue Cards --- */
        .queue-item-wrapper {
            position: relative; margin-bottom: 16px; background: #ff3b30; 
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
        }
        .trash-bg {
            position: absolute; width: 100%; height: 100%; display: flex;
            justify-content: space-between; align-items: center; padding: 0 24px;
            color: white; font-size: 1.5rem; pointer-events: none; font-weight: bold;
        }

        .queue-item {
            position: relative; width: 100%; display: flex; align-items: stretch;
            background: #0b0b0b; border: 1px solid #333; border-radius: 16px; z-index: 2;
            transition: transform 0.2s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .queue-item.is-playing {
            border-color: var(--neon-color);
            box-shadow: 0 0 20px var(--neon-color), inset 0 0 5px rgba(255,255,255,0.05);
        }

        /* Full Height Edge Buttons */
        .options-btn {
            width: 48px; flex-shrink: 0; background: transparent; border: none;
            border-right: 1px solid #222; color: white; font-size: 24px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            border-radius: 16px 0 0 16px; transition: background 0.2s;
        }
        .options-btn:hover { background: rgba(255,255,255,0.05); }

        .play-pause-btn {
            width: 65px; flex-shrink: 0; background: transparent; border: none;
            border-left: 1px solid #222; color: white; font-size: 26px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 0 16px 16px 0; transition: background 0.2s;
        }
        .play-pause-btn:hover { background: rgba(255,255,255,0.05); }
        .play-pause-btn.active { color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); }

        /* Center Track Info */
        .queue-item-center {
            flex-grow: 1; padding: 16px; display: flex; flex-direction: column; justify-content: center;
            overflow: hidden; touch-action: pan-y;
        }

        .q-name-container {
            display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 8px;
        }

        .q-name { display: inline-block; font-size: 1.1rem; font-weight: bold; color: white; animation: scroll-left-right 8s linear infinite alternate; padding-right: 20px;}
        @keyframes scroll-left-right { 0%, 15% { transform: translateX(0); } 85%, 100% { transform: translateX(-35%); } }
        
        .time-text { 
            font-size: 1rem; color: #fff; cursor: pointer; display: block; width: fit-content; margin: 0 auto 12px auto;
            background: rgba(255,255,255,0.15); padding: 8px 24px; border-radius: 20px;
            font-weight: bold; transition: background 0.2s; text-align: center;
        }
        .time-text:hover { background: rgba(255,255,255,0.25); text-decoration: none; }

        /* Touch Friendly Volume & Progress Sliders */
        .sliders-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .progress-container { width: 100%; }
        .volume-control { display: flex; align-items: center; gap: 12px; }
        
        input[type="range"] {
            -webkit-appearance: none; background: rgba(255,255,255,0.15);
            height: 6px; border-radius: 3px; outline: none; flex-grow: 1; cursor: pointer; width: 100%;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: var(--neon-color, white); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.8);
        }

        /* --- Frosted Bottom Sheet (iOS Style) --- */
        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: flex-end; justify-content: center; z-index: 3000;
        }
        .bottom-sheet {
            background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(25px);
            width: 100%; max-width: 500px; border-radius: 24px 24px 0 0;
            padding: 24px; transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-sheet.open { transform: translateY(0); }
        
        .sheet-group { background: rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
        .sheet-btn {
            width: 100%; padding: 18px; background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.05); color: white;
            font-size: 1.1rem; text-align: center; cursor: pointer; font-weight: 500;
        }
        .sheet-btn:last-child { border-bottom: none; }
        .sheet-btn:active { background: rgba(255,255,255,0.15); }
        .sheet-cancel { font-weight: bold; }

        /* Floating Action Buttons */
        .fab, .fab-home {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 64px; height: 64px; border-radius: 50%; background: black;
            border: 2px solid var(--neon-3); color: var(--neon-3); font-size: 1.8rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            z-index: 999; box-shadow: 0 0 20px var(--neon-3); transition: all 0.3s;
        }
        .fab-home { display: none; border-color: var(--neon-2); color: var(--neon-2); box-shadow: 0 0 20px var(--neon-2); }
        
        .fab-stop-edit {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
            width: 56px; height: 56px; border-radius: 50%; background: black;
            border: 2px solid var(--neon-4); color: var(--neon-4); font-size: 1.5rem;
            display: none; align-items: center; justify-content: center; cursor: pointer;
            z-index: 999; box-shadow: 0 0 15px var(--neon-4); transition: all 0.3s;
        }

        .fab:hover, .fab-home:hover, .fab-stop-edit:hover { background: currentColor; color: black; transform: translateX(-50%) scale(1.1); }
        
        @media (min-width: 769px) { .fab, .fab-home, .fab-stop-edit { display: none !important; } }
        @media (max-width: 768px) { body.is-editing .fab-stop-edit { display: flex; } }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal {
            background: #111; padding: 30px; border-radius: 16px; border: 1px solid var(--neon-4); 
            text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 30px var(--neon-4);
        }
        .modal h2 { margin-bottom: 20px; color: var(--text); }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;}
        .modal-buttons button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;}
        .btn-auto { background: var(--neon-2); color: black; }
        .btn-keep { background: transparent; border: 1px solid white; color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-cancel { margin-top:20px; background:none; border:none; color:#777; cursor:pointer; font-size: 14px;}

        .color-options { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px;}
        .color-swatch { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: transform 0.2s; }
        .color-swatch:hover { transform: scale(1.1); }
        input[type="color"] { width: 48px; height: 48px; border: none; border-radius: 50%; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }

        .symbol-modal { max-width: 600px; }
        .symbol-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
            gap: 12px; max-height: 300px; overflow-y: auto; padding: 10px;
            background: #000; border-radius: 12px; border: 1px solid #333;
        }
        .sym-item { font-size: 1.8rem; cursor: pointer; padding: 5px; border-radius: 8px; transition: background 0.2s; }
        .sym-item:hover { background: #333; }
        #hidden-players { display: none; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="mainWrapper">
        <div class="header-container">
            <h1>Super Simple Soundboard</h1>
            <div class="input-group">
                <input type="text" id="youtubeLink" placeholder="Paste YouTube link here...">
                <button class="btn-primary" id="uploadYTBtn">Add YouTube Link</button>
                <button class="btn-secondary" id="triggerMp3Btn">Upload MP3</button>
                <input type="file" id="mp3Input" accept="audio/mp3, audio/mpeg" style="display: none;">
            </div>
            <div class="header-controls">
                <button class="action-btn desktop-only" id="toggleDesktopBtn">Toggle Queue</button>
                <button class="action-btn desktop-only" id="editGridBtn">Edit Grid</button>
            </div>
        </div>

        <div class="grid-container" id="gridContainer"></div>
    </div>

    <div class="fab" id="fab">☰</div>
    <div class="fab-home" id="fabHome">🏠</div>
    <div class="fab-stop-edit" id="fabStopEdit">👍</div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <button class="master-pause" id="masterPauseBtn">Pause All</button>
        </div>
        <div class="queue-container" id="queueContainer"></div>
    </div>

    <div id="hidden-players"></div>

    <div class="bottom-sheet-overlay" id="bottomSheetOverlay">
        <div class="bottom-sheet" id="bottomSheet">
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-loop">Loop</button>
                <button class="sheet-btn" id="bs-fade">Fade to Pause</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-dup">Duplicate Track</button>
                <button class="sheet-btn" id="bs-link">Change Link</button>
                <button class="sheet-btn" id="bs-rename">Rename Track</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-art">Album Art</button>
                <button class="sheet-btn" id="bs-color">Color</button>
                <button class="sheet-btn" id="bs-symbol">Symbol</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn sheet-cancel" id="bs-cancel">Cancel</button>
                <button class="sheet-btn sheet-delete" id="bs-delete" style="color: #ff4444; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: none;">Delete Track</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="imageModal">
        <div class="modal">
            <h2>Process Album Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnAutoAdjust">Auto Adjust (1:1)</button>
                <button class="btn-keep" id="btnKeepAspect">Do Not Adjust</button>
            </div>
            <button class="btn-cancel" id="btnCancelImg">Cancel</button>
        </div>
    </div>
    <div class="modal-overlay" id="replaceArtModal">
        <div class="modal">
            <h2>Manage Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnReplaceArt">Replace Art</button>
                <button class="btn-danger" id="btnRemoveArt">Remove Art</button>
            </div>
            <button class="btn-cancel" id="btnCancelReplace">Cancel</button>
        </div>
    </div>
    <input type="file" id="hiddenFileInput" accept="image/*" style="display: none;">

    <div class="modal-overlay" id="colorModal">
        <div class="modal">
            <h2>Select Color</h2>
            <div class="color-options">
                <div class="color-swatch" style="background: #fc0e12; box-shadow: 0 0 10px #fc0e12;" data-color="#fc0e12"></div>
                <div class="color-swatch" style="background: #00fff7; box-shadow: 0 0 10px #00fff7;" data-color="#00fff7"></div>
                <div class="color-swatch" style="background: #ff00fc; box-shadow: 0 0 10px #ff00fc;" data-color="#ff00fc"></div>
                <div class="color-swatch" style="background: #fff500; box-shadow: 0 0 10px #fff500;" data-color="#fff500"></div>
                <input type="color" id="nativeColorPicker" value="#ffffff" title="Custom Color">
            </div>
            <button class="btn-cancel" id="btnCancelColor">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="symbolModal">
        <div class="modal symbol-modal">
            <h2>Select Symbol</h2>
            <div class="symbol-grid" id="symbolGrid"></div>
            <button class="btn-cancel" id="btnCancelSymbol">Cancel</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- State & Constants ---
        const neonColors = ['#fc0e12', '#00fff7', '#ff00fc', '#fff500'];
        const defaultMusicSymbols = ['♫', '𝄞', '♪', '𝄢', '𝄽', '♬', '♮', '𝄡'];

        // --- IndexedDB Setup ---
        const DB_NAME = 'SuperSimpleDB'; let db;
        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 4);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('tracks')) db.createObjectStore('tracks', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }
        function saveTrackToDB(track) { db.transaction('tracks', 'readwrite').objectStore('tracks').put(track); }
        function saveAllTracksToDB() { const tx = db.transaction('tracks', 'readwrite'); tracks.forEach(t => tx.objectStore('tracks').put(t)); }
        function deleteTrackFromDB(id) { db.transaction('tracks', 'readwrite').objectStore('tracks').delete(id); }
        function loadTracksFromDB() {
            return new Promise((resolve) => {
                const req = db.transaction('tracks', 'readonly').objectStore('tracks').getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        // --- Queue Persistence ---
        function saveQueueState() {
            const state = queue.map(q => ({
                queueId: q.queueId, trackId: q.trackId, type: q.type, ytId: q.ytId,
                name: q.name, color: q.color, state: q.state, duration: q.duration,
                isLooping: q.isLooping, volume: q.volume,
                currentTime: (q.playerAPI) ? q.playerAPI.getCurrentTime() : q.currentTime
            }));
            localStorage.setItem('SuperSimpleQueue', JSON.stringify(state));
        }
        function loadQueueState() { const data = localStorage.getItem('SuperSimpleQueue'); return data ? JSON.parse(data) : []; }

            populateSymbolGrid(); renderGrid();

            const savedQueue = loadQueueState();
            savedQueue.forEach(q => restoreQueueItem(q));

            setupEventListeners(); startUITracker();
            setInterval(saveQueueState, 5000);

        // --- Drag & Drop Core ---
        function setupDragAndDrop(container, itemClass, callback) {
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientX, e.clientY, itemClass);
                const draggable = document.querySelector('.dragging');
                if(!draggable) return;
                if (afterElement == null) container.appendChild(draggable);
                else container.insertBefore(draggable, afterElement);
            });
            container.addEventListener('drop', () => {
                document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                callback();
            });
        }
        function getDragAfterElement(container, x, y, itemClass) {
            const elements = [...container.querySelectorAll(`.${itemClass}:not(.dragging)`)];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                if(itemClass === 'track-box' && (x < box.left || x > box.right)) return closest; 
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // --- Fetch YouTube Title ---
        async function fetchYTTitle(ytId) {
            try {
                const oembedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${ytId}&format=json`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(oembedUrl)}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                const contents = JSON.parse(data.contents);
                return contents.title || `Track ${tracks.length + 1}`;
            } catch(e) { return `Track ${tracks.length + 1}`; }
        }

        // --- Add Tracks ---
        async function handleAddYTTrack() {
            const input = document.getElementById('youtubeLink');
            const url = input.value.trim(); if (!url) return;
            const ytId = extractVideoId(url); if (!ytId) return alert('Invalid YouTube URL');

            const newTrack = createBaseTrackObj('yt', ytId, "Grabbing YouTube Title...");
            tracks.push(newTrack); saveTrackToDB(newTrack); renderGrid(); input.value = '';

            const title = await fetchYTTitle(ytId);
            updateTrackData(newTrack.id, { baseName: title });
        }

        function handleAddMP3(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64Audio = event.target.result;
                const newTrack = createBaseTrackObj('mp3', null, file.name.replace(/\.[^/.]+$/, ""));
                newTrack.localAudio = base64Audio;
                tracks.push(newTrack); saveTrackToDB(newTrack); renderGrid();
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }

        function createBaseTrackObj(type, ytId, baseName) {
            const t = {
                id: 'track_' + Date.now(), type, ytId, baseName,
                color: neonColors[colorIndex], symbol: allSymbolsList[symbolIndex],
                customImage: null, autoAdjustImg: true
            };
            colorIndex = (colorIndex + 1) % neonColors.length;
            symbolIndex = (symbolIndex + 1) % allSymbolsList.length;
            return t;
        }

        function extractVideoId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function updateTrackOrder() {
            const domItems = document.querySelectorAll('.track-box');
            const newTracks = [];
            domItems.forEach(el => {
                const t = tracks.find(tr => tr.id === el.dataset.trackId);
                if(t) newTracks.push(t);
            });
            tracks = newTracks; saveAllTracksToDB();
        }

        function updateGridGlow() {
            document.querySelectorAll('.track-box').forEach(box => {
                const tId = box.dataset.trackId;
                const inQ = queue.filter(q => q.trackId === tId);
                if (inQ.length > 0) {
                    box.classList.add('in-queue');
                    if(inQ.some(q => q.state === 'PLAYING')) box.classList.add('is-playing-glow');
                    else box.classList.remove('is-playing-glow');
                } else {
                    box.classList.remove('in-queue', 'is-playing-glow');
                }
            });
        }

        // --- Main Grid UI ---
        function renderGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';

            tracks.forEach(track => {
                const box = document.createElement('div');
                box.className = 'track-box';
                box.style.setProperty('--neon-color', track.color);
                box.dataset.trackId = track.id;
                
                let pressTimer;
                const startPress = () => { if(!isEditing) pressTimer = setTimeout(toggleEditMode, 800); };
                const cancelPress = () => { clearTimeout(pressTimer); };
                
                box.addEventListener('touchstart', (e) => {
                    if(isEditing) { box.draggable = true; } else { startPress(); }
                }, {passive: true});
                box.addEventListener('touchend', cancelPress);
                box.addEventListener('touchmove', cancelPress);
                
                box.addEventListener('dragstart', (e) => { if(!box.draggable) e.preventDefault(); else box.classList.add('dragging'); });
                box.addEventListener('dragend', () => { box.classList.remove('dragging'); box.draggable = false; });
                
                if (track.customImage) {
                    const img = document.createElement('img'); img.src = track.customImage; box.appendChild(img);
                } else {
                    const sym = document.createElement('div'); sym.className = 'track-symbol';
                    sym.textContent = track.symbol; box.appendChild(sym);
                }

                const hoverTxt = document.createElement('div');
                hoverTxt.className = 'hover-text'; hoverTxt.textContent = track.baseName;
                box.appendChild(hoverTxt);

                const delBtn = document.createElement('div');
                delBtn.className = 'delete-box-btn';
                delBtn.onclick = (e) => {
                    e.stopPropagation(); deleteTrackFromDB(track.id);
                    tracks = tracks.filter(t => t.id !== track.id);
                    queue.filter(q => q.trackId === track.id).forEach(q => removeQueueItem(q.queueId));
                    renderGrid();
                };
                if(window.innerWidth > 768) delBtn.textContent = 'X';
                box.appendChild(delBtn);

                box.addEventListener('click', (e) => {
                    if(isEditing || e.target === delBtn) return; 
                    
                    const existing = queue.filter(q => q.trackId === track.id);
                    if(existing.length > 0) {
                        if (window.innerWidth <= 768) {
                            existing.forEach(q => {
                                if (q.playerAPI) {
                                    if (q.state === 'PLAYING') q.playerAPI.pause();
                                    else q.playerAPI.play();
                                }
                            });
                        } else {
                            existing.forEach(q => removeQueueItem(q.queueId));
                        }
                    } else {
                        addToQueue(track);
                        box.classList.add('flash-active');
                        setTimeout(() => box.classList.remove('flash-active'), 300);
                        if(!isDashboardOpen && window.innerWidth > 768) toggleDashboard();
                    }
                });
                container.appendChild(box);
            });
            updateGridGlow();
        }

        // --- Dashboard & Queue Logic ---
        function toggleDashboard() {
            isDashboardOpen = !isDashboardOpen;
            document.getElementById('dashboard').classList.toggle('open');
            document.getElementById('mainWrapper').classList.toggle('push-active');
            
            if(isDashboardOpen) {
                document.getElementById('fab').style.display = 'none';

                document.getElementById('fab').style.display = '';
                document.getElementById('fabHome').style.display = 'none';

        function addToQueue(track, exactCurrentTime = 0) {
            const count = queue.filter(q => q.trackId === track.id).length;
            const name = count > 0 ? `${track.baseName} (${count + 1})` : track.baseName;
            let startState = window.innerWidth <= 768 ? 'PLAYING' : 'PAUSED';

            const qItem = {
                queueId: 'q_' + Date.now() + Math.floor(Math.random() * 1000), 
                trackId: track.id, type: track.type, ytId: track.ytId,
                name, color: track.color, playerAPI: null, state: startState,
                duration: 0, isLooping: false, volume: 50, currentTime: exactCurrentTime, isScrubbing: false
            };
            queue.push(qItem); renderQueue(); initializePlayer(qItem, track); saveQueueState();
        }

        function restoreQueueItem(savedQ) {
            const baseTrack = tracks.find(t => t.id === savedQ.trackId);
            if(!baseTrack) return;
            const qItem = { ...savedQ, color: baseTrack.color, playerAPI: null, isScrubbing: false };
            queue.push(qItem); renderQueue(); initializePlayer(qItem, baseTrack, true);
        }

        function initializePlayer(qItem, baseTrack, isRestore = false) {
            if(qItem.type === 'mp3') {
                const audio = new Audio(baseTrack.localAudio);
                qItem.playerAPI = {
                    play: () => audio.play(), pause: () => audio.pause(),
                    stop: () => { audio.pause(); audio.currentTime = 0; },
                    seekTo: (s) => audio.currentTime = s, setVolume: (v) => audio.volume = v / 100,
                    getDuration: () => audio.duration, getCurrentTime: () => audio.currentTime,
                    destroy: () => { audio.pause(); audio.src = ''; }
                };
                
                audio.onloadedmetadata = () => {
                    qItem.duration = audio.duration; audio.volume = qItem.volume / 100;
                    if(qItem.currentTime > 0) audio.currentTime = qItem.currentTime;
                    updateQueueUI();
                };
                audio.onended = () => {
                    if (qItem.isLooping) audio.play();
                    else { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
                };
                audio.onplay = () => { qItem.state = 'PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();};
                audio.onpause = () => { if(!qItem.isScrubbing) { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();} };
                
                if(isRestore && qItem.state === 'PLAYING') audio.play();
                if(!isRestore && qItem.state === 'PLAYING') audio.play();

            } else {
                const div = document.createElement('div'); div.id = `player_${qItem.queueId}`;
                document.getElementById('hidden-players').appendChild(div);

                const ytPlayer = new YT.Player(`player_${qItem.queueId}`, {
                    height: '0', width: '0', videoId: qItem.ytId,
                    playerVars: { 'autoplay': 0, 'controls': 0 },
                    events: {
                        'onReady': (event) => {
                            qItem.playerAPI = {
                                play: () => ytPlayer.playVideo(), pause: () => ytPlayer.pauseVideo(),
                                stop: () => { ytPlayer.stopVideo(); ytPlayer.seekTo(0); },
                                seekTo: (s) => ytPlayer.seekTo(s, true), setVolume: (v) => ytPlayer.setVolume(v),
                                getDuration: () => ytPlayer.getDuration(), getCurrentTime: () => ytPlayer.getCurrentTime(),
                                destroy: () => ytPlayer.destroy()
                            };
                            qItem.duration = ytPlayer.getDuration() || qItem.duration;
                            ytPlayer.setVolume(qItem.volume);
                            if(qItem.currentTime > 0) ytPlayer.seekTo(qItem.currentTime);
                            
                            setTimeout(() => { if(qItem.state === 'PLAYING') ytPlayer.playVideo(); }, 200);
                            updateQueueUI();
                        },
                        'onStateChange': (event) => {
                            if (event.data === YT.PlayerState.ENDED) {
                                if (qItem.isLooping) ytPlayer.playVideo();
                                else { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
                            } else if (event.data === YT.PlayerState.PLAYING) {
                                qItem.state = 'PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();
                            } else if (event.data === YT.PlayerState.PAUSED && !qItem.isScrubbing) {
                                qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();
                            }
                        }
                    }
                });
            }
        }

        function fadeOut(qItem) {
            if (!qItem.playerAPI || qItem.state !== 'PLAYING') return;
            let vol = qItem.volume;
            const fadeInterval = setInterval(() => {
                vol -= 2;
                if (vol <= 0) {
                    vol = 0; clearInterval(fadeInterval);
                    qItem.playerAPI.setVolume(0); qItem.playerAPI.pause();
                    qItem.volume = 0; updateQueueUI(); saveQueueState();
                } else {
                    qItem.playerAPI.setVolume(vol); qItem.volume = vol;
                    const slider = document.querySelector(`.queue-item-wrapper[data-queue-id="${qItem.queueId}"] .vol-slider`);
                    if(slider) slider.value = vol;
                }
            }, 50);
        }

        function renderQueue() {
            const container = document.getElementById('queueContainer'); container.innerHTML = '';
            queue.forEach(qItem => {
                const wrapper = document.createElement('div');
                wrapper.className = 'queue-item-wrapper';
                wrapper.dataset.queueId = qItem.queueId;
                
                const trashBg = document.createElement('div');
                trashBg.className = 'trash-bg'; trashBg.innerHTML = '<span>🗑️</span><span>🗑️</span>';
                
                const el = document.createElement('div');
                el.className = `queue-item ${qItem.state === 'PLAYING' ? 'is-playing' : ''}`;
                el.style.setProperty('--neon-color', qItem.color);

                const playIcon = qItem.state === 'PLAYING' ? '⏸' : '▶';
                const playClass = qItem.state === 'PLAYING' ? 'active' : '';

                el.innerHTML = `
                    <button class="options-btn">⋮</button>
                    <div class="queue-item-center swipe-zone">
                        <div class="q-name-container">
                            <span class="q-name" title="${qItem.name}">${qItem.name}</span>
                        </div>
                        <div class="time-text" id="timeTxt_${qItem.queueId}">${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}</div>
                        <div class="sliders-container">
                            <div class="progress-container">
                                <input type="range" class="progress-slider" id="slider_${qItem.queueId}" min="0" max="${qItem.duration}" value="${qItem.currentTime}">
                            </div>
                            <div class="volume-control">
                                <span>🔈</span><input type="range" min="0" max="100" value="${qItem.volume}" class="vol-slider"><span>🔊</span>
                            </div>
                        </div>
                    </div>
                    <button class="play-pause-btn ${playClass}">${playIcon}</button>
                `;

                wrapper.appendChild(trashBg);
                wrapper.appendChild(el);

                let pressTimerQ;
                wrapper.addEventListener('touchstart', (e) => {
                    if(isEditing) { wrapper.draggable = true; }
                    else { pressTimerQ = setTimeout(toggleEditMode, 800); }
                }, {passive: true});
                wrapper.addEventListener('touchend', () => clearTimeout(pressTimerQ));
                wrapper.addEventListener('touchmove', () => clearTimeout(pressTimerQ));

                wrapper.addEventListener('dragstart', (e) => { if(!wrapper.draggable) e.preventDefault(); else wrapper.classList.add('dragging'); });
                wrapper.addEventListener('dragend', () => { wrapper.classList.remove('dragging'); wrapper.draggable = false; });

                // Buttons
                el.querySelector('.options-btn').onclick = () => openBottomSheet(qItem.queueId, qItem.type, qItem.isLooping);
                el.querySelector('.play-pause-btn').onclick = () => { 
                    if(!qItem.playerAPI) return;
                    if(qItem.state === 'PLAYING') qItem.playerAPI.pause(); else qItem.playerAPI.play();
                };
                
                el.querySelector('.vol-slider').oninput = (e) => {
                    qItem.volume = e.target.value;
                    if(qItem.playerAPI) qItem.playerAPI.setVolume(qItem.volume);
                    saveQueueState();
                };

                const timeTxt = el.querySelector('.time-text');
                timeTxt.onclick = () => promptTimeEntry(qItem);

                // Swipe-to-Dismiss Logic
                let startX = 0; let currentX = 0; let isSwiping = false;
                const swipeZone = el.querySelector('.swipe-zone');
                
                swipeZone.addEventListener('pointerdown', (e) => {
                    if(window.innerWidth > 768) return; // Disable on desktop
                    if(isEditing || e.target.tagName.toLowerCase() === 'input') return;
                    isSwiping = true; startX = e.clientX;
                    el.style.transition = 'none';
                    swipeZone.setPointerCapture(e.pointerId);
                });
                swipeZone.addEventListener('pointermove', (e) => {
                    if(!isSwiping) return;
                    currentX = e.clientX - startX;
                    el.style.transform = `translateX(${currentX}px)`;
                });
                
                const handleSwipeEnd = (e) => {
                    if(!isSwiping) return;
                    isSwiping = false; swipeZone.releasePointerCapture(e.pointerId);
                    if(Math.abs(currentX) > el.offsetWidth * 0.4) {
                        el.style.transition = 'transform 0.2s ease-out';
                        el.style.transform = `translateX(${currentX > 0 ? 100 : -100}%)`;
                        setTimeout(() => removeQueueItem(qItem.queueId), 200);
                    } else {
                        el.style.transition = 'transform 0.2s ease-out';
                        el.style.transform = `translateX(0)`;
                    }
                    currentX = 0;
                };
                swipeZone.addEventListener('pointerup', handleSwipeEnd);
                swipeZone.addEventListener('pointercancel', handleSwipeEnd);

                container.appendChild(wrapper);
            });
            updateGridGlow();
        }

        function updateQueueUI() { renderQueue(); }
        function updateQueueOrder() {
            const domItems = document.querySelectorAll('.queue-item-wrapper'); const newQueue = [];
            domItems.forEach(el => {
                const item = queue.find(q => q.queueId === el.dataset.queueId);
                if(item) newQueue.push(item);
            });
            queue = newQueue; saveQueueState();
        }

        function removeQueueItem(queueId) {
            const index = queue.findIndex(q => q.queueId === queueId);
            if(index > -1) {
                if(queue[index].playerAPI) queue[index].playerAPI.destroy();
                const div = document.getElementById(`player_${queueId}`); if(div) div.remove();
                queue.splice(index, 1); updateQueueUI(); saveQueueState(); updateGridGlow();
            }
        }

        function masterPause() { queue.forEach(q => { if(q.state === 'PLAYING' && q.playerAPI) q.playerAPI.pause(); }); }

        // --- Time Tracker ---
        function startUITracker() {
            if(timeTrackerInterval) clearInterval(timeTrackerInterval);
            timeTrackerInterval = setInterval(() => {
                queue.forEach(qItem => {
                    if (qItem.state === 'PLAYING' && qItem.playerAPI && !qItem.isScrubbing) {
                        qItem.currentTime = qItem.playerAPI.getCurrentTime() || 0;
                        qItem.duration = qItem.playerAPI.getDuration() || qItem.duration;
                        const timeEl = document.getElementById(`timeTxt_${qItem.queueId}`);
                        const sliderEl = document.getElementById(`slider_${qItem.queueId}`);
                        if(timeEl) timeEl.textContent = `${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}`;
                        if(sliderEl) { sliderEl.max = qItem.duration; sliderEl.value = qItem.currentTime; }
                    }
                });
            }, 500);
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function promptTimeEntry(qItem) {
            const input = prompt("Enter specific time (MM:SS):", formatTime(qItem.currentTime));
            if(!input) return;
            
            let seconds = 0; const parts = input.split(':');
            if(parts.length === 2) seconds = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
            else seconds = parseInt(input);

            if(isNaN(seconds)) return alert("Invalid time format.");
            if(seconds > qItem.duration) seconds = qItem.duration;
            
            qItem.currentTime = seconds;
            if(qItem.playerAPI) qItem.playerAPI.seekTo(seconds);
            updateQueueUI(); saveQueueState();
        }

        // --- Customization ---
        function handleFileSelect(e) {
            if(!e.target.files[0]) return;
            pendingImageFile = e.target.files[0];
            document.getElementById('imageModal').style.display = 'flex';
            e.target.value = '';
        }

        async function processPendingImage(autoAdjust) {
            if(!pendingImageFile || !activeTargetTrackId) return hideModal('imageModal');
            const base64Data = await readImageFile(pendingImageFile, autoAdjust);
            updateTrackData(activeTargetTrackId, { customImage: base64Data, autoAdjustImg: autoAdjust });
            hideModal('imageModal');
        }

        function readImageFile(file, autoAdjust) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!autoAdjust) resolve(e.target.result);
                    else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = Math.min(img.width, img.height);
                            canvas.width = size; canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            const x = (img.width - size) / 2; const y = (img.height - size) / 2;
                            ctx.drawImage(img, x, y, size, size, 0, 0, size, size);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function applyColorChange(hexColor) {
            if(!activeTargetTrackId) return;
            updateTrackData(activeTargetTrackId, { color: hexColor });
            hideModal('colorModal');
        }

        function populateSymbolGrid() {
            const grid = document.getElementById('symbolGrid');
            allSymbolsList.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'sym-item'; div.textContent = sym;
                div.onclick = () => {
                    if(activeTargetTrackId) { updateTrackData(activeTargetTrackId, { symbol: sym, customImage: null }); hideModal('symbolModal'); }
                };
                grid.appendChild(div);
            });
        }

        function updateTrackData(trackId, updatesObj) {
            const tIndex = tracks.findIndex(t => t.id === trackId);
            if(tIndex > -1) { tracks[tIndex] = { ...tracks[tIndex], ...updatesObj }; saveTrackToDB(tracks[tIndex]); }
            queue.forEach(q => {
                if(q.trackId === trackId) {
                    if(updatesObj.color) q.color = updatesObj.color;
                    if(updatesObj.baseName) {
                        if(q.name.startsWith("Track ") || q.name === "Grabbing YouTube Title...") q.name = updatesObj.baseName;
                    }
                }
            });
            renderGrid(); updateQueueUI(); saveQueueState();
        }
    </script>
</body>
