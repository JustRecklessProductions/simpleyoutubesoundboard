<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Simple Soundboard</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --panel-bg: #111;
            --text: #ffffff;
            --neon-1: #fc0e12;
            --neon-2: #00fff7;
            --neon-3: #ff00fc;
            --neon-4: #fff500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            display: flex;
            height: 100vh;
        }

        /* --- Main Content Area --- */
        .main-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            transition: padding-right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* --- Input Section --- */
        .header-container {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        h1 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        input[type="text"] {
            flex-grow: 1; padding: 12px; background: #222;
            border: 1px solid #444; color: white; border-radius: 6px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--neon-2); }

        button.btn-primary {
            padding: 12px 24px; background: transparent; color: white;
            border: 1px solid var(--neon-2); border-radius: 6px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        button.btn-primary:hover {
            background: var(--neon-2); color: black; box-shadow: 0 0 15px var(--neon-2);
        }

        .toggle-desktop-btn {
            display: none; padding: 12px 24px; background: transparent;
            color: var(--neon-3); border: 1px solid var(--neon-3);
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
            font-weight: bold; transition: all 0.3s;
        }
        .toggle-desktop-btn:hover {
            background: var(--neon-3); color: black; box-shadow: 0 0 15px var(--neon-3);
        }

        /* --- True Masonry Grid (CSS Columns) --- */
        .masonry-container {
            padding: 20px;
            column-count: 4;
            column-gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .track-box {
            break-inside: avoid;
            background: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            border: 2px solid;
            color: var(--neon-color);
            margin-bottom: 15px;
        }

        /* Crucial Fix: Only apply 1:1 if the class exists */
        .track-box.aspect-square { aspect-ratio: 1 / 1; }

        .track-box:hover { transform: scale(1.03); }
        .track-box.dragging { opacity: 0.4; }
        
        /* Anti-Flicker D&D Fix */
        .dragging * { pointer-events: none !important; }

        /* Transparent Drag Header */
        .drag-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 25px;
            background: transparent; z-index: 10; display: flex;
            align-items: center; justify-content: center; cursor: grab;
            opacity: 0; transition: opacity 0.2s;
        }
        .drag-header:active { cursor: grabbing; }
        .drag-header::after {
            content: "в ҝ"; color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem; letter-spacing: 2px;
        }
        .track-box:hover .drag-header { opacity: 1; }

        .track-symbol {
            font-size: 3.5rem; text-shadow: 0 0 15px var(--neon-color);
            z-index: 1; pointer-events: none; padding: 40px 10px;
        }

        .track-box img {
            width: 100%; display: block; object-fit: cover; z-index: 0;
            opacity: 0.8; transition: opacity 0.3s; pointer-events: none;
        }
        .track-box:hover img { opacity: 0.4; }
        
        /* Updated Hover Text Position */
        .track-box .hover-text {
            position: absolute; top: 25px; z-index: 2; font-weight: bold;
            font-size: 0.9rem; text-transform: uppercase; opacity: 0;
            transition: opacity 0.3s; text-shadow: 2px 2px 4px black;
            pointer-events: none; width: 100%; text-align: center;
        }
        .track-box:hover .hover-text { opacity: 1; }

        /* --- Dashboard Panel --- */
        .dashboard {
            position: fixed; top: 0; right: 0; width: 450px; height: 100vh;
            background: var(--panel-bg); border-left: 1px solid #333;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000; display: flex; flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.8);
        }

        .dashboard.open { transform: translateX(0); }

        .dashboard-header {
            padding: 20px; border-bottom: 1px solid #333; display: flex;
            justify-content: space-between; align-items: center; background: #000;
        }

        .close-btn { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

        .master-pause {
            background: transparent; color: var(--neon-1); border: 1px solid var(--neon-1);
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .master-pause:hover { background: var(--neon-1); color: black; box-shadow: 0 0 10px var(--neon-1); }

        .queue-container { flex-grow: 1; overflow-y: auto; padding: 15px; }

        /* --- Queue Items --- */
        .queue-item {
            background: #000; border: 1px solid #444; border-radius: 8px;
            margin-bottom: 15px; position: relative; transition: all 0.3s;
            display: flex; overflow: hidden; /* New flex layout for delete bar */
        }
        .queue-item.dragging { opacity: 0.5; }

        .queue-item.is-playing {
            border-color: var(--neon-color);
            box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1);
        }

        .queue-item-inner {
            flex-grow: 1; padding: 15px; padding-top: 25px;
            display: flex; flex-direction: column;
        }

        .q-drag-header {
            position: absolute; top: 0; left: 0; width: calc(100% - 30px); height: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; background: transparent; z-index: 5;
        }
        .q-drag-header:active { cursor: grabbing; }
        .q-drag-header::after { content: "в ҝ"; color: rgba(255, 255, 255, 0.5); font-size: 1rem; }

        /* Sleek Right Side Delete Bar */
        .queue-delete-bar {
            width: 30px; background: #220000; border-left: 1px solid #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; color: #ff4444; font-weight: bold;
        }
        .queue-delete-bar:hover { background: #ff4444; color: white; }

        .queue-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; color: var(--neon-color); font-weight: bold;
        }

        /* Progress Bar & Time */
        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .time-text { font-size: 0.85rem; color: #aaa; cursor: pointer; min-width: 80px; }
        .time-text:hover { color: white; text-decoration: underline; }
        .progress-slider { flex-grow: 1; accent-color: var(--neon-color); cursor: pointer; }

        .queue-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .control-btn {
            background: #222; color: white; border: 1px solid #444;
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
            font-size: 0.85rem; font-weight: bold;
        }
        .control-btn:hover { background: #444; border-color: var(--neon-color); }
        .control-btn.active { background: var(--neon-color); color: black; box-shadow: 0 0 10px var(--neon-color); }
        .control-btn.play-pause-btn { min-width: 40px; }

        .volume-control { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .volume-control input[type="range"] { flex-grow: 1; accent-color: var(--neon-color); }

        /* --- Responsive Logic --- */
        @media (min-width: 769px) {
            .toggle-desktop-btn { display: block; }
            .fab { display: none !important; }
            .main-wrapper.push-active { padding-right: 450px; }
        }
        @media (max-width: 1024px) { .masonry-container { column-count: 3; } }
        @media (max-width: 768px) {
            .masonry-container { column-count: 2; }
            .dashboard { width: 100%; border-left: none; }
            .input-group { flex-direction: column; }
        }
        @media (max-width: 480px) { .masonry-container { column-count: 1; } }

        /* --- Mobile FAB --- */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: black; border: 2px solid var(--neon-3);
            color: var(--neon-3); font-size: 1.5rem; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 999;
            box-shadow: 0 0 15px var(--neon-3); transition: all 0.3s;
        }
        .fab:hover { background: var(--neon-3); color: black; transform: scale(1.1); }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal {
            background: #111; padding: 30px; border-radius: 12px;
            border: 1px solid var(--neon-4); text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 0 30px var(--neon-4);
        }
        .modal h2 { margin-bottom: 20px; color: var(--text); }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px;}
        .modal-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-auto { background: var(--neon-2); color: black; }
        .btn-keep { background: transparent; border: 1px solid white; color: white; }
        .btn-cancel { margin-top:20px; background:none; border:none; color:#777; cursor:pointer; }

        /* Color Picker Setup */
        .color-options { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px;}
        .color-swatch {
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            border: 2px solid #fff; transition: transform 0.2s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        input[type="color"] {
            width: 45px; height: 45px; border: none; border-radius: 50%;
            cursor: pointer; background: transparent;
        }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }

        /* Symbol Grid */
        .symbol-modal { max-width: 600px; }
        .symbol-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px;
            background: #000; border-radius: 8px; border: 1px solid #333;
        }
        .sym-item {
            font-size: 1.5rem; cursor: pointer; padding: 5px; border-radius: 4px; transition: background 0.2s;
        }
        .sym-item:hover { background: #333; }

        #hidden-players { display: none; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="mainWrapper">
        <div class="header-container">
            <h1>Super Simple Soundboard</h1>
            <div class="input-group">
                <input type="text" id="youtubeLink" placeholder="Paste YouTube link here...">
                <button class="btn-primary" id="uploadBtn">Add Track</button>
                <button class="toggle-desktop-btn" id="toggleDesktopBtn">Toggle Queue</button>
            </div>
        </div>

        <div class="masonry-container" id="masonryContainer"></div>
    </div>

    <div class="fab" id="fab">вҳ°</div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <button class="master-pause" id="masterPauseBtn">вҸё Pause All</button>
            <h2 style="color: white; font-weight: 300;">QUEUE</h2>
            <button class="close-btn" id="closeDashboard">&times;</button>
        </div>
        <div class="queue-container" id="queueContainer"></div>
    </div>

    <div id="hidden-players"></div>

    <div class="modal-overlay" id="imageModal">
        <div class="modal">
            <h2>Process Album Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnAutoAdjust">Auto Adjust (1:1)</button>
                <button class="btn-keep" id="btnKeepAspect">Do Not Adjust</button>
            </div>
            <button class="btn-cancel" id="btnCancelImg">Cancel</button>
        </div>
    </div>
    <input type="file" id="hiddenFileInput" accept="image/*" style="display: none;">

    <div class="modal-overlay" id="colorModal">
        <div class="modal">
            <h2>Select Color</h2>
            <div class="color-options" id="colorOptions">
                <div class="color-swatch" style="background: #fc0e12; box-shadow: 0 0 10px #fc0e12;" data-color="#fc0e12"></div>
                <div class="color-swatch" style="background: #00fff7; box-shadow: 0 0 10px #00fff7;" data-color="#00fff7"></div>
                <div class="color-swatch" style="background: #ff00fc; box-shadow: 0 0 10px #ff00fc;" data-color="#ff00fc"></div>
                <div class="color-swatch" style="background: #fff500; box-shadow: 0 0 10px #fff500;" data-color="#fff500"></div>
                <input type="color" id="nativeColorPicker" value="#ffffff" title="Custom Color">
            </div>
            <button class="btn-cancel" id="btnCancelColor">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="symbolModal">
        <div class="modal symbol-modal">
            <h2>Select Symbol</h2>
            <div class="symbol-grid" id="symbolGrid"></div>
            <button class="btn-cancel" id="btnCancelSymbol">Cancel</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- State & Constants ---
        const neonColors = ['#fc0e12', '#00fff7', '#ff00fc', '#fff500'];
        const allSymbolsList = ['рҹ”Ҙ', 'рҹҢҠ', 'рҹҢ§', 'вӣҲ', 'рҹҢ¬', 'рҹҚғ', 'рҹҢІ', 'рҹҢӢ', 'рҹҸ”', 'рҹҢҢ', 'рҹҢҷ', 'рҹҢ‘', 'вҳҖпёҸ', 'вҳҒпёҸ', 'рҹҢ«', 'вқ„пёҸ', 'рҹ’Ё', 'рҹҢҰ', 'рҹҢҲ', 'рҹӘҗ', 'вҳ„пёҸ', 'рҹҸң', 'рҹҸқ', 'рҹ«§', 'вҷЁ', 'вҳҖ', 'вҳҒ', 'вҳ…', 'вҳҶ', 'вҳӮ', 'рҹ—ЎпёҸ', 'вҡ”пёҸ', 'рҹӣЎпёҸ', 'рҹҸ№', 'рҹ”Ә', 'рҹӘ“', 'рҹ’Ҙ', 'рҹ’Ј', 'рҹ§Ё', 'вҡЎ', 'рҹҡҖ', 'рҹӣё', 'рҹҡӮ', 'рҹҡ—', 'вңҲпёҸ', 'рҹҸҶ', 'вҡҪ', 'рҹҺҜ', 'рҹҶҷ', 'рҹҶ’', 'рҹ’Ҝ', 'рҹ’ў', 'вҸҙ', 'вҸө', 'вҸ¶', 'вҸ·', 'вҡ“', 'рҹҗә', 'рҹҗҰ', 'рҹҗҰвҖҚв¬ӣ', 'рҹҰү', 'рҹҗҲвҖҚв¬ӣ', 'рҹҗҚ', 'рҹҰӮ', 'рҹҰ—', 'рҹҰ„', 'рҹҗј', 'рҹҡЁ', 'рҹҶҳ', 'вҡ пёҸ', 'вҖјпёҸ', 'вқ•', 'рҹӣ‘', 'рҹҡ«', 'вӣ”', 'рҹ“ӣ', 'рҹҡ©', 'вҳўпёҸ', 'вҳЈпёҸ', 'рҹ©№', 'рҹ©ә', 'рҹҡ‘', 'рҹҡ’', 'рҹ””', 'рҹ“ў', 'рҹ“Ј', 'вҳ ', 'вҳў', 'вҳЈ', 'рҹҡ·', 'рҹ’Ў', 'рҹ”Ӣ', 'вҡҷпёҸ', 'рҹ§Ә', 'рҹ’»', 'рҹ“ұ', 'рҹ“·', 'рҹ“¶', 'вҸ»', 'рҹ”Қ', 'рҹ“Қ', 'рҹ“…', 'вңүпёҸ', 'рҹӣ’', 'вҡҷ', 'вҡ—', 'вҡӣ', 'вҡ–', 'вҸј', 'вҸҪ', 'вҸҫ', 'вҳҸ', 'вҳҺ', 'рҹ’Җ', 'вҳ пёҸ', 'рҹ‘»', 'рҹ‘№', 'рҹ‘ә', 'рҹ§ӣ', 'рҹ§ҹ', 'рҹ§Ң', 'рҹҰҮ', 'рҹ•·пёҸ', 'рҹ•ёпёҸ', 'рҹ©ё', 'вҡ°пёҸ', 'рҹӘҰ', 'рҹҸҡпёҸ', 'рҹҘҖ', 'вӣ“пёҸ', 'рҹ‘Ҫ', 'рҹӨЎ', 'рҹҳҲ', 'рҹ‘ҝ', 'рҹҳұ', 'рҹҳЁ', 'рҹҳ°', 'рҹ‘ҒпёҸ', 'рҹ§ ', 'рҹ«Җ', 'рҹҢҡ', 'рҹ«Ҙ', 'вңЁ', 'рҹҢҹ', 'рҹ•Ҝ', 'вӣә', 'рҹҸҷ', 'рҹҸ ', 'рҹ“–', 'рҹ“ҡ', 'рҹ”‘', 'рҹ”’', 'рҹ’Һ', 'рҹ‘‘', 'рҹҢё', 'вҳҳ', 'рҹҚҖ', 'рҹҺё', 'рҹҺЁ', 'рҹҺ¬', 'вҳ•', 'рҹҚ•', 'рҹҚҺ', 'рҹҺҒ', 'рҹҺҲ', 'рҹ§ҳ', 'рҹӣҢ', 'рҹӣҒ', 'рҹҳҖ', 'рҹҳӮ', 'рҹҳҚ', 'рҹӨ”', 'рҹӨ«', 'вң”пёҸ', 'вқҢ', 'вң–пёҸ', 'вҷ«', 'вҷ©', 'вҷӘ', 'вҷ¬', 'вҷӯ', 'вҷ®', 'вҷҜ', 'рқ„һ', 'рқ„ў', 'вҷҡ', 'вҷӣ', 'вҷң', 'вҷқ', 'вҷһ', 'вҷҹ', 'вҷ”', 'вҷ•', 'вҷ–', 'вҷ—', 'вҷҳ', 'вҷҷ', 'вҷӨ', 'вҷў', 'вҷ§', 'вҷ ', 'вҷЈ', 'вҷҘ', 'вҷҰ', 'вҳ–', 'вҳ—', 'вҳҷ', 'вңҡ', 'вңң', 'вңӣ', 'вңҷ', 'вҳҜ', 'вҳ®', 'вҳј', 'вҳҫ', 'вҳҪ', 'вҳ„', 'вҳү', 'вҳ°', 'вҳұ', 'вҳІ', 'вҳі', 'вҳҙ', 'вҳө', 'вҳ¶', 'вҳ·', 'вҳҗ', 'вҳ‘', 'вҳ’', 'вҳӢ', 'вҳҢ', 'вҳҚ', 'вҳҡ', 'вҳӣ', 'вҳң', 'вҳқ', 'вҳһ', 'вҳҹ', 'гҖ°', 'вүӢ', 'вҳғ', 'вҳҮ', 'вҳҲ', 'вҳ“', 'вҳ№', 'вҳә', 'вҳ»'];
        
        let tracks = []; 
        let queue = [];  
        let colorIndex = 0;
        let symbolIndex = 0;
        let timeTrackerInterval = null;
        let isDashboardOpen = false;

        let pendingImageFile = null;
        let activeTargetTrackId = null; // Used for all pickers

        // --- IndexedDB Setup ---
        const DB_NAME = 'SuperSimpleDB';
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 3);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('tracks')) db.createObjectStore('tracks', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }

        function saveTrackToDB(track) { db.transaction('tracks', 'readwrite').objectStore('tracks').put(track); }
        function saveAllTracksToDB() {
            const tx = db.transaction('tracks', 'readwrite');
            tracks.forEach(t => tx.objectStore('tracks').put(t));
        }
        function loadTracksFromDB() {
            return new Promise((resolve) => {
                const req = db.transaction('tracks', 'readonly').objectStore('tracks').getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        // --- LocalStorage Setup ---
        function saveQueueState() {
            const state = queue.map(q => ({
                queueId: q.queueId, trackId: q.trackId, ytId: q.ytId,
                name: q.name, color: q.color, state: q.state, 
                duration: q.duration, isLooping: q.isLooping, 
                volume: q.volume, 
                currentTime: (q.player && q.player.getCurrentTime) ? q.player.getCurrentTime() : q.currentTime
            }));
            localStorage.setItem('SuperSimpleQueue', JSON.stringify(state));
        }

        function loadQueueState() {
            const data = localStorage.getItem('SuperSimpleQueue');
            return data ? JSON.parse(data) : [];
        }

        // --- Initialization ---
        async function initApp() {
            await initDB();
            tracks = (await loadTracksFromDB()) || [];
            if(tracks.length > 0) {
                colorIndex = tracks.length % neonColors.length;
                symbolIndex = tracks.length % allSymbolsList.length;
            }
            populateSymbolGrid();
            renderMasonry();

            const savedQueue = loadQueueState();
            savedQueue.forEach(q => restoreQueueItem(q));

            setupEventListeners();
            startUITracker();
            setInterval(saveQueueState, 5000);
        }

        function onYouTubeIframeAPIReady() { initApp(); }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('uploadBtn').addEventListener('click', handleAddTrack);
            document.getElementById('fab').addEventListener('click', toggleDashboard);
            document.getElementById('toggleDesktopBtn').addEventListener('click', toggleDashboard);
            document.getElementById('closeDashboard').addEventListener('click', toggleDashboard);
            document.getElementById('masterPauseBtn').addEventListener('click', masterPause);
            
            // Image Modals
            document.getElementById('btnAutoAdjust').addEventListener('click', () => processPendingImage(true));
            document.getElementById('btnKeepAspect').addEventListener('click', () => processPendingImage(false));
            document.getElementById('btnCancelImg').addEventListener('click', () => hideModal('imageModal'));
            document.getElementById('hiddenFileInput').addEventListener('change', handleFileSelect);

            // Color Modals
            document.querySelectorAll('.color-swatch').forEach(el => {
                el.addEventListener('click', (e) => applyColorChange(e.target.dataset.color));
            });
            document.getElementById('nativeColorPicker').addEventListener('change', (e) => applyColorChange(e.target.value));
            document.getElementById('btnCancelColor').addEventListener('click', () => hideModal('colorModal'));

            // Symbol Modals
            document.getElementById('btnCancelSymbol').addEventListener('click', () => hideModal('symbolModal'));

            // Column-Aware Drag & Drop Initialization
            setupDragAndDrop(document.getElementById('masonryContainer'), 'track-box', updateTrackOrder);
            setupDragAndDrop(document.getElementById('queueContainer'), 'queue-item', updateQueueOrder);

            window.addEventListener('beforeunload', saveQueueState);
        }

        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- Robust Drag & Drop Engine ---
        function setupDragAndDrop(container, itemClass, callback) {
            container.addEventListener('dragover', e => {
                e.preventDefault();
                // Get mouse coordinates for strict column checks
                const afterElement = getDragAfterElement(container, e.clientX, e.clientY, itemClass);
                const draggable = document.querySelector('.dragging');
                if(!draggable) return;
                
                if (afterElement == null) container.appendChild(draggable);
                else container.insertBefore(draggable, afterElement);
            });
            container.addEventListener('drop', () => {
                document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                callback();
            });
        }

        function getDragAfterElement(container, x, y, itemClass) {
            const elements = [...container.querySelectorAll(`.${itemClass}:not(.dragging)`)];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                // If it's the masonry grid, ensure we are in the same visual column (X axis)
                if(itemClass === 'track-box' && (x < box.left || x > box.right)) {
                    return closest; 
                }
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // --- Core Add Track ---
        function handleAddTrack() {
            const url = document.getElementById('youtubeLink').value.trim();
            if (!url) return;
            const ytId = extractVideoId(url);
            if (!ytId) return alert('Invalid YouTube URL');

            const newTrack = {
                id: 'track_' + Date.now(), ytId, color: neonColors[colorIndex],
                symbol: allSymbolsList[symbolIndex], baseName: `Track ${tracks.length + 1}`,
                customImage: null, autoAdjustImg: true
            };

            colorIndex = (colorIndex + 1) % neonColors.length;
            symbolIndex = (symbolIndex + 1) % allSymbolsList.length;

            tracks.push(newTrack); saveTrackToDB(newTrack); renderMasonry();
            document.getElementById('youtubeLink').value = '';
        }

        function extractVideoId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function updateTrackOrder() {
            const domItems = document.querySelectorAll('.track-box');
            const newTracks = [];
            domItems.forEach(el => {
                const t = tracks.find(tr => tr.id === el.dataset.trackId);
                if(t) newTracks.push(t);
            });
            tracks = newTracks; saveAllTracksToDB();
        }

        // --- Masonry UI ---
        function renderMasonry() {
            const container = document.getElementById('masonryContainer');
            container.innerHTML = '';

            tracks.forEach(track => {
                const box = document.createElement('div');
                box.className = `track-box ${track.autoAdjustImg && track.customImage ? 'aspect-square' : ''}`;
                box.style.setProperty('--neon-color', track.color);
                box.dataset.trackId = track.id;

                const dragHeader = document.createElement('div');
                dragHeader.className = 'drag-header';
                dragHeader.addEventListener('mousedown', () => box.draggable = true);
                dragHeader.addEventListener('mouseup', () => box.draggable = false);
                dragHeader.addEventListener('mouseleave', () => box.draggable = false);
                box.addEventListener('dragstart', (e) => {
                    if(!box.draggable) e.preventDefault(); else box.classList.add('dragging');
                });
                box.addEventListener('dragend', () => box.classList.remove('dragging'));
                box.appendChild(dragHeader);
                
                if (track.customImage) {
                    const img = document.createElement('img'); img.src = track.customImage; box.appendChild(img);
                } else {
                    const sym = document.createElement('div'); sym.className = 'track-symbol';
                    sym.textContent = track.symbol; box.appendChild(sym);
                }

                const hoverTxt = document.createElement('div');
                hoverTxt.className = 'hover-text'; hoverTxt.textContent = "ADD TO MIX";
                box.appendChild(hoverTxt);

                box.addEventListener('click', (e) => {
                    if(e.target === dragHeader) return; 
                    addToQueue(track);
                    if(!isDashboardOpen) toggleDashboard();
                });
                container.appendChild(box);
            });
        }

        // --- Dashboard & Queue Logic ---
        function toggleDashboard() {
            isDashboardOpen = !isDashboardOpen;
            document.getElementById('dashboard').classList.toggle('open');
            document.getElementById('mainWrapper').classList.toggle('push-active');
        }

        function addToQueue(track) {
            const count = queue.filter(q => q.trackId === track.id).length;
            const name = count > 0 ? `${track.baseName} (${count + 1})` : track.baseName;

            const qItem = {
                queueId: 'q_' + Date.now() + Math.floor(Math.random() * 1000), 
                trackId: track.id, ytId: track.ytId,
                name, color: track.color, player: null, state: 'PAUSED',
                duration: 0, isLooping: false, volume: 50, currentTime: 0, isScrubbing: false
            };
            queue.push(qItem); renderQueue(); createHiddenPlayer(qItem); saveQueueState();
        }

        function restoreQueueItem(savedQ) {
            // Ensure color syncing on restore if base track was changed while away
            const baseTrack = tracks.find(t => t.id === savedQ.trackId);
            const syncedColor = baseTrack ? baseTrack.color : savedQ.color;

            const qItem = { ...savedQ, color: syncedColor, player: null, isScrubbing: false };
            queue.push(qItem); renderQueue(); createHiddenPlayer(qItem, true);
        }

        function createHiddenPlayer(qItem, isRestore = false) {
            const div = document.createElement('div');
            div.id = `player_${qItem.queueId}`;
            document.getElementById('hidden-players').appendChild(div);

            qItem.player = new YT.Player(`player_${qItem.queueId}`, {
                height: '0', width: '0', videoId: qItem.ytId,
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': (event) => {
                        qItem.duration = event.target.getDuration() || qItem.duration;
                        event.target.setVolume(qItem.volume);
                        if(isRestore) event.target.seekTo(qItem.currentTime);
                        
                        setTimeout(() => {
                            if(qItem.state === 'PLAYING') event.target.playVideo();
                            else event.target.pauseVideo();
                        }, 200);
                        updateQueueUI();
                    },
                    'onStateChange': (event) => handlePlayerStateChange(event, qItem)
                }
            });
        }

        function handlePlayerStateChange(event, qItem) {
            if (event.data === YT.PlayerState.ENDED) {
                if (qItem.isLooping) qItem.player.playVideo();
                else { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
            } else if (event.data === YT.PlayerState.PLAYING) {
                qItem.state = 'PLAYING'; updateQueueUI(); saveQueueState();
            } else if (event.data === YT.PlayerState.PAUSED && !qItem.isScrubbing) {
                qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState();
            }
        }

        function renderQueue() {
            const container = document.getElementById('queueContainer');
            container.innerHTML = '';

            queue.forEach(qItem => {
                const el = document.createElement('div');
                el.className = `queue-item ${qItem.state === 'PLAYING' ? 'is-playing' : ''}`;
                el.dataset.queueId = qItem.queueId;
                el.style.setProperty('--neon-color', qItem.color);

                const playIcon = qItem.state === 'PLAYING' ? 'вҸё' : 'в–¶';
                const playClass = qItem.state === 'PLAYING' ? 'active' : '';

                el.innerHTML = `
                    <div class="queue-item-inner">
                        <div class="q-drag-header"></div>
                        <div class="queue-header">
                            <span>${qItem.name}</span>
                            <span>${qItem.state === 'PLAYING' ? 'Playing' : 'Paused'}</span>
                        </div>
                        <div class="progress-container">
                            <span class="time-text" id="timeTxt_${qItem.queueId}">0:00 / 0:00</span>
                            <input type="range" class="progress-slider" id="slider_${qItem.queueId}" min="0" max="${qItem.duration}" value="${qItem.currentTime}">
                        </div>
                        <div class="queue-controls">
                            <button class="control-btn play-pause-btn ${playClass}">${playIcon}</button>
                            <button class="control-btn stop-btn">вҸ№</button>
                            <button class="control-btn loop-btn ${qItem.isLooping ? 'active' : ''}">Loop</button>
                            <button class="control-btn rename-btn">Rename</button>
                            <button class="control-btn pic-btn">Art</button>
                            <button class="control-btn color-btn">Color</button>
                            <button class="control-btn sym-btn">Symbol</button>
                        </div>
                        <div class="volume-control">
                            <span>рҹ”Ҳ</span><input type="range" min="0" max="100" value="${qItem.volume}" class="vol-slider"><span>рҹ”Ҡ</span>
                        </div>
                    </div>
                    <div class="queue-delete-bar">X</div>
                `;

                // Sub-Elements setup
                const dHeader = el.querySelector('.q-drag-header');
                dHeader.addEventListener('mousedown', () => el.draggable = true);
                dHeader.addEventListener('mouseup', () => el.draggable = false);
                dHeader.addEventListener('mouseleave', () => el.draggable = false);
                el.addEventListener('dragstart', (e) => {
                    if(!el.draggable) e.preventDefault(); else el.classList.add('dragging');
                });
                el.addEventListener('dragend', () => el.classList.remove('dragging'));

                // Listeners
                el.querySelector('.play-pause-btn').onclick = () => { 
                    if(!qItem.player) return;
                    if(qItem.state === 'PLAYING') qItem.player.pauseVideo(); else qItem.player.playVideo();
                };
                el.querySelector('.stop-btn').onclick = () => { 
                    if(qItem.player && qItem.player.stopVideo) {
                        qItem.player.stopVideo(); qItem.player.seekTo(0);
                        qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState();
                    }
                };
                el.querySelector('.loop-btn').onclick = () => { qItem.isLooping = !qItem.isLooping; updateQueueUI(); saveQueueState(); };
                el.querySelector('.rename-btn').onclick = () => {
                    const newName = prompt("Rename track:", qItem.name);
                    if(newName) { qItem.name = newName; updateQueueUI(); saveQueueState(); }
                };
                
                // Pickers
                el.querySelector('.pic-btn').onclick = () => { activeTargetTrackId = qItem.trackId; document.getElementById('hiddenFileInput').click(); };
                el.querySelector('.color-btn').onclick = () => { activeTargetTrackId = qItem.trackId; document.getElementById('colorModal').style.display = 'flex'; };
                el.querySelector('.sym-btn').onclick = () => { activeTargetTrackId = qItem.trackId; document.getElementById('symbolModal').style.display = 'flex'; };
                
                el.querySelector('.queue-delete-bar').onclick = () => removeQueueItem(qItem.queueId);
                
                el.querySelector('.vol-slider').oninput = (e) => {
                    qItem.volume = e.target.value;
                    if(qItem.player) qItem.player.setVolume(qItem.volume);
                    saveQueueState();
                };

                const timeTxt = el.querySelector('.time-text');
                timeTxt.onclick = () => promptTimeEntry(qItem);

                const slider = el.querySelector('.progress-slider');
                slider.addEventListener('mousedown', () => qItem.isScrubbing = true);
                slider.addEventListener('input', (e) => {
                    qItem.currentTime = e.target.value;
                    timeTxt.textContent = `${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}`;
                });
                slider.addEventListener('change', (e) => {
                    qItem.isScrubbing = false; qItem.currentTime = e.target.value;
                    if(qItem.player) qItem.player.seekTo(qItem.currentTime, true);
                    saveQueueState();
                });

                container.appendChild(el);
            });
        }

        function updateQueueUI() { renderQueue(); }

        function updateQueueOrder() {
            const domItems = document.querySelectorAll('.queue-item');
            const newQueue = [];
            domItems.forEach(el => {
                const item = queue.find(q => q.queueId === el.dataset.queueId);
                if(item) newQueue.push(item);
            });
            queue = newQueue; saveQueueState();
        }

        function removeQueueItem(queueId) {
            const index = queue.findIndex(q => q.queueId === queueId);
            if(index > -1) {
                if(queue[index].player && queue[index].player.destroy) queue[index].player.destroy();
                const div = document.getElementById(`player_${queueId}`);
                if(div) div.remove();
                queue.splice(index, 1); updateQueueUI(); saveQueueState();
            }
        }

        function masterPause() { queue.forEach(q => { if(q.state === 'PLAYING' && q.player) q.player.pauseVideo(); }); }

        // --- Time Tracker & Input ---
        function startUITracker() {
            if(timeTrackerInterval) clearInterval(timeTrackerInterval);
            timeTrackerInterval = setInterval(() => {
                queue.forEach(qItem => {
                    if (qItem.state === 'PLAYING' && qItem.player && !qItem.isScrubbing) {
                        qItem.currentTime = qItem.player.getCurrentTime() || 0;
                        qItem.duration = qItem.player.getDuration() || qItem.duration;
                        
                        const timeEl = document.getElementById(`timeTxt_${qItem.queueId}`);
                        const sliderEl = document.getElementById(`slider_${qItem.queueId}`);
                        
                        if(timeEl) timeEl.textContent = `${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}`;
                        if(sliderEl) { sliderEl.max = qItem.duration; sliderEl.value = qItem.currentTime; }
                    }
                });
            }, 500);
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function promptTimeEntry(qItem) {
            const input = prompt("Enter specific time (MM:SS):", formatTime(qItem.currentTime));
            if(!input) return;
            
            let seconds = 0; const parts = input.split(':');
            if(parts.length === 2) seconds = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
            else seconds = parseInt(input);

            if(isNaN(seconds)) return alert("Invalid time format.");
            if(seconds > qItem.duration) seconds = qItem.duration;
            
            qItem.currentTime = seconds;
            if(qItem.player) qItem.player.seekTo(seconds, true);
            updateQueueUI(); saveQueueState();
        }

        // --- Customization Logic (Images, Colors, Symbols) ---
        function handleFileSelect(e) {
            if(!e.target.files[0]) return;
            pendingImageFile = e.target.files[0];
            document.getElementById('imageModal').style.display = 'flex';
            e.target.value = '';
        }

        async function processPendingImage(autoAdjust) {
            if(!pendingImageFile || !activeTargetTrackId) return hideModal('imageModal');
            const base64Data = await readImageFile(pendingImageFile, autoAdjust);
            updateTrackData(activeTargetTrackId, { customImage: base64Data, autoAdjustImg: autoAdjust });
            hideModal('imageModal');
        }

        function readImageFile(file, autoAdjust) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!autoAdjust) resolve(e.target.result);
                    else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = Math.min(img.width, img.height);
                            canvas.width = size; canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            const x = (img.width - size) / 2; const y = (img.height - size) / 2;
                            ctx.drawImage(img, x, y, size, size, 0, 0, size, size);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function applyColorChange(hexColor) {
            if(!activeTargetTrackId) return;
            updateTrackData(activeTargetTrackId, { color: hexColor });
            hideModal('colorModal');
        }

        function populateSymbolGrid() {
            const grid = document.getElementById('symbolGrid');
            allSymbolsList.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'sym-item'; div.textContent = sym;
                div.onclick = () => {
                    if(activeTargetTrackId) {
                        updateTrackData(activeTargetTrackId, { symbol: sym, customImage: null });
                        hideModal('symbolModal');
                    }
                };
                grid.appendChild(div);
            });
        }

        function updateTrackData(trackId, updatesObj) {
            // Update base track
            const tIndex = tracks.findIndex(t => t.id === trackId);
            if(tIndex > -1) {
                tracks[tIndex] = { ...tracks[tIndex], ...updatesObj };
                saveTrackToDB(tracks[tIndex]);
            }
            
            // Sync any existing queue items of this track
            queue.forEach(q => {
                if(q.trackId === trackId) {
                    if(updatesObj.color) q.color = updatesObj.color;
                }
            });

            renderMasonry();
            updateQueueUI();
            saveQueueState();
        }
    </script>
</body>
</html>
