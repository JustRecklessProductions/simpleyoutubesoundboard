<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Simple Soundboard</title>
    <style>
        :root {
            --bg: #0b0b0b; --panel-bg: #111; --text: #ffffff;
            --neon-1: #fc0e12; --neon-2: #00fff7; --neon-3: #ff00fc; --neon-4: #fff500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; display: flex; height: 100vh;
        }

        .main-wrapper {
            flex-grow: 1; overflow-y: auto; transition: padding-right 0.4s ease;
            position: relative;
        }

        /* --- Input Section --- */
        .header-container { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        h1 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; }

        .input-group {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            max-width: 900px; margin: 0 auto; flex-wrap: wrap;
        }
        input[type="text"] {
            flex-grow: 1; padding: 12px; background: #222; min-width: 200px;
            border: 1px solid #444; color: white; border-radius: 6px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--neon-2); }

        button.btn-primary, button.btn-secondary {
            padding: 12px 20px; background: transparent; color: white;
            border: 1px solid var(--neon-2); border-radius: 6px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        button.btn-secondary { border-color: var(--neon-4); color: var(--neon-4); }
        button.btn-primary:hover { background: var(--neon-2); color: black; box-shadow: 0 0 15px var(--neon-2); }
        button.btn-secondary:hover { background: var(--neon-4); color: black; box-shadow: 0 0 15px var(--neon-4); }

        .header-controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .action-btn {
            padding: 8px 16px; background: transparent; color: var(--neon-3);
            border: 1px solid var(--neon-3); border-radius: 6px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        .action-btn:hover { background: var(--neon-3); color: black; box-shadow: 0 0 15px var(--neon-3); }
        @media (max-width: 768px) { .desktop-only { display: none; } }

        /* --- True CSS Grid Masonry --- */
        .grid-container {
            padding: 20px; display: grid; gap: 20px; max-width: 1400px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 160px; 
        }

        .track-box {
            background: black; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; position: relative;
            border: 2px solid; color: var(--neon-color); overflow: hidden;
            width: 100%; height: 100%;
        }

        .track-box:hover { transform: scale(1.03); }
        .track-box.dragging { opacity: 0.4; transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.8); z-index: 50; }
        .dragging * { pointer-events: none !important; }

        /* Jiggle Edit Mode */
        .is-editing .track-box { animation: jiggle 0.3s infinite; touch-action: none; cursor: grab;}
        .is-editing .queue-item { animation: jiggle 0.3s infinite; touch-action: none; cursor: grab;}
        .is-editing .track-box:hover { transform: scale(1); }
        @keyframes jiggle { 0% {transform: rotate(-1deg);} 50% {transform: rotate(1deg);} 100% {transform: rotate(-1deg);} }
        
        .delete-box-btn {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            border: 2px solid white; border-radius: 50%; width: 25px; height: 25px;
            display: none; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; z-index: 20; cursor: pointer;
            box-shadow: 0 0 10px red;
        }
        .is-editing .delete-box-btn { display: flex; }

        /* UI Flash */
        .flash-active { animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim { 0% { box-shadow: 0 0 40px inset var(--neon-color), 0 0 30px var(--neon-color); } 100% { box-shadow: none; } }

        .drag-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 25px;
            background: transparent; z-index: 10; display: flex;
            align-items: center; justify-content: center; cursor: grab; opacity: 0; transition: opacity 0.2s;
        }
        .drag-header:active { cursor: grabbing; }
        .drag-header::after { content: "⠿"; color: rgba(255, 255, 255, 0.7); font-size: 1.2rem; letter-spacing: 2px; }
        .track-box:hover .drag-header { opacity: 1; }

        .track-symbol { font-size: 4rem; text-shadow: 0 0 15px var(--neon-color); z-index: 1; pointer-events: none; }
        .track-box img { width: 100%; height: 100%; display: block; object-fit: cover; z-index: 0; opacity: 0.8; transition: opacity 0.3s; pointer-events: none; }
        .track-box:hover img { opacity: 0.4; }
        
        .track-box .hover-text {
            position: absolute; top: 25px; z-index: 2; font-weight: bold;
            font-size: 0.9rem; text-transform: uppercase; opacity: 0;
            transition: opacity 0.3s; text-shadow: 2px 2px 4px black;
            pointer-events: none; width: 100%; text-align: center; padding: 0 5px;
        }
        .track-box:not(.is-editing):hover .hover-text { opacity: 1; }

        /* --- Dashboard Panel --- */
        .dashboard {
            position: fixed; top: 0; right: 0; width: 450px; height: 100vh;
            background: var(--panel-bg); border-left: 1px solid #333;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000; display: flex; flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.8);
        }
        .dashboard.open { transform: translateX(0); }

        .dashboard-header {
            padding: 20px; border-bottom: 1px solid #333; display: flex;
            justify-content: space-between; align-items: center; background: #000;
        }
        .close-btn { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

        .master-pause {
            background: transparent; color: var(--neon-1); border: 1px solid var(--neon-1);
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .master-pause:hover { background: var(--neon-1); color: black; box-shadow: 0 0 10px var(--neon-1); }

        .queue-container { flex-grow: 1; overflow-y: auto; padding: 15px; }

        /* --- Queue Items --- */
        .queue-item {
            background: #000; border: 1px solid #444; border-radius: 8px;
            margin-bottom: 15px; position: relative; transition: all 0.3s;
            display: flex; overflow: hidden;
        }
        .queue-item.dragging { opacity: 0.5; }
        .queue-item.is-playing { border-color: var(--neon-color); box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1); }

        .queue-item-inner { flex-grow: 1; padding: 15px; padding-top: 25px; display: flex; flex-direction: column; overflow: hidden; }

        .q-drag-header {
            position: absolute; top: 0; left: 0; width: calc(100% - 30px); height: 20px;
            display: flex; align-items: center; justify-content: center; cursor: grab; background: transparent; z-index: 5;
        }
        .q-drag-header:active { cursor: grabbing; }
        .q-drag-header::after { content: "⠿"; color: rgba(255, 255, 255, 0.5); font-size: 1rem; }

        .queue-delete-bar {
            width: 30px; background: #220000; border-left: 1px solid #444;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            cursor: pointer; transition: 0.2s; color: #ff4444; font-weight: bold; z-index: 2;
        }
        .queue-delete-bar:hover { background: #ff4444; color: white; }

        .queue-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; color: var(--neon-color); font-weight: bold; width: 100%;
        }
        
        .q-name-container { flex-grow: 1; overflow: hidden; white-space: nowrap; margin-right: 15px; position: relative; }
        .q-name { display: inline-block; font-size: 0.95rem; }

        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .time-text { font-size: 0.85rem; color: #aaa; cursor: pointer; min-width: 85px; }
        .time-text:hover { color: white; text-decoration: underline; }
        .progress-slider { flex-grow: 1; accent-color: var(--neon-color); cursor: pointer; }

        .queue-controls-wrapper { width: 100%; display: flex; flex-direction: column; }
        .primary-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .secondary-controls { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .control-btn {
            background: #222; color: white; border: 1px solid #444;
            padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold;
        }
        .control-btn:hover { background: #444; border-color: var(--neon-color); }
        .control-btn.active { background: var(--neon-color); color: black; box-shadow: 0 0 10px var(--neon-color); }

        .menu-toggle-btn { display: none; } /* Hidden on desktop */

        .volume-control { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .volume-control input[type="range"] { flex-grow: 1; accent-color: var(--neon-color); }

        /* Responsive Desktop */
        @media (min-width: 769px) { 
            .main-wrapper.push-active { padding-right: 450px; } 
            .q-name-container { text-overflow: ellipsis; }
        }
        
        /* --- MOBILE SPECIFIC OVERRIDES --- */
        @media (max-width: 768px) { 
            .dashboard { width: 100%; border-left: none; } 
            
            /* Hide Default Drag Headers - Wiggle mode makes whole box draggable */
            .drag-header, .q-drag-header { display: none !important; }
            
            /* Stretched Delete Button Header */
            .delete-box-btn {
                width: 100%; height: 35px; top: 0; right: 0; border: none;
                border-radius: 10px 10px 0 0; border-bottom: 2px solid white;
                background: rgba(255, 68, 68, 0.95); color: transparent;
            }
            .delete-box-btn::after {
                content: "DELETE"; color: white; position: absolute;
                font-size: 14px; letter-spacing: 2px;
            }

            /* Box Text & Glow States */
            .track-box.in-queue .hover-text { display: none !important; }
            .track-box.is-playing-glow {
                box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1);
                border-color: var(--neon-color);
            }

            /* Mobile Queue Layout: Dropdown & Giant Play */
            .play-pause-btn { 
                width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; flex-shrink: 0; 
                display: flex; align-items: center; justify-content: center;
            }
            .menu-toggle-btn { 
                display: flex !important; align-items: center; justify-content: center;
                width: 50px; height: 50px; border-radius: 12px; font-size: 1.5rem;
            }
            .menu-toggle-btn.active { background: var(--neon-color); color: black; }
            
            .secondary-controls { 
                display: none; border-top: 1px solid #333; padding-top: 10px; margin-bottom: 10px;
                transition: max-height 0.3s ease-out;
            }
            .secondary-controls.expanded { display: flex; }
            .volume-control { margin-top: 5px; }

            /* Marquee Animation for long titles */
            .q-name { animation: scroll-left-right 8s ease-in-out infinite alternate; padding-right: 20px;}
            @keyframes scroll-left-right {
                0%, 15% { transform: translateX(0); }
                85%, 100% { transform: translateX(-40%); }
            }
        }

        /* Mobile FAB */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: black; border: 2px solid var(--neon-3);
            color: var(--neon-3); font-size: 1.5rem; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 999; box-shadow: 0 0 15px var(--neon-3); transition: all 0.3s;
        }
        @media (min-width: 769px) { .fab { display: none; } }
        .fab:hover { background: var(--neon-3); color: black; transform: scale(1.1); }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center;
            justify-content: center; z-index: 2000; backdrop-filter: blur(5px);
        }
        .modal {
            background: #111; padding: 30px; border-radius: 12px; border: 1px solid var(--neon-4); 
            text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 30px var(--neon-4);
        }
        .modal h2 { margin-bottom: 20px; color: var(--text); }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;}
        .modal-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-auto { background: var(--neon-2); color: black; }
        .btn-keep { background: transparent; border: 1px solid white; color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-cancel { margin-top:20px; background:none; border:none; color:#777; cursor:pointer; }

        .color-options { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px;}
        .color-swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: transform 0.2s; }
        .color-swatch:hover { transform: scale(1.1); }
        input[type="color"] { width: 45px; height: 45px; border: none; border-radius: 50%; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }

        .symbol-modal { max-width: 600px; }
        .symbol-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px;
            background: #000; border-radius: 8px; border: 1px solid #333;
        }
        .sym-item { font-size: 1.5rem; cursor: pointer; padding: 5px; border-radius: 4px; transition: background 0.2s; }
        .sym-item:hover { background: #333; }
        #hidden-players { display: none; }
    </style>
</head>
<body>

    <div class="main-wrapper" id="mainWrapper">
        <div class="header-container">
            <h1>Super Simple Soundboard</h1>
            <div class="input-group">
                <input type="text" id="youtubeLink" placeholder="Paste YouTube link here...">
                <button class="btn-primary" id="uploadYTBtn">Add YouTube Link</button>
                <button class="btn-secondary" id="triggerMp3Btn">Upload MP3</button>
                <input type="file" id="mp3Input" accept="audio/mp3, audio/mpeg" style="display: none;">
            </div>
            <div class="header-controls">
                <button class="action-btn desktop-only" id="toggleDesktopBtn">Toggle Queue</button>
                <button class="action-btn desktop-only" id="editGridBtn">Edit Grid</button>
            </div>
        </div>

        <div class="grid-container" id="gridContainer"></div>
    </div>

    <div class="fab" id="fab">☰</div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <button class="master-pause" id="masterPauseBtn">⏸ Pause All</button>
            <h2 style="color: white; font-weight: 300;">QUEUE</h2>
            <button class="close-btn" id="closeDashboard">&times;</button>
        </div>
        <div class="queue-container" id="queueContainer"></div>
    </div>

    <div id="hidden-players"></div>

    <div class="modal-overlay" id="imageModal">
        <div class="modal">
            <h2>Process Album Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnAutoAdjust">Auto Adjust (1:1)</button>
                <button class="btn-keep" id="btnKeepAspect">Do Not Adjust</button>
            </div>
            <button class="btn-cancel" id="btnCancelImg">Cancel</button>
        </div>
    </div>
    <div class="modal-overlay" id="replaceArtModal">
        <div class="modal">
            <h2>Manage Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnReplaceArt">Replace Art</button>
                <button class="btn-danger" id="btnRemoveArt">Remove Art</button>
            </div>
            <button class="btn-cancel" id="btnCancelReplace">Cancel</button>
        </div>
    </div>
    <input type="file" id="hiddenFileInput" accept="image/*" style="display: none;">

    <div class="modal-overlay" id="colorModal">
        <div class="modal">
            <h2>Select Color</h2>
            <div class="color-options">
                <div class="color-swatch" style="background: #fc0e12; box-shadow: 0 0 10px #fc0e12;" data-color="#fc0e12"></div>
                <div class="color-swatch" style="background: #00fff7; box-shadow: 0 0 10px #00fff7;" data-color="#00fff7"></div>
                <div class="color-swatch" style="background: #ff00fc; box-shadow: 0 0 10px #ff00fc;" data-color="#ff00fc"></div>
                <div class="color-swatch" style="background: #fff500; box-shadow: 0 0 10px #fff500;" data-color="#fff500"></div>
                <input type="color" id="nativeColorPicker" value="#ffffff" title="Custom Color">
            </div>
            <button class="btn-cancel" id="btnCancelColor">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="symbolModal">
        <div class="modal symbol-modal">
            <h2>Select Symbol</h2>
            <div class="symbol-grid" id="symbolGrid"></div>
            <button class="btn-cancel" id="btnCancelSymbol">Cancel</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- State & Constants ---
        const neonColors = ['#fc0e12', '#00fff7', '#ff00fc', '#fff500'];
        const defaultMusicSymbols = ['♫', '𝄞', '♪', '𝄢', '𝄽', '♬', '♮', '𝄡'];
        const allSymbolsList = ['🔥', '🌊', '🌧', '⛈', '🌬', '🍃', '🌲', '🌋', '🏔', '🌌', '🌙', '🌑', '☀️', '☁️', '🌫', '❄️', '💨', '🌦', '🌈', '🪐', '☄️', '🏜', '🏝', '🫧', '♨', '☀', '☁', '★', '☆', '☂', '🗡️', '⚔️', '🛡️', '🏹', '🔪', '🪓', '💥', '💣', '🧨', '⚡', '🚀', '🛸', '🚂', '🚗', '✈️', '🏆', '⚽', '🎯', '🆙', '🆒', '💯', '💢', '⏴', '⏵', '⏶', '⏷', '⚓', '🐺', '🐦', '🐦‍⬛', '🦉', '🐈‍⬛', '🐍', '🦂', '🦗', '🦄', '🐼', '🚨', '🆘', '⚠️', '‼️', '❕', '🛑', '🚫', '⛔', '📛', '🚩', '☢️', '☣️', '🩹', '🩺', '🚑', '🚒', '🔔', '📢', '📣', '☠', '☢', '☣', '🚷', '💡', '🔋', '⚙️', '🧪', '💻', '📱', '📷', '📶', '⏻', '🔍', '📍', '📅', '✉️', '🛒', '⚙', '⚗', '⚛', '⚖', '⏼', '⏽', '⏾', '☏', '☎', '💀', '☠️', '👻', '👹', '👺', '🧛', '🧟', '🧌', '🦇', '🕷️', '🕸️', '🩸', '⚰️', '🪦', '🏚️', '🥀', '⛓️', '👽', '🤡', '😈', '👿', '😱', '😨', '😰', '👁️', '🧠', '🫀', '🌚', '🫥', '✨', '🌟', '🕯', '⛺', '🏙', '🏠', '📖', '📚', '🔑', '🔒', '💎', '👑', '🌸', '☘', '🍀', '🎸', '🎨', '🎬', '☕', '🍕', '🍎', '🎁', '🎈', '🧘', '🛌', '🛁', '😀', '😂', '😍', '🤔', '🤫', '✔️', '❌', '✖️', ...defaultMusicSymbols];
        
        let tracks = []; let queue = [];  
        let colorIndex = 0; let symbolIndex = 0;
        let timeTrackerInterval = null; let isDashboardOpen = false; let isEditing = false;
        let pendingImageFile = null; let activeTargetTrackId = null;

        // --- IndexedDB Setup ---
        const DB_NAME = 'SuperSimpleDB'; let db;
        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 4);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('tracks')) db.createObjectStore('tracks', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e);
            });
        }
        function saveTrackToDB(track) { db.transaction('tracks', 'readwrite').objectStore('tracks').put(track); }
        function saveAllTracksToDB() { const tx = db.transaction('tracks', 'readwrite'); tracks.forEach(t => tx.objectStore('tracks').put(t)); }
        function deleteTrackFromDB(id) { db.transaction('tracks', 'readwrite').objectStore('tracks').delete(id); }
        function loadTracksFromDB() {
            return new Promise((resolve) => {
                const req = db.transaction('tracks', 'readonly').objectStore('tracks').getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        // --- Queue Persistence ---
        function saveQueueState() {
            const state = queue.map(q => ({
                queueId: q.queueId, trackId: q.trackId, type: q.type, ytId: q.ytId,
                name: q.name, color: q.color, state: q.state, duration: q.duration,
                isLooping: q.isLooping, volume: q.volume,
                currentTime: (q.playerAPI) ? q.playerAPI.getCurrentTime() : q.currentTime
            }));
            localStorage.setItem('SuperSimpleQueue', JSON.stringify(state));
        }
        function loadQueueState() { const data = localStorage.getItem('SuperSimpleQueue'); return data ? JSON.parse(data) : []; }

        // --- Initialization ---
        async function initApp() {
            await initDB();
            tracks = (await loadTracksFromDB()) || [];
            if(tracks.length > 0) { colorIndex = tracks.length % neonColors.length; symbolIndex = tracks.length % allSymbolsList.length; }
            populateSymbolGrid(); renderGrid();

            const savedQueue = loadQueueState();
            savedQueue.forEach(q => restoreQueueItem(q));

            setupEventListeners(); startUITracker();
            setInterval(saveQueueState, 5000);
        }
        function onYouTubeIframeAPIReady() { initApp(); }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('uploadYTBtn').addEventListener('click', handleAddYTTrack);
            document.getElementById('triggerMp3Btn').addEventListener('click', () => document.getElementById('mp3Input').click());
            document.getElementById('mp3Input').addEventListener('change', handleAddMP3);
            
            document.getElementById('fab').addEventListener('click', toggleDashboard);

            setupDragAndDrop(document.getElementById('gridContainer'), 'track-box', updateTrackOrder);
            setupDragAndDrop(document.getElementById('queueContainer'), 'queue-item', updateQueueOrder);

        function hideModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleEditMode() {
            isEditing = !isEditing;
            const container = document.getElementById('gridContainer');
            const qContainer = document.getElementById('queueContainer');
            if(isEditing) { container.classList.add('is-editing'); qContainer.classList.add('is-editing'); }
            else { container.classList.remove('is-editing'); qContainer.classList.remove('is-editing'); }
        }

        // --- Drag & Drop Core ---
        function setupDragAndDrop(container, itemClass, callback) {
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientX, e.clientY, itemClass);
                const draggable = document.querySelector('.dragging');
                if(!draggable) return;
                if (afterElement == null) container.appendChild(draggable);
                else container.insertBefore(draggable, afterElement);
            });
            container.addEventListener('drop', () => {
                document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
                callback();
            });
        }
        function getDragAfterElement(container, x, y, itemClass) {
            const elements = [...container.querySelectorAll(`.${itemClass}:not(.dragging)`)];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                if(itemClass === 'track-box' && (x < box.left || x > box.right)) return closest; 
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // --- Fetch YouTube Title ---
        async function fetchYTTitle(ytId) {
            try {
                const oembedUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${ytId}&format=json`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(oembedUrl)}`;
                const res = await fetch(proxyUrl);
                const data = await res.json();
                const contents = JSON.parse(data.contents);
                return contents.title || `Track ${tracks.length + 1}`;
            } catch(e) { return `Track ${tracks.length + 1}`; }
        }

        // --- Add Tracks ---
        async function handleAddYTTrack() {
            const input = document.getElementById('youtubeLink');
            const url = input.value.trim(); if (!url) return;
            const ytId = extractVideoId(url); if (!ytId) return alert('Invalid YouTube URL');

            const newTrack = createBaseTrackObj('yt', ytId, "Grabbing YouTube Title...");
            tracks.push(newTrack); saveTrackToDB(newTrack); renderGrid(); input.value = '';

            const title = await fetchYTTitle(ytId);
            updateTrackData(newTrack.id, { baseName: title });
        }

        function handleAddMP3(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64Audio = event.target.result;
                const newTrack = createBaseTrackObj('mp3', null, file.name.replace(/\.[^/.]+$/, ""));
                newTrack.localAudio = base64Audio;
                tracks.push(newTrack); saveTrackToDB(newTrack); renderGrid();
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }

        function createBaseTrackObj(type, ytId, baseName) {
            const t = {
                id: 'track_' + Date.now(), type, ytId, baseName,
                color: neonColors[colorIndex], symbol: allSymbolsList[symbolIndex],
                customImage: null, autoAdjustImg: true
            };
            colorIndex = (colorIndex + 1) % neonColors.length;
            symbolIndex = (symbolIndex + 1) % allSymbolsList.length;
            return t;
        }

        function extractVideoId(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function updateTrackOrder() {
            const domItems = document.querySelectorAll('.track-box');
            const newTracks = [];
            domItems.forEach(el => {
                const t = tracks.find(tr => tr.id === el.dataset.trackId);
                if(t) newTracks.push(t);
            });
            tracks = newTracks; saveAllTracksToDB();
        }

        function updateGridGlow() {
            document.querySelectorAll('.track-box').forEach(box => {
                const tId = box.dataset.trackId;
                const inQ = queue.filter(q => q.trackId === tId);
                if (inQ.length > 0) {
                    box.classList.add('in-queue');
                    if(inQ.some(q => q.state === 'PLAYING')) box.classList.add('is-playing-glow');
                    else box.classList.remove('is-playing-glow');
                } else {
                    box.classList.remove('in-queue', 'is-playing-glow');
                }
            });
        }

        // --- Main Grid UI ---
        function renderGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';

            tracks.forEach(track => {
                const box = document.createElement('div');
                box.className = 'track-box';
                box.style.setProperty('--neon-color', track.color);
                box.dataset.trackId = track.id;

                const dragHeader = document.createElement('div');
                dragHeader.className = 'drag-header';
                
                let pressTimer;
                const startPress = () => { if(!isEditing) pressTimer = setTimeout(toggleEditMode, 800); };
                const cancelPress = () => { clearTimeout(pressTimer); };
                
                box.addEventListener('touchstart', (e) => {
                    if(isEditing) { box.draggable = true; } 
                    else { startPress(); }
                }, {passive: true});
                box.addEventListener('touchend', cancelPress);
                box.addEventListener('touchmove', cancelPress);

                dragHeader.addEventListener('mousedown', () => box.draggable = true);
                dragHeader.addEventListener('mouseup', () => box.draggable = false);
                dragHeader.addEventListener('mouseleave', () => box.draggable = false);
                
                box.addEventListener('dragstart', (e) => { if(!box.draggable) e.preventDefault(); else box.classList.add('dragging'); });
                box.addEventListener('dragend', () => { box.classList.remove('dragging'); box.draggable = false; });
                box.appendChild(dragHeader);
                
                if (track.customImage) {
                    const img = document.createElement('img'); img.src = track.customImage; box.appendChild(img);
                } else {
                    const sym = document.createElement('div'); sym.className = 'track-symbol';
                    sym.textContent = track.symbol; box.appendChild(sym);
                }

                const hoverTxt = document.createElement('div');
                hoverTxt.className = 'hover-text'; hoverTxt.textContent = track.baseName;
                box.appendChild(hoverTxt);

                // Delete Button
                const delBtn = document.createElement('div');
                delBtn.className = 'delete-box-btn';
                delBtn.onclick = (e) => {
                    e.stopPropagation(); deleteTrackFromDB(track.id);
                    tracks = tracks.filter(t => t.id !== track.id);
                    queue.filter(q => q.trackId === track.id).forEach(q => removeQueueItem(q.queueId));
                    renderGrid();
                };
                // Desktop X inner text
                if(window.innerWidth > 768) delBtn.textContent = 'X';
                box.appendChild(delBtn);

                box.addEventListener('click', (e) => {
                    if(isEditing || e.target === dragHeader || e.target === delBtn) return; 
                    
                    const existing = queue.filter(q => q.trackId === track.id);
                    if(existing.length > 0) {
                        // MOBILE: Toggle Pause/Play
                        if (window.innerWidth <= 768) {
                            existing.forEach(q => {
                                if (q.playerAPI) {
                                    if (q.state === 'PLAYING') q.playerAPI.pause();
                                    else q.playerAPI.play();
                                }
                            });
                        } else {
                            // DESKTOP: Remove from Queue
                            existing.forEach(q => removeQueueItem(q.queueId));
                        }
                    } else {
                        addToQueue(track);
                        box.classList.add('flash-active');
                        setTimeout(() => box.classList.remove('flash-active'), 300);
                        if(!isDashboardOpen && window.innerWidth > 768) toggleDashboard();
                    }
                });
                container.appendChild(box);
            });
            updateGridGlow();

        // --- Dashboard & Queue Logic ---
        function toggleDashboard() {
            isDashboardOpen = !isDashboardOpen;
            document.getElementById('dashboard').classList.toggle('open');
            document.getElementById('mainWrapper').classList.toggle('push-active');
        }

        function addToQueue(track, exactCurrentTime = 0) {
            const count = queue.filter(q => q.trackId === track.id).length;
            const name = count > 0 ? `${track.baseName} (${count + 1})` : track.baseName;
            
            let startState = 'PAUSED';
            if(window.innerWidth <= 768) startState = 'PLAYING';

            const qItem = {
                queueId: 'q_' + Date.now() + Math.floor(Math.random() * 1000), 
                trackId: track.id, type: track.type, ytId: track.ytId,
                name, color: track.color, playerAPI: null, state: startState,
                duration: 0, isLooping: false, volume: 50, currentTime: exactCurrentTime, isScrubbing: false
            };
            queue.push(qItem); renderQueue(); initializePlayer(qItem, track); saveQueueState();
        }

        function restoreQueueItem(savedQ) {
            const baseTrack = tracks.find(t => t.id === savedQ.trackId);
            if(!baseTrack) return;
            const qItem = { ...savedQ, color: baseTrack.color, playerAPI: null, isScrubbing: false };
            queue.push(qItem); renderQueue(); initializePlayer(qItem, baseTrack, true);
        }

        function initializePlayer(qItem, baseTrack, isRestore = false) {
            if(qItem.type === 'mp3') {
                const audio = new Audio(baseTrack.localAudio);
                qItem.playerAPI = {
                    play: () => audio.play(), pause: () => audio.pause(),
                    stop: () => { audio.pause(); audio.currentTime = 0; },
                    seekTo: (s) => audio.currentTime = s, setVolume: (v) => audio.volume = v / 100,
                    getDuration: () => audio.duration, getCurrentTime: () => audio.currentTime,
                    destroy: () => { audio.pause(); audio.src = ''; }
                };
                
                audio.onloadedmetadata = () => {
                    qItem.duration = audio.duration; audio.volume = qItem.volume / 100;
                    if(qItem.currentTime > 0) audio.currentTime = qItem.currentTime;
                    updateQueueUI();
                };
                audio.onended = () => {
                    if (qItem.isLooping) audio.play();
                    else { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
                };
                audio.onplay = () => { qItem.state = 'PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();};
                audio.onpause = () => { if(!qItem.isScrubbing) { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();} };
                
                if(isRestore && qItem.state === 'PLAYING') audio.play();
                if(!isRestore && qItem.state === 'PLAYING') audio.play(); // Initial Autoplay Mobile

            } else {
                const div = document.createElement('div'); div.id = `player_${qItem.queueId}`;
                document.getElementById('hidden-players').appendChild(div);

                const ytPlayer = new YT.Player(`player_${qItem.queueId}`, {
                    height: '0', width: '0', videoId: qItem.ytId,
                    playerVars: { 'autoplay': 0, 'controls': 0 },
                    events: {
                        'onReady': (event) => {
                            qItem.playerAPI = {
                                play: () => ytPlayer.playVideo(), pause: () => ytPlayer.pauseVideo(),
                                stop: () => { ytPlayer.stopVideo(); ytPlayer.seekTo(0); },
                                seekTo: (s) => ytPlayer.seekTo(s, true), setVolume: (v) => ytPlayer.setVolume(v),
                                getDuration: () => ytPlayer.getDuration(), getCurrentTime: () => ytPlayer.getCurrentTime(),
                                destroy: () => ytPlayer.destroy()
                            };
                            qItem.duration = ytPlayer.getDuration() || qItem.duration;
                            ytPlayer.setVolume(qItem.volume);
                            if(qItem.currentTime > 0) ytPlayer.seekTo(qItem.currentTime);
                            
                            setTimeout(() => { if(qItem.state === 'PLAYING') ytPlayer.playVideo(); }, 200);
                            updateQueueUI();
                        },
                        'onStateChange': (event) => {
                            if (event.data === YT.PlayerState.ENDED) {
                                if (qItem.isLooping) ytPlayer.playVideo();
                                else { qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
                            } else if (event.data === YT.PlayerState.PLAYING) {
                                qItem.state = 'PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();
                            } else if (event.data === YT.PlayerState.PAUSED && !qItem.isScrubbing) {
                                qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();
                            }
                        }
                    }
                });
            }
        }

        function fadeOut(qItem) {
            if (!qItem.playerAPI || qItem.state !== 'PLAYING') return;
            let vol = qItem.volume;
            const fadeInterval = setInterval(() => {
                vol -= 2;
                if (vol <= 0) {
                    vol = 0; clearInterval(fadeInterval);
                    qItem.playerAPI.setVolume(0); qItem.playerAPI.pause();
                    qItem.volume = 0; updateQueueUI(); saveQueueState();
                } else {
                    qItem.playerAPI.setVolume(vol); qItem.volume = vol;
                    const slider = document.querySelector(`.queue-item[data-queue-id="${qItem.queueId}"] .vol-slider`);
                    if(slider) slider.value = vol;
                }
            }, 50);
        }

                            <div class="secondary-controls">
                                <button class="control-btn stop-btn">⏹ Stop</button>
                                <button class="control-btn loop-btn ${qItem.isLooping ? 'active' : ''}">Loop</button>
                                <button class="control-btn fade-btn">Fade</button>
                                <button class="control-btn dup-btn">Dup</button>
                                <button class="control-btn link-btn" ${qItem.type === 'mp3' ? 'style="display:none;"' : ''}>Link</button>
                                <button class="control-btn rename-btn">Rename</button>
                                <button class="control-btn pic-btn">Art</button>
                                <button class="control-btn color-btn">Color</button>

                        </div>
                    </div>
                    <div class="queue-delete-bar" title="Remove from Queue">X</div>
                `;

                const dHeader = el.querySelector('.q-drag-header');
                dHeader.addEventListener('mousedown', () => el.draggable = true);
                dHeader.addEventListener('mouseup', () => el.draggable = false);
                dHeader.addEventListener('mouseleave', () => el.draggable = false);
                
                let pressTimerQ;
                el.addEventListener('touchstart', (e) => {
                    if(isEditing) { el.draggable = true; }
                    else { pressTimerQ = setTimeout(toggleEditMode, 800); }
                }, {passive: true});
                el.addEventListener('touchend', () => clearTimeout(pressTimerQ));
                el.addEventListener('touchmove', () => clearTimeout(pressTimerQ));

                el.addEventListener('dragstart', (e) => { if(!el.draggable) e.preventDefault(); else el.classList.add('dragging'); });
                el.addEventListener('dragend', () => { el.classList.remove('dragging'); el.draggable = false; });

                // Mobile Menu Toggle
                el.querySelector('.menu-toggle-btn').onclick = () => {
                    const secMenu = el.querySelector('.secondary-controls');
                    const btn = el.querySelector('.menu-toggle-btn');
                    secMenu.classList.toggle('expanded');
                    btn.classList.toggle('active');
                };

                el.querySelector('.play-pause-btn').onclick = () => { 
                    if(!qItem.playerAPI) return;
                    if(qItem.state === 'PLAYING') qItem.playerAPI.pause(); else qItem.playerAPI.play();
                };
                el.querySelector('.stop-btn').onclick = () => { 
                    if(qItem.playerAPI) { qItem.playerAPI.stop(); qItem.state = 'PAUSED'; updateQueueUI(); saveQueueState(); }
                };
                el.querySelector('.loop-btn').onclick = () => { qItem.isLooping = !qItem.isLooping; updateQueueUI(); saveQueueState(); };
                el.querySelector('.fade-btn').onclick = () => fadeOut(qItem);
                
                el.querySelector('.dup-btn').onclick = () => {
                    const baseTrack = tracks.find(t => t.id === qItem.trackId);
                    if(baseTrack) addToQueue(baseTrack, qItem.playerAPI ? qItem.playerAPI.getCurrentTime() : qItem.currentTime);
                };
                
                el.querySelector('.link-btn').onclick = async () => {
                    const newLink = prompt("Paste new YouTube link:");
                    if(!newLink) return; const newYtId = extractVideoId(newLink);
                    if(!newYtId) return alert("Invalid link");
                    
                    if(qItem.playerAPI) qItem.playerAPI.destroy();
                    const div = document.getElementById(`player_${qItem.queueId}`); if(div) div.remove();
                    
                    qItem.ytId = newYtId; qItem.playerAPI = null;
                    const baseTrack = tracks.find(t => t.id === qItem.trackId);
                    if(baseTrack) initializePlayer(qItem, baseTrack, false);
                    
                    const newTitle = await fetchYTTitle(newYtId);
                    qItem.name = newTitle; updateQueueUI(); saveQueueState();
                };

                el.querySelector('.rename-btn').onclick = () => {
                    const newName = prompt("Rename track:", qItem.name);
                    if(newName) { qItem.name = newName; updateQueueUI(); saveQueueState(); }
                };
                
                el.querySelector('.pic-btn').onclick = () => {
                    activeTargetTrackId = qItem.trackId;
                    const t = tracks.find(tr => tr.id === qItem.trackId);
                    if(t && t.customImage) document.getElementById('replaceArtModal').style.display = 'flex';
                    else document.getElementById('hiddenFileInput').click();
                };
                el.querySelector('.color-btn').onclick = () => { activeTargetTrackId = qItem.trackId; document.getElementById('colorModal').style.display = 'flex'; };
                el.querySelector('.sym-btn').onclick = () => { activeTargetTrackId = qItem.trackId; document.getElementById('symbolModal').style.display = 'flex'; };
                
                el.querySelector('.queue-delete-bar').onclick = () => removeQueueItem(qItem.queueId);
                
                el.querySelector('.vol-slider').oninput = (e) => {
                    qItem.volume = e.target.value;
                    if(qItem.playerAPI) qItem.playerAPI.setVolume(qItem.volume);
                    saveQueueState();
                };

                const timeTxt = el.querySelector('.time-text');
                timeTxt.onclick = () => promptTimeEntry(qItem);

                const slider = el.querySelector('.progress-slider');
                slider.addEventListener('mousedown', () => qItem.isScrubbing = true);
                slider.addEventListener('touchstart', () => qItem.isScrubbing = true, {passive: true});
                slider.addEventListener('input', (e) => {
                    qItem.currentTime = e.target.value;
                    timeTxt.textContent = `${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}`;
                });
                slider.addEventListener('change', (e) => {
                    qItem.isScrubbing = false; qItem.currentTime = e.target.value;
                    if(qItem.playerAPI) qItem.playerAPI.seekTo(qItem.currentTime);
                    saveQueueState();
                });

                container.appendChild(el);
            });
            updateGridGlow();
        }

        function updateQueueUI() { renderQueue(); }
        function updateQueueOrder() {
            const domItems = document.querySelectorAll('.queue-item'); const newQueue = [];
            domItems.forEach(el => {
                const item = queue.find(q => q.queueId === el.dataset.queueId);
                if(item) newQueue.push(item);
            });
            queue = newQueue; saveQueueState();
        }

        function removeQueueItem(queueId) {
            const index = queue.findIndex(q => q.queueId === queueId);
            if(index > -1) {
                if(queue[index].playerAPI) queue[index].playerAPI.destroy();
                const div = document.getElementById(`player_${queueId}`); if(div) div.remove();
                queue.splice(index, 1); updateQueueUI(); saveQueueState(); updateGridGlow();
            }
        }

        function masterPause() { queue.forEach(q => { if(q.state === 'PLAYING' && q.playerAPI) q.playerAPI.pause(); }); }

        // --- Time Tracker ---
        function startUITracker() {
            if(timeTrackerInterval) clearInterval(timeTrackerInterval);
            timeTrackerInterval = setInterval(() => {
                queue.forEach(qItem => {
                    if (qItem.state === 'PLAYING' && qItem.playerAPI && !qItem.isScrubbing) {
                        qItem.currentTime = qItem.playerAPI.getCurrentTime() || 0;
                        qItem.duration = qItem.playerAPI.getDuration() || qItem.duration;
                        
                        const timeEl = document.getElementById(`timeTxt_${qItem.queueId}`);
                        const sliderEl = document.getElementById(`slider_${qItem.queueId}`);
                        
                        if(timeEl) timeEl.textContent = `${formatTime(qItem.currentTime)} / ${formatTime(qItem.duration)}`;
                        if(sliderEl) { sliderEl.max = qItem.duration; sliderEl.value = qItem.currentTime; }
                    }
                });
            }, 500);
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function promptTimeEntry(qItem) {
            const input = prompt("Enter specific time (MM:SS):", formatTime(qItem.currentTime));
            if(!input) return;
            
            let seconds = 0; const parts = input.split(':');
            if(parts.length === 2) seconds = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
            else seconds = parseInt(input);

            if(isNaN(seconds)) return alert("Invalid time format.");
            if(seconds > qItem.duration) seconds = qItem.duration;
            
            qItem.currentTime = seconds;
            if(qItem.playerAPI) qItem.playerAPI.seekTo(seconds);
            updateQueueUI(); saveQueueState();
        }

        // --- Customization ---
        function handleFileSelect(e) {
            if(!e.target.files[0]) return;
            pendingImageFile = e.target.files[0];
            document.getElementById('imageModal').style.display = 'flex';
            e.target.value = '';
        }

        async function processPendingImage(autoAdjust) {
            if(!pendingImageFile || !activeTargetTrackId) return hideModal('imageModal');
            const base64Data = await readImageFile(pendingImageFile, autoAdjust);
            updateTrackData(activeTargetTrackId, { customImage: base64Data, autoAdjustImg: autoAdjust });
            hideModal('imageModal');
        }

        function readImageFile(file, autoAdjust) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!autoAdjust) resolve(e.target.result);
                    else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = Math.min(img.width, img.height);
                            canvas.width = size; canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            const x = (img.width - size) / 2; const y = (img.height - size) / 2;
                            ctx.drawImage(img, x, y, size, size, 0, 0, size, size);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function applyColorChange(hexColor) {
            if(!activeTargetTrackId) return;
            updateTrackData(activeTargetTrackId, { color: hexColor });
            hideModal('colorModal');
        }

        function populateSymbolGrid() {
            const grid = document.getElementById('symbolGrid');
            allSymbolsList.forEach(sym => {
                const div = document.createElement('div');
                div.className = 'sym-item'; div.textContent = sym;
                div.onclick = () => {
                    if(activeTargetTrackId) { updateTrackData(activeTargetTrackId, { symbol: sym, customImage: null }); hideModal('symbolModal'); }
                };
                grid.appendChild(div);
            });
        }

        function updateTrackData(trackId, updatesObj) {
            const tIndex = tracks.findIndex(t => t.id === trackId);
            if(tIndex > -1) { tracks[tIndex] = { ...tracks[tIndex], ...updatesObj }; saveTrackToDB(tracks[tIndex]); }
            queue.forEach(q => {
                if(q.trackId === trackId) {
                    if(updatesObj.color) q.color = updatesObj.color;
                    if(updatesObj.baseName) {
                        if(q.name.startsWith("Track ") || q.name === "Grabbing YouTube Title...") q.name = updatesObj.baseName;
                    }
                }
            });
            renderGrid(); updateQueueUI(); saveQueueState();
        }
    </script>
</body>
</html>
