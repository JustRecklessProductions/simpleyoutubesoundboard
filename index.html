<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick YouTube Soundboard</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --panel-bg: #111;
            --text: #ffffff;
            --neon-1: #fc0e12;
            --neon-2: #00fff7;
            --neon-3: #ff00fc;
            --neon-4: #fff500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* --- Input Section --- */
        .header-container {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        h1 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            outline: none;
        }
        
        input[type="text"]:focus { border-color: var(--neon-2); }

        button.btn-primary {
            padding: 12px 24px;
            background: transparent;
            color: white;
            border: 1px solid var(--neon-2);
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
        }

        button.btn-primary:hover {
            background: var(--neon-2);
            color: black;
            box-shadow: 0 0 15px var(--neon-2);
        }

        /* --- Masonry Grid --- */
        .masonry-container {
            padding: 20px;
            column-count: 4;
            column-gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) { .masonry-container { column-count: 3; } }
        @media (max-width: 768px) { .masonry-container { column-count: 2; } }
        @media (max-width: 480px) { .masonry-container { column-count: 1; } }

        .track-box {
            break-inside: avoid;
            margin-bottom: 20px;
            background: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            border: 2px solid;
            color: var(--neon-color);
        }

        .track-box:hover { transform: scale(1.03); }

        .track-box.aspect-square { aspect-ratio: 1 / 1; }

        .track-symbol {
            font-size: 5rem;
            text-shadow: 0 0 10px var(--neon-color);
            z-index: 1;
        }

        .track-box img {
            width: 100%;
            display: block;
            object-fit: cover;
            z-index: 0;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .track-box:hover img { opacity: 0.4; }
        
        .track-box .hover-text {
            position: absolute;
            z-index: 2;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 2px 2px 4px black;
        }
        .track-box:hover .hover-text { opacity: 1; }

        /* --- Dashboard Panel --- */
        .dashboard {
            position: fixed;
            top: 0;
            right: 0;
            width: 450px;
            height: 100vh;
            background: var(--panel-bg);
            border-left: 1px solid #333;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) { .dashboard { width: 100%; } }

        .dashboard.open { transform: translateX(0); }

        .dashboard-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .master-pause {
            background: transparent;
            color: var(--neon-1);
            border: 1px solid var(--neon-1);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .master-pause:hover {
            background: var(--neon-1);
            color: black;
            box-shadow: 0 0 10px var(--neon-1);
        }

        .queue-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* --- Queue Items --- */
        .queue-item {
            background: #000;
            border: 1px solid var(--neon-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            cursor: grab;
            transition: box-shadow 0.3s;
        }

        .queue-item:active { cursor: grabbing; }

        /* Audio Visualizer Pulse */
        .queue-item.is-playing {
            animation: neon-pulse 1.5s infinite alternate;
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 5px var(--neon-color), inset 0 0 5px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 20px var(--neon-color), inset 0 0 10px var(--neon-color); }
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: var(--neon-color);
            font-weight: bold;
        }

        .queue-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .control-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn:hover { background: #444; border-color: var(--neon-color); }
        .control-btn.active { background: var(--neon-color); color: black; }

        .time-tracker { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        .volume-control input[type="range"] {
            flex-grow: 1;
            accent-color: var(--neon-color);
        }

        /* --- FAB --- */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: black;
            border: 2px solid var(--neon-3);
            color: var(--neon-3);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 0 15px var(--neon-3);
            transition: all 0.3s;
        }
        .fab:hover { background: var(--neon-3); color: black; transform: scale(1.1); }

        /* --- Modal for Image Crop --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--neon-4);
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 30px var(--neon-4);
        }
        .modal h2 { margin-bottom: 20px; color: var(--neon-4); }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px;}
        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-auto { background: var(--neon-2); color: black; }
        .btn-keep { background: transparent; border: 1px solid white; color: white; }

        /* Hidden IFRAMES */
        #hidden-players { display: none; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Quick YouTube Soundboard</h1>
        <div class="input-group">
            <input type="text" id="youtubeLink" placeholder="Paste YouTube link here...">
            <button class="btn-primary" id="uploadBtn">Add Track</button>
        </div>
    </div>

    <div class="masonry-container" id="masonryContainer"></div>

    <div class="fab" id="fab">☰</div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <button class="master-pause" id="masterPauseBtn">⏸ Master Pause</button>
            <h2 style="color: white; font-weight: 300;">QUEUE</h2>
            <button class="close-btn" id="closeDashboard">&times;</button>
        </div>
        <div class="queue-container" id="queueContainer"></div>
    </div>

    <div id="hidden-players"></div>

    <div class="modal-overlay" id="imageModal">
        <div class="modal">
            <h2>Process Album Art</h2>
            <p style="color:#ccc; font-size:0.9rem;">How would you like to apply this picture?</p>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnAutoAdjust">Auto Adjust (1:1)</button>
                <button class="btn-keep" id="btnKeepAspect">Do Not Adjust</button>
            </div>
            <button style="margin-top:20px; background:none; border:none; color:#777; cursor:pointer;" id="btnCancelImg">Cancel</button>
        </div>
    </div>
    <input type="file" id="hiddenFileInput" accept="image/*" style="display: none;">

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- Constants & State ---
        const neonColors = ['#fc0e12', '#00fff7', '#ff00fc', '#fff500'];
        const symbols = ['♫', '𝄞', '♪', '𝄢', '𝄽', '♬', '♮', '𝄡'];
        
        let tracks = []; // Base tracks added to masonry
        let queue = [];  // Instances in the dashboard
        let colorIndex = 0;
        let symbolIndex = 0;
        let timeTrackerInterval = null;

        // Image Processing State
        let pendingImageFile = null;
        let pendingQueueIdForImage = null;

        // --- IndexedDB Wrapper ---
        const DB_NAME = 'YTSoundboardDB';
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('tracks')) {
                        db.createObjectStore('tracks', { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                req.onerror = (e) => reject(e);
            });
        }

        function saveTrackToDB(track) {
            const tx = db.transaction('tracks', 'readwrite');
            tx.objectStore('tracks').put(track);
        }

        function loadTracksFromDB() {
            return new Promise((resolve) => {
                const tx = db.transaction('tracks', 'readonly');
                const store = tx.objectStore('tracks');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
            });
        }

        function deleteTrackFromDB(id) {
            const tx = db.transaction('tracks', 'readwrite');
            tx.objectStore('tracks').delete(id);
        }

        // --- Initialization ---
        async function initApp() {
            await initDB();
            const savedTracks = await loadTracksFromDB();
            tracks = savedTracks || [];
            
            // Re-sync sequence counters based on loaded data length
            if(tracks.length > 0) {
                colorIndex = tracks.length % neonColors.length;
                symbolIndex = tracks.length % symbols.length;
            }

            renderMasonry();
            setupEventListeners();
            startUITracker();
        }

        function onYouTubeIframeAPIReady() {
            initApp();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('uploadBtn').addEventListener('click', handleAddTrack);
            document.getElementById('fab').addEventListener('click', toggleDashboard);
            document.getElementById('closeDashboard').addEventListener('click', toggleDashboard);
            document.getElementById('masterPauseBtn').addEventListener('click', masterPause);
            
            // Image Modal Listeners
            document.getElementById('btnAutoAdjust').addEventListener('click', () => processPendingImage(true));
            document.getElementById('btnKeepAspect').addEventListener('click', () => processPendingImage(false));
            document.getElementById('btnCancelImg').addEventListener('click', closeImageModal);
            document.getElementById('hiddenFileInput').addEventListener('change', handleFileSelect);

            // Drag and Drop Zone (Queue Container)
            const qc = document.getElementById('queueContainer');
            qc.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(qc, e.clientY);
                const draggable = document.querySelector('.dragging');
                if(!draggable) return;
                if (afterElement == null) {
                    qc.appendChild(draggable);
                } else {
                    qc.insertBefore(draggable, afterElement);
                }
            });
            qc.addEventListener('drop', updateQueueOrder);
        }

        // --- Core Functions ---
        function handleAddTrack() {
            const input = document.getElementById('youtubeLink');
            const url = input.value.trim();
            if (!url) return;

            const ytId = extractVideoId(url);
            if (!ytId) return alert('Invalid YouTube URL');

            const newTrack = {
                id: 'track_' + Date.now(),
                ytId: ytId,
                color: neonColors[colorIndex],
                symbol: symbols[symbolIndex],
                baseName: `Track ${tracks.length + 1}`,
                customImage: null,
                autoAdjustImg: true
            };

            colorIndex = (colorIndex + 1) % neonColors.length;
            symbolIndex = (symbolIndex + 1) % symbols.length;

            tracks.push(newTrack);
            saveTrackToDB(newTrack);
            renderMasonry();
            input.value = '';
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- Masonry UI ---
        function renderMasonry() {
            const container = document.getElementById('masonryContainer');
            container.innerHTML = '';

            tracks.forEach(track => {
                const box = document.createElement('div');
                box.className = `track-box ${track.autoAdjustImg ? 'aspect-square' : ''}`;
                box.style.setProperty('--neon-color', track.color);
                
                if (track.customImage) {
                    const img = document.createElement('img');
                    img.src = track.customImage;
                    box.appendChild(img);
                } else {
                    const sym = document.createElement('div');
                    sym.className = 'track-symbol';
                    sym.textContent = track.symbol;
                    box.appendChild(sym);
                }

                const hoverTxt = document.createElement('div');
                hoverTxt.className = 'hover-text';
                hoverTxt.textContent = "ADD TO MIX";
                box.appendChild(hoverTxt);

                box.addEventListener('click', () => addToQueue(track));
                container.appendChild(box);
            });
        }

        // --- Dashboard / Queue Logic ---
        function toggleDashboard() {
            document.getElementById('dashboard').classList.toggle('open');
        }

        function addToQueue(track) {
            // Count existing instances to auto-number
            const existingCount = queue.filter(q => q.trackId === track.id).length;
            const displayName = existingCount > 0 ? `${track.baseName} (${existingCount + 1})` : track.baseName;

            const qItem = {
                queueId: 'q_' + Date.now() + Math.floor(Math.random() * 1000),
                trackId: track.id,
                ytId: track.ytId,
                name: displayName,
                color: track.color,
                player: null,
                state: 'PAUSED', // PLAYING, PAUSED
                duration: 0,
                isLooping: false,
                volume: 50
            };

            queue.push(qItem);
            renderQueue();
            createHiddenPlayer(qItem);
        }

        function createHiddenPlayer(qItem) {
            const container = document.getElementById('hidden-players');
            const div = document.createElement('div');
            div.id = `player_${qItem.queueId}`;
            container.appendChild(div);

            qItem.player = new YT.Player(`player_${qItem.queueId}`, {
                height: '0', width: '0',
                videoId: qItem.ytId,
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': (event) => {
                        qItem.duration = event.target.getDuration();
                        event.target.setVolume(qItem.volume);
                        updateQueueUI(qItem);
                    },
                    'onStateChange': (event) => handlePlayerStateChange(event, qItem)
                }
            });
        }

        function handlePlayerStateChange(event, qItem) {
            if (event.data === YT.PlayerState.ENDED) {
                if (qItem.isLooping) {
                    qItem.player.playVideo();
                } else {
                    qItem.state = 'PAUSED';
                    updateQueueUI(qItem);
                }
            } else if (event.data === YT.PlayerState.PLAYING) {
                qItem.state = 'PLAYING';
                updateQueueUI(qItem);
            } else if (event.data === YT.PlayerState.PAUSED) {
                qItem.state = 'PAUSED';
                updateQueueUI(qItem);
            }
        }

        function renderQueue() {
            const container = document.getElementById('queueContainer');
            container.innerHTML = '';

            queue.forEach(qItem => {
                const el = document.createElement('div');
                el.className = `queue-item ${qItem.state === 'PLAYING' ? 'is-playing' : ''}`;
                el.dataset.queueId = qItem.queueId;
                el.style.setProperty('--neon-color', qItem.color);
                el.draggable = true;

                // Drag Events
                el.addEventListener('dragstart', () => el.classList.add('dragging'));
                el.addEventListener('dragend', () => el.classList.remove('dragging'));

                el.innerHTML = `
                    <div class="queue-header">
                        <span class="q-name">${qItem.name}</span>
                        <span class="q-status">${qItem.state === 'PLAYING' ? '▶ Playing' : '⏸ Paused'}</span>
                    </div>
                    <div class="time-tracker" id="time_${qItem.queueId}">0:00 / 0:00</div>
                    
                    <div class="queue-controls">
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn pause-btn">⏸</button>
                        <button class="control-btn stop-btn">⏹</button>
                        <button class="control-btn loop-btn ${qItem.isLooping ? 'active' : ''}">Loop</button>
                        <button class="control-btn rename-btn">Rename</button>
                        <button class="control-btn pic-btn">🖼️ Art</button>
                        <button class="control-btn del-btn" style="border-color: #ff4444; color: #ff4444;">X</button>
                    </div>

                    <div class="volume-control">
                        <span>🔈</span>
                        <input type="range" min="0" max="100" value="${qItem.volume}" class="vol-slider">
                        <span>🔊</span>
                    </div>
                `;

                // Button Listeners
                el.querySelector('.play-btn').onclick = () => { if(qItem.player && qItem.player.playVideo) qItem.player.playVideo(); };
                el.querySelector('.pause-btn').onclick = () => { if(qItem.player && qItem.player.pauseVideo) qItem.player.pauseVideo(); };
                el.querySelector('.stop-btn').onclick = () => { 
                    if(qItem.player && qItem.player.stopVideo) {
                        qItem.player.stopVideo(); 
                        qItem.player.seekTo(0);
                        qItem.state = 'PAUSED';
                        updateQueueUI(qItem);
                    }
                };
                el.querySelector('.loop-btn').onclick = () => {
                    qItem.isLooping = !qItem.isLooping;
                    updateQueueUI(qItem);
                };
                el.querySelector('.rename-btn').onclick = () => {
                    const newName = prompt("Rename track:", qItem.name);
                    if(newName) {
                        qItem.name = newName;
                        // Also update base track name if it's the first instance
                        const baseTrack = tracks.find(t => t.id === qItem.trackId);
                        if(baseTrack) {
                            baseTrack.baseName = newName.replace(/\s\(\d+\)$/, ''); // strip numbers
                            saveTrackToDB(baseTrack);
                        }
                        updateQueueUI(qItem);
                    }
                };
                el.querySelector('.del-btn').onclick = () => removeQueueItem(qItem.queueId);
                el.querySelector('.pic-btn').onclick = () => triggerImageUpload(qItem.queueId);
                
                // Volume Listener
                el.querySelector('.vol-slider').oninput = (e) => {
                    qItem.volume = e.target.value;
                    if(qItem.player && qItem.player.setVolume) qItem.player.setVolume(qItem.volume);
                };

                container.appendChild(el);
            });
        }

        function updateQueueUI(qItem) {
            // Render everything to keep state in sync cleanly
            renderQueue(); 
        }

        function removeQueueItem(queueId) {
            const index = queue.findIndex(q => q.queueId === queueId);
            if(index > -1) {
                const qItem = queue[index];
                if(qItem.player && qItem.player.destroy) qItem.player.destroy();
                
                // Remove hidden div
                const div = document.getElementById(`player_${queueId}`);
                if(div) div.remove();

                queue.splice(index, 1);
                renderQueue();
            }
        }

        function masterPause() {
            queue.forEach(qItem => {
                if(qItem.state === 'PLAYING' && qItem.player && qItem.player.pauseVideo) {
                    qItem.player.pauseVideo();
                }
            });
        }

        // --- Drag and Drop Logic ---
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.queue-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function updateQueueOrder() {
            const domItems = document.querySelectorAll('.queue-item');
            const newQueue = [];
            domItems.forEach(el => {
                const qId = el.dataset.queueId;
                const item = queue.find(q => q.queueId === qId);
                if(item) newQueue.push(item);
            });
            queue = newQueue;
        }

        // --- Time Tracker ---
        function startUITracker() {
            if(timeTrackerInterval) clearInterval(timeTrackerInterval);
            timeTrackerInterval = setInterval(() => {
                queue.forEach(qItem => {
                    if (qItem.state === 'PLAYING' && qItem.player && qItem.player.getCurrentTime) {
                        const cur = qItem.player.getCurrentTime();
                        const dur = qItem.duration || 0;
                        const el = document.getElementById(`time_${qItem.queueId}`);
                        if(el) {
                            el.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
                        }
                    }
                });
            }, 500);
        }

        function formatTime(seconds) {
            if(!seconds) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // --- Image Upload Logic ---
        function triggerImageUpload(queueId) {
            pendingQueueIdForImage = queueId;
            document.getElementById('hiddenFileInput').click();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if(!file) return;
            pendingImageFile = file;
            document.getElementById('imageModal').style.display = 'flex';
            e.target.value = ''; // Reset input
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
            pendingImageFile = null;
            pendingQueueIdForImage = null;
        }

        async function processPendingImage(autoAdjust) {
            if(!pendingImageFile || !pendingQueueIdForImage) return closeImageModal();

            const base64Data = await readImageFile(pendingImageFile, autoAdjust);
            
            // Find the queue item to find the base track ID
            const qItem = queue.find(q => q.queueId === pendingQueueIdForImage);
            if(qItem) {
                const trackIndex = tracks.findIndex(t => t.id === qItem.trackId);
                if(trackIndex > -1) {
                    tracks[trackIndex].customImage = base64Data;
                    tracks[trackIndex].autoAdjustImg = autoAdjust;
                    saveTrackToDB(tracks[trackIndex]);
                    renderMasonry(); // Re-render grid to show image
                }
            }
            closeImageModal();
        }

        function readImageFile(file, autoAdjust) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (!autoAdjust) {
                        resolve(e.target.result); // return raw base64
                    } else {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const size = Math.min(img.width, img.height);
                            canvas.width = size;
                            canvas.height = size;
                            const ctx = canvas.getContext('2d');
                            // Crop to center
                            const x = (img.width - size) / 2;
                            const y = (img.height - size) / 2;
                            ctx.drawImage(img, x, y, size, size, 0, 0, size, size);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    }
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
