<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Simple Soundboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b; --panel-bg: #111; --text: #ffffff;
            --neon-1: #fc0e12; --neon-2: #00fff7; --neon-3: #ff00fc; --neon-4: #fff500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; display: flex; height: 100dvh; width: 100vw;
        }

        .main-wrapper { flex-grow: 1; min-width: 0; overflow-y: auto; position: relative; }

        /* --- Universal Input Section --- */
        .header-container { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        h1 { margin-bottom: 25px; font-weight: 300; letter-spacing: 2px; }

        .input-stack {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 100%; max-width: 600px; margin: 0 auto;
        }
        .input-stack input[type="text"] {
            width: 100%; padding: 16px; background: #222; font-family: 'Nunito', sans-serif;
            border: 1px solid #444; color: white; border-radius: 8px; outline: none; font-size: 16px; text-align: center;
        }
        .input-stack input[type="text"]:focus { border-color: var(--neon-2); }
        
        @media (max-width: 768px) { .input-stack input[type="text"]::placeholder { font-size: 11.5px; } }

        .input-buttons { display: flex; gap: 10px; justify-content: center; width: 100%; }
        button.btn-primary, button.btn-secondary {
            flex: 1; padding: 14px 20px; background: transparent; color: white; font-size: 14px;
            border: 1px solid var(--neon-2); border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        button.btn-secondary { border-color: var(--neon-4); color: var(--neon-4); }
        button.btn-primary:hover { background: var(--neon-2); color: black; box-shadow: 0 0 15px var(--neon-2); }
        button.btn-secondary:hover { background: var(--neon-4); color: black; box-shadow: 0 0 15px var(--neon-4); }

        .header-controls { 
            display: flex; flex-direction: column; gap: 12px; margin: 25px auto 0 auto; 
            align-items: center; width: 100%; max-width: 600px;
        }
        .action-btn {
            width: 100%; padding: 14px 20px; background: transparent; color: var(--neon-3); font-size: 14px;
            border: 1px solid var(--neon-3); border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif;
            text-transform: uppercase; font-weight: bold; transition: all 0.3s;
        }
        .action-btn:hover { background: var(--neon-3); color: black; box-shadow: 0 0 15px var(--neon-3); }
        #editGridBtn { border-color: white; color: white; }
        #editGridBtn:hover { background: white; color: black; box-shadow: 0 0 15px white; }

        @media (max-width: 768px) { .desktop-only { display: none; } }

        /* --- Grid & Boxes --- */
        .grid-container {
            padding: 20px; display: grid; gap: 20px; max-width: 1400px; margin: 0 auto;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }
        @media (max-width: 768px) { .grid-container { grid-template-columns: repeat(auto-fill, minmax(40%, 1fr)); gap: 15px; padding: 15px; } }

        .track-box {
            background: transparent; border-radius: 16px; position: relative; aspect-ratio: 1 / 1;
            width: 100%; height: 100%; touch-action: manipulation; transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }
        .track-box-content {
            background: black; border-radius: 16px; position: absolute; top:0; left:0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 2px solid var(--neon-color); cursor: pointer; z-index: 1; transition: border-width 0.2s, border-color 0.2s;
        }
        .track-box:not(.is-editing):hover { transform: scale(1.02); z-index: 5; }

        @media (min-width: 769px) {
            .track-box.in-queue { transform: scale(1.08); z-index: 10; }
            .track-box.in-queue:not(.is-editing):hover { transform: scale(1.10); z-index: 11; }
        }
        
        /* Thicker Border ONLY when Playing */
        .track-box.is-playing-glow .track-box-content {
            border-width: 6px; box-shadow: 0 0 25px var(--neon-color), inset 0 0 10px rgba(255,255,255,0.1); border-color: var(--neon-color);
        }

        .delete-box-btn {
            position: absolute; top: -12px; right: -12px; width: 36px; height: 36px; font-family: 'Nunito', sans-serif;
            background: #ff4444; border: 3px solid var(--bg); border-radius: 50%;
            color: white; font-weight: bold; font-size: 16px; display: none; align-items: center; justify-content: center;
            z-index: 20; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s;
        }
        @media (min-width: 769px) { body.is-editing .delete-box-btn { display: flex; } }
        @media (max-width: 768px) {
            body.is-editing .track-box { animation: jiggle 0.3s infinite; }
            @keyframes jiggle { 0% {transform: rotate(-1deg);} 50% {transform: rotate(1deg);} 100% {transform: rotate(-1deg);} }
            .delete-box-btn { top: 0; right: 0; width: 100%; height: 35px; background: rgba(255, 68, 68, 0.95); border: none; border-bottom: 2px solid white; border-radius: 14px 14px 0 0; color: transparent; }
            .delete-box-btn::after { content: "DELETE"; color: white; position: absolute; font-size: 14px; letter-spacing: 2px; font-weight: bold; font-family: 'Nunito', sans-serif; }
            body.is-editing .delete-box-btn { display: flex; }
        }

        .dragging { transform: scale(1.05) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important; opacity: 1 !important; z-index: 50 !important; transition: transform 0.15s ease, box-shadow 0.15s ease !important; }
        .dragging * { pointer-events: none !important; }

        .track-symbol { font-size: 4rem; text-shadow: 0 0 15px var(--neon-color); filter: drop-shadow(0 0 12px var(--neon-color)); z-index: 1; pointer-events: none; transform: translateZ(0); }
        .track-box img { width: 100%; height: 100%; display: block; object-fit: cover; z-index: 0; opacity: 0.8; transition: opacity 0.3s; pointer-events: none; }
        .track-box:hover img { opacity: 0.4; }
        .track-box .hover-text { position: absolute; top: 25px; z-index: 2; font-weight: bold; font-size: 0.95rem; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; text-shadow: 2px 2px 4px black; pointer-events: none; width: 100%; text-align: center; padding: 0 10px; }
        .track-box:not(.is-editing):hover .hover-text { opacity: 1; }
        .track-box.in-queue .hover-text { display: none !important; }

        /* --- Dashboard --- */
        .dashboard {
            display: flex; flex-direction: column; background: var(--panel-bg); z-index: 1000;
            width: 450px; flex-shrink: 0; margin-right: -450px; border-left: 1px solid #333; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            transition: margin-right 0.4s cubic-bezier(0.25, 1, 0.5, 1); height: 100dvh;
        }
        .dashboard.open { margin-right: 0; }
        @media (max-width: 768px) { 
            .dashboard { position: fixed; top: 0; right: 0; width: 100%; margin-right: 0; border-left: none; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
            .dashboard.open { transform: translateX(0); }
        }

        .dashboard-header, .dashboard-footer { background: #000; display: flex; flex-shrink: 0; width: 100%; padding: 0; }
        .dashboard-header { border-bottom: 1px solid #222; }
        .dashboard-footer { border-top: 1px solid #222; }
        .dashboard-header button, .dashboard-footer button { width: 100%; padding: 24px; font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: transparent; border: none; cursor: pointer; margin: 0; transition: background 0.3s, color 0.3s, text-shadow 0.3s; }
        .dashboard-header button:hover, .dashboard-footer button:hover { background: rgba(255,255,255,0.05); }
        .master-pause { color: var(--neon-1); }
        .master-play { color: #39ff14; text-shadow: 0 0 10px #39ff14; }
        .close-dashboard-btn { color: #888; }
        .close-dashboard-btn:hover { color: white; }

        .queue-container { flex-grow: 1; overflow-y: auto; padding: 20px; overflow-x: hidden; }
        .queue-item-wrapper { position: relative; margin-bottom: 16px; background: #ff3b30; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .queue-item { position: relative; width: 100%; display: flex; align-items: stretch; background: #0b0b0b; border: 1px solid #333; border-radius: 16px; z-index: 2; transition: transform 0.2s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .queue-item.is-playing { border-color: var(--neon-color); box-shadow: 0 0 20px var(--neon-color), inset 0 0 5px rgba(255,255,255,0.05); }
        
        .queue-left-actions { width: 48px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid #222; border-radius: 16px 0 0 16px; overflow: hidden; }
        .options-btn { flex-grow: 1; height: 100%; background: transparent; border: none; color: var(--neon-color); font-size: 24px; font-weight: bold; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .options-btn:hover { background: rgba(255,255,255,0.05); }
        .queue-delete-btn { height: 25%; background: transparent; border: none; border-top: 1px solid #222; color: #ff4444; font-size: 16px; font-weight: bold; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .queue-delete-btn:hover { background: rgba(255,68,68,0.15); text-shadow: 0 0 10px #ff4444; }

        .play-pause-btn { width: 65px; flex-shrink: 0; background: transparent; border: none; border-left: 1px solid #222; color: white; font-size: 26px; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 16px 16px 0; transition: background 0.2s; }
        .play-pause-btn.active { color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); }
        .queue-item-center { flex-grow: 1; padding: 16px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; touch-action: pan-y; }
        .q-name-container { display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 12px; }
        .q-name { display: inline-block; font-size: 1.1rem; font-weight: 700; color: var(--neon-color); animation: scroll-left-right 8s linear infinite alternate; }
        @keyframes scroll-left-right { 0%, 10% { transform: translateX(15%); } 90%, 100% { transform: translateX(-15%); } }
        .time-text { font-size: 1rem; color: #fff; cursor: pointer; display: block; width: fit-content; margin: 0 auto 16px auto; background: rgba(255,255,255,0.15); padding: 10px 24px; border-radius: 24px; font-weight: 700; transition: background 0.2s; text-align: center; letter-spacing: 1px; }
        .sliders-container { display: flex; flex-direction: column; gap: 16px; width: 100%; }
        input[type="range"] { -webkit-appearance: none; background: rgba(255,255,255,0.15); height: 6px; border-radius: 3px; outline: none; flex-grow: 1; cursor: pointer; width: 100%; }
        input[type="range"].progress-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--neon-color) !important; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.8); }
        input[type="range"].vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: white !important; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.8); }

        /* --- Modals --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal { background: #111; padding: 30px; border-radius: 16px; border: 1px solid var(--neon-4); text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 30px var(--neon-4); }
        .modal h2 { margin-bottom: 20px; color: var(--text); font-weight: 600; }
        .modal p { font-weight: 400; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;}
        .modal-buttons button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; font-family: 'Nunito', sans-serif;}
        .btn-auto { background: var(--neon-2); color: black; }
        .btn-keep { background: transparent; border: 1px solid white; color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-cancel { margin-top:20px; background:none; border:none; color:#777; cursor:pointer; font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 600;}
        .color-options { display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 20px;}
        .color-swatch { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: transform 0.2s; }
        input[type="color"] { width: 48px; height: 48px; border: none; border-radius: 50%; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid #fff; }
        #colorPreview { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 15px auto; border: 3px solid white; }
        #timeInput { width: 100%; padding: 15px; font-size: 28px; font-family: 'Nunito', sans-serif; font-weight: 700; text-align: center; background: #222; border: 1px solid var(--neon-2); color: white; border-radius: 12px; outline: none; margin-bottom: 10px; letter-spacing: 2px; }
        
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
        .bottom-sheet { background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(25px); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1); border-top: 1px solid rgba(255,255,255,0.1); }
        .bottom-sheet.open { transform: translateY(0); }
        .sheet-group { background: rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
        .sheet-btn { width: 100%; padding: 18px; font-family: 'Nunito', sans-serif; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.05); color: white; font-size: 1.1rem; text-align: center; cursor: pointer; font-weight: 600; }
        .sheet-cancel { font-weight: 700; color: #ff4444 !important; }
        .sheet-delete { background: #ff4444 !important; color: white !important; font-weight: 700;}
        
        .fab, .fab-stop-edit { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 64px; height: 64px; border-radius: 50%; background: black; border: 2px solid var(--neon-3); color: var(--neon-3); font-size: 1.8rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; box-shadow: 0 0 20px var(--neon-3); transition: all 0.3s; }
        .fab-stop-edit { display: none; bottom: 110px; border-color: var(--neon-4); color: var(--neon-4); width: 56px; height: 56px; font-size: 1.5rem;}
        #hidden-players { display: none; }
    </style>
</head>
<body>
    <div class="main-wrapper" id="mainWrapper">
        <div class="header-container">
            <h1>Super Simple Soundboard</h1>
            <div class="input-stack">
                <input type="text" id="mediaLink" placeholder="Paste YouTube, SoundCloud, Twitch, or Vimeo link Here...">
                <div class="input-buttons">
                    <button class="btn-primary" id="uploadLinkBtn">Add Link</button>
                    <button class="btn-secondary" id="triggerMp3Btn">Upload MP3</button>
                    <input type="file" id="mp3Input" accept="audio/mp3, audio/mpeg" style="display: none;">
                </div>
            </div>
            <div class="header-controls desktop-only">
                <button class="action-btn" id="toggleDesktopBtn">Toggle Queue</button>
                <button class="action-btn" id="editGridBtn">Edit Grid</button>
            </div>
        </div>
        <div class="grid-container" id="gridContainer"></div>
    </div>

    <div class="fab" id="fab">вҳ°</div>
    <div class="fab-stop-edit" id="fabStopEdit">рҹ‘Қ</div>

    <div class="dashboard" id="dashboard">
        <div class="dashboard-header"><button class="master-play" id="masterToggleBtn">Play All</button></div>
        <div class="queue-container" id="queueContainer"></div>
        <div class="dashboard-footer"><button class="close-dashboard-btn" id="closeDashboardBtn">Close</button></div>
    </div>

    <div class="bottom-sheet-overlay" id="bottomSheetOverlay">
        <div class="bottom-sheet" id="bottomSheet">
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-fadein">Fade In</button>
                <button class="sheet-btn" id="bs-fadeout">Fade to Pause</button>
                <button class="sheet-btn" id="bs-loop">Loop</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-dup">Duplicate Track</button>
                <button class="sheet-btn" id="bs-link">Change Link</button>
                <button class="sheet-btn" id="bs-rename">Rename Track</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn" id="bs-art">Album Art</button>
                <button class="sheet-btn" id="bs-color">Color</button>
                <button class="sheet-btn" id="bs-symbol">Symbol</button>
            </div>
            <div class="sheet-group">
                <button class="sheet-btn sheet-delete" id="bs-delete">Delete Track</button>
            </div>
            <div class="sheet-group"><button class="sheet-btn sheet-cancel" id="bs-cancel">Cancel</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="colorModal">
        <div class="modal">
            <h2>Select Color</h2>
            <div id="colorPreview"></div>
            <div class="color-options">
                <div class="color-swatch" style="background: #fc0e12;" data-color="#fc0e12"></div>
                <div class="color-swatch" style="background: #00fff7;" data-color="#00fff7"></div>
                <div class="color-swatch" style="background: #ff00fc;" data-color="#ff00fc"></div>
                <div class="color-swatch" style="background: #fff500;" data-color="#fff500"></div>
                <input type="color" id="nativeColorPicker" value="#ffffff">
            </div>
            <button class="btn-auto" id="btnConfirmColor" style="width:100%">Apply Color</button>
            <button class="btn-cancel" onclick="hideModal('colorModal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="timeModal">
        <div class="modal">
            <h2>Set Time</h2>
            <p style="color: #888; font-size: 12px; margin-bottom: 15px;">Type digits to format time (e.g. 123 for 1:23)</p>
            <input type="tel" id="timeInput" inputmode="numeric" pattern="[0-9]*" placeholder="0:00">
            <button class="btn-auto" id="btnConfirmTime" style="width:100%">Jump to Time</button>
            <button class="btn-cancel" onclick="hideModal('timeModal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="artSourceModal">
        <div class="modal">
            <h2>Add Album Art</h2>
            <div class="modal-buttons" style="flex-direction: column;">
                <button class="btn-auto" id="btnArtUploadChoice">Upload Image/GIF</button>
                <button class="btn-keep" id="btnArtLinkChoice">Paste Link</button>
            </div>
            <button class="btn-cancel" onclick="hideModal('artSourceModal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="replaceArtModal">
        <div class="modal">
            <h2>Manage Art</h2>
            <div class="modal-buttons">
                <button class="btn-auto" id="btnReplaceArt">Replace Art</button>
                <button class="btn-danger" id="btnRemoveArt">Remove Art</button>
            </div>
            <button class="btn-cancel" onclick="hideModal('replaceArtModal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="symbolModal">
        <div class="modal symbol-modal">
            <h2>Select Symbol</h2>
            <div class="symbol-grid" id="symbolGrid"></div>
            <button class="btn-cancel" onclick="hideModal('symbolModal')">Cancel</button>
        </div>
    </div>

    <div id="hidden-players"></div>
    <input type="file" id="hiddenFileInput" accept="image/*, image/gif" style="display: none;">

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>

    <script>
        const neonColors = ['#fc0e12', '#00fff7', '#ff00fc', '#fff500'];
        const defaultMusicSymbols = ['вҷ«', 'рқ„һ', 'вҷӘ', 'рқ„ў', 'рқ„Ҫ', 'вҷ¬', 'вҷ®', 'рқ„Ў'];

        function setupDragAndDrop(container, itemClass, callback) {
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientX, e.clientY, itemClass);
                const draggable = document.querySelector('.dragging');
                if(!draggable) return;
                if (afterElement == null) container.appendChild(draggable);
                else container.insertBefore(draggable, afterElement);
            });
            container.addEventListener('drop', () => { document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging')); callback(); });
        }
        function getDragAfterElement(container, x, y, itemClass) {
            const elements = [...container.querySelectorAll(`.${itemClass}:not(.dragging)`)];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                if(itemClass === 'track-box' && (x < box.left || x > box.right)) return closest; 
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function parseMediaUrl(url) {
            let yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/); if(yt) return { platform: 'youtube', id: yt[1] };
            let vim = url.match(/vimeo\.com\/(?:video\/)?(\d+)/); if(vim) return { platform: 'vimeo', id: vim[1] };
            if(url.includes('soundcloud.com/')) return { platform: 'soundcloud', id: url };
            let twV = url.match(/twitch\.tv\/videos\/(\d+)/); if(twV) return { platform: 'twitch', type: 'video', id: twV[1] };
            let twC = url.match(/clips\.twitch\.tv\/([a-zA-Z0-9_-]+)/) || url.match(/twitch\.tv\/.*\/clip\/([a-zA-Z0-9_-]+)/); if(twC) return { platform: 'twitch', type: 'clip', id: twC[1] };
            return null;
        }

        function handleAddMediaLink() {
            const url = document.getElementById('mediaLink').value.trim();

            if(!parsed) return alert('Unsupported Link');
            
            const defaultSym = 'вҷ«';
            const track = { id: 'track_'+Date.now(), type: 'embed', platform: parsed.platform, mediaId: parsed.id, baseName: defaultSym, color: neonColors[colorIndex], symbol: defaultSym, twitchType: parsed.type || null };
            
            colorIndex = (colorIndex+1)%neonColors.length;
            tracks.push(track); saveTrackToDB(track); renderGrid(); document.getElementById('mediaLink').value = '';
        }

        function handleAddMP3(e) {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (ev) => {
                const defaultSym = 'вҷ«';
                const track = { id: 'track_'+Date.now(), type: 'mp3', platform: 'local', baseName: file.name.replace(/\.[^/.]+$/, ""), color: neonColors[colorIndex], symbol: defaultSym, localAudio: ev.target.result };
                colorIndex = (colorIndex+1)%neonColors.length;

            }; reader.readAsDataURL(file); e.target.value = '';
        }

        function fadeIn(qItem) {
            if(!qItem.playerAPI) return; let targetVol = qItem.volume; qItem.volume = 0; qItem.playerAPI.setVolume(0); qItem.state = 'PLAYING'; qItem.preventGhostPlay = false; qItem.playerAPI.play();
            let step = targetVol / 100; const interval = setInterval(() => { qItem.volume = Math.min(targetVol, parseFloat(qItem.volume) + step); qItem.playerAPI.setVolume(qItem.volume); updateQueueUI(); if(qItem.volume >= targetVol) clearInterval(interval); }, 80);
        }

        function fadeOut(qItem) {
            if(!qItem.playerAPI || qItem.state !== 'PLAYING') return;
            const interval = setInterval(() => { qItem.volume = Math.max(0, qItem.volume - 1); qItem.playerAPI.setVolume(qItem.volume); updateQueueUI(); if(qItem.volume <= 0) { clearInterval(interval); qItem.playerAPI.pause(); qItem.state = 'PAUSED'; updateQueueUI(); } }, 80);
        }

            const domItems = document.querySelectorAll('.queue-item-wrapper'); const newQueue = [];
            domItems.forEach(el => {
                const item = queue.find(q => q.queueId === el.dataset.queueId);
                if(item) newQueue.push(item);
            });
            if(newQueue.length > 0) { queue = newQueue; saveQueueState(); }
        }
        function updateTrackOrder() {
            const domItems = document.querySelectorAll('.track-box'); const newTracks = [];
            domItems.forEach(el => {
                const t = tracks.find(tr => tr.id === el.dataset.trackId);
                if(t) newTracks.push(t);
            });
            if(newTracks.length > 0) { tracks = newTracks; saveAllTracksToDB(); }
        }

        function restoreQueueItem(s) { const base = tracks.find(t=>t.id===s.trackId); if(!base) return; const q = {...s, state: 'PAUSED', color: base.color, playerAPI: null, isScrubbing: false, preventGhostPlay: true}; queue.push(q); renderQueue(); initializePlayer(q, base, true); }
        function addToQueue(t, startAt=0) { const q = { queueId: 'q_'+Date.now()+Math.floor(Math.random()*1000), trackId: t.id, type: t.type, platform: t.platform, mediaId: t.mediaId, twitchType: t.twitchType, name: t.baseName, color: t.color, playerAPI: null, state: 'PAUSED', duration: 0, isLooping: false, volume: 50, currentTime: startAt, isScrubbing: false, preventGhostPlay: false }; queue.push(q); renderQueue(); initializePlayer(q, t); }
        function removeQueueItem(id) { const i = queue.findIndex(q=>q.queueId===id); if(i>-1) { if(queue[i].playerAPI) queue[i].playerAPI.destroy(); const div=document.getElementById(`player_${id}`); if(div) div.remove(); queue.splice(i,1); renderQueue(); renderGrid(); } }
        function formatTime(s) { if(!s) return "0:00"; const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function updateGridGlow() { document.querySelectorAll('.track-box').forEach(box => { const q = queue.filter(q=>q.trackId===box.dataset.trackId); box.classList.toggle('in-queue', q.length>0); box.classList.toggle('is-playing-glow', q.some(it=>it.state==='PLAYING')); }); }
        function updateMasterButton() { const btn = document.getElementById('masterToggleBtn'); const isP = queue.some(q=>q.state==='PLAYING'); btn.textContent = isP ? 'Pause All' : 'Play All'; btn.className = isP ? 'master-pause' : 'master-play'; }

        function initializePlayer(q, base, isRestore = false) {
            const h = document.getElementById('hidden-players');
            if(q.type === 'mp3') {
                const a = new Audio(base.localAudio); q.playerAPI = { play: ()=>a.play(), pause: ()=>a.pause(), stop: ()=>{a.pause(); a.currentTime=0;}, seekTo: (s)=>a.currentTime=s, setVolume: (v)=>a.volume=v/100, getDuration: ()=>a.duration, getCurrentTime: ()=>a.currentTime, destroy: ()=>{a.pause(); a.src='';} };
                a.onloadedmetadata = () => { q.duration = a.duration; a.volume = q.volume/100; if(q.currentTime > 0) a.currentTime = q.currentTime; updateQueueUI(); };
                a.ontimeupdate = () => { if(!q.isScrubbing) q.currentTime = a.currentTime; };
                a.onended = () => { if (q.isLooping) a.play(); else { q.state = 'PAUSED'; updateQueueUI(); saveQueueState(); } };
                a.onplay = () => { q.state = 'PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow();};
                a.onpause = () => { if(!q.isScrubbing) { q.state = 'PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow();} };
                if(!isRestore && q.state === 'PLAYING') a.play();

            } else if (q.platform === 'youtube') {
                if (typeof YT === 'undefined' || !YT.Player) { setTimeout(() => initializePlayer(q, base, isRestore), 500); return; }
                const div = document.createElement('div'); div.id = `player_${q.queueId}`; h.appendChild(div);
                const yt = new YT.Player(div.id, { height: '0', width: '0', videoId: q.mediaId, playerVars: { 'autoplay': 0, 'controls': 0 }, events: {
                    'onReady': (e) => { q.playerAPI = { play: ()=>yt.playVideo(), pause: ()=>yt.pauseVideo(), stop: ()=>{yt.stopVideo(); yt.seekTo(0);}, seekTo: (s)=>yt.seekTo(s, true), setVolume: (v)=>yt.setVolume(v), getDuration: ()=>yt.getDuration(), getCurrentTime: ()=>yt.getCurrentTime(), destroy: ()=>yt.destroy() }; q.duration = yt.getDuration() || q.duration; yt.setVolume(q.volume); if(q.currentTime>0) yt.seekTo(q.currentTime, true); if(q.state==='PAUSED') setTimeout(()=>yt.pauseVideo(), 50); else if(!isRestore) setTimeout(()=>yt.playVideo(), 200); updateQueueUI(); },
                    'onStateChange': (e) => { if(e.data === YT.PlayerState.PLAYING) { if(q.preventGhostPlay && q.state==='PAUSED') { yt.pauseVideo(); q.preventGhostPlay=false; return; } q.preventGhostPlay=false; q.state='PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow(); } else if(e.data === YT.PlayerState.PAUSED && !q.isScrubbing) { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } else if(e.data === YT.PlayerState.ENDED) { if(q.isLooping) yt.playVideo(); else { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } } }
                }});
            } else if (q.platform === 'vimeo') {
                if (typeof Vimeo === 'undefined' || !Vimeo.Player) { setTimeout(() => initializePlayer(q, base, isRestore), 500); return; }
                const div = document.createElement('div'); div.id = `player_${q.queueId}`; h.appendChild(div);
                const vim = new Vimeo.Player(div, { id: q.mediaId, width: 0, height: 0 });
                q.playerAPI = { play: ()=>vim.play(), pause: ()=>vim.pause(), stop: ()=>{vim.pause(); vim.setCurrentTime(0);}, seekTo: (s)=>vim.setCurrentTime(s), setVolume: (v)=>vim.setVolume(v/100), getDuration: ()=>q.duration, getCurrentTime: ()=>q.currentTime, destroy: ()=>vim.destroy() };
                vim.getDuration().then(d => { q.duration = d; updateQueueUI(); }); vim.setVolume(q.volume/100); if(q.currentTime > 0) vim.setCurrentTime(q.currentTime);
                vim.on('play', () => { q.state='PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow(); });
                vim.on('pause', () => { if(!q.isScrubbing) { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });
                vim.on('timeupdate', (d) => { if(!q.isScrubbing) q.currentTime = d.seconds; });
                vim.on('ended', () => { if(q.isLooping) vim.play(); else { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });
                if(!isRestore && q.state === 'PLAYING') vim.play();

            } else if (q.platform === 'soundcloud') {
                if (typeof SC === 'undefined' || !SC.Widget) { setTimeout(() => initializePlayer(q, base, isRestore), 500); return; }
                const frame = document.createElement('iframe'); frame.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(q.mediaId)}&auto_play=false`; frame.width="0"; frame.height="0"; h.appendChild(frame);
                const sc = SC.Widget(frame); q.playerAPI = { play: ()=>sc.play(), pause: ()=>sc.pause(), stop: ()=>{sc.pause(); sc.seekTo(0);}, seekTo: (s)=>sc.seekTo(s*1000), setVolume: (v)=>sc.setVolume(v), getDuration: ()=>q.duration, getCurrentTime: ()=>q.currentTime, destroy: ()=>frame.remove() };
                sc.bind(SC.Widget.Events.READY, () => { sc.getDuration(d => { q.duration = d/1000; updateQueueUI(); }); sc.setVolume(q.volume); if(q.currentTime>0) sc.seekTo(q.currentTime*1000); if(!isRestore && q.state==='PLAYING') sc.play(); });
                sc.bind(SC.Widget.Events.PLAY, () => { q.state='PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow(); });
                sc.bind(SC.Widget.Events.PAUSE, () => { if(!q.isScrubbing) { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });
                sc.bind(SC.Widget.Events.PLAY_PROGRESS, (d) => { if(!q.isScrubbing) q.currentTime = d.currentPosition/1000; });
                sc.bind(SC.Widget.Events.FINISH, () => { if(q.isLooping) sc.play(); else { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });

            } else if (q.platform === 'twitch') {
                if (typeof Twitch === 'undefined' || !Twitch.Player) { setTimeout(() => initializePlayer(q, base, isRestore), 500); return; }
                const div = document.createElement('div'); div.id = `player_${q.queueId}`; h.appendChild(div);
                const opt = { width:0, height:0, autoplay:false }; if(q.twitchType==='clip') opt.clip=q.mediaId; else opt.video=q.mediaId;
                const tw = new Twitch.Player(div.id, opt); q.playerAPI = { play: ()=>tw.play(), pause: ()=>tw.pause(), stop: ()=>{tw.pause(); tw.seek(0);}, seekTo: (s)=>tw.seek(s), setVolume: (v)=>tw.setVolume(v/100), getDuration: ()=>tw.getDuration(), getCurrentTime: ()=>tw.getCurrentTime(), destroy: ()=>div.remove() };
                tw.addEventListener(Twitch.Player.READY, () => { q.duration = tw.getDuration() || q.duration; tw.setVolume(q.volume/100); if(q.currentTime>0) tw.seek(q.currentTime); if(!isRestore && q.state==='PLAYING') tw.play(); updateQueueUI(); });
                tw.addEventListener(Twitch.Player.PLAYING, () => { q.state='PLAYING'; updateQueueUI(); saveQueueState(); updateGridGlow(); });
                tw.addEventListener(Twitch.Player.PAUSE, () => { if(!q.isScrubbing) { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });
                tw.addEventListener(Twitch.Player.ENDED, () => { if(q.isLooping) tw.play(); else { q.state='PAUSED'; updateQueueUI(); saveQueueState(); updateGridGlow(); } });
            }
        }

        function updateTrackData(trackId, updatesObj) {
            const i = tracks.findIndex(t=>t.id===trackId);
            if(i>-1) {
                let oldSymbol = tracks[i].symbol;
                tracks[i] = {...tracks[i], ...updatesObj}; saveTrackToDB(tracks[i]);
                queue.forEach(q => { if(q.trackId===trackId) { if(updatesObj.color) q.color = updatesObj.color; if(updatesObj.baseName) q.name = updatesObj.baseName; if(updatesObj.symbol && q.name === oldSymbol) q.name = updatesObj.symbol; } });
            }
            renderGrid(); renderQueue(); saveQueueState();
        }

        function populateSymbolGrid() {
            const grid = document.getElementById('symbolGrid');
            allSymbolsList.forEach(sym => {
                const div = document.createElement('div'); div.className = 'sym-item'; div.textContent = sym;
                div.onclick = () => { if(activeTargetTrackId) { updateTrackData(activeTargetTrackId, { symbol: sym, customImage: null }); hideModal('symbolModal'); } };
                grid.appendChild(div);
            });
        }

        function applyColorChange(hexColor) {
            if(!activeTargetTrackId) return; updateTrackData(activeTargetTrackId, { color: hexColor }); hideModal('colorModal');
        }

        function startUITracker() {
            setInterval(() => {
                queue.forEach(q => {
                    if (q.state === 'PLAYING' && q.playerAPI && !q.isScrubbing) {
                        if(q.platform === 'youtube' || q.platform === 'twitch') { const ct = q.playerAPI.getCurrentTime(); if(ct != null) q.currentTime = ct; }
                        const tEl = document.querySelector(`.queue-item-wrapper[data-queue-id="${q.queueId}"] .time-text`);
                        const sEl = document.getElementById(`scrub_${q.queueId}`);
                        if(tEl) tEl.textContent = formatTime(q.currentTime) + ' / ' + formatTime(q.duration);
                        if(sEl) sEl.value = q.currentTime;
                    }
                });
            }, 500);
        }
    </script>
</body>
